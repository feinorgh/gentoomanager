---
# Collection dependencies for local.gentoomanager
# Install with: ansible-galaxy collection install -r requirements.yml
collections:
  # Required by site.yml (community.general.portage module)
  - name: community.general
  # Required by roles using ansible.windows.* modules
  - name: ansible.windows
  # Required for Windows package management (setup_win.yml dependency installation)
  - name: chocolatey.chocolatey
