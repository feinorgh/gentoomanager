[defaults]
# Dynamic inventory via the local generator script
inventory            = inventory_generator.py
interpreter_python   = auto_silent
host_key_checking    = False

# Roles path: collection-local roles first, then the installed collections store
roles_path           = roles:~/.ansible/roles:/usr/share/ansible/roles

# Collections path so playbooks can reference local.gentoomanager.* content
collections_path     = collections:~/.ansible/collections:/usr/share/ansible/collections

# Keep stdout readable
stdout_callback      = ansible.builtin.default
result_format        = yaml
result_format_pretty = True

# SSH performance – reuse connections between tasks
[ssh_connection]
ssh_args             = -o ControlMaster=auto -o ControlPath=~/.ansible/cp/ssh-%r@%h:%p -o ControlPersist=3600s
pipelining           = True
