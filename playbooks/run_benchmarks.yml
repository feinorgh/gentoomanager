---
# Run benchmarks on all compatible VMs and collect results to the controller.
#
# Each VM is processed one at a time (serial: 1).  RAM is temporarily
# scaled to the VM's max configured memory for the benchmark run, then
# restored to its minimal allocation — even if the benchmark fails.
#
# Supported: Linux (all distros), FreeBSD.  Windows VMs are optional.
#
# Usage:
#   ansible-playbook playbooks/run_benchmarks.yml -i inventory_generator.py
#   ansible-playbook playbooks/run_benchmarks.yml -i inventory_generator.py \
#     -e '{"run_benchmarks_categories": ["compression", "crypto"]}'
#   ansible-playbook playbooks/run_benchmarks.yml -i inventory_generator.py \
#     -e run_benchmarks_runs=10
#   # Skip RAM scaling (VMs already have enough RAM):
#   ansible-playbook playbooks/run_benchmarks.yml -i inventory_generator.py \
#     -e run_benchmarks_scale_ram=false
#   # Only VMs on one hypervisor:
#   ansible-playbook playbooks/run_benchmarks.yml -i inventory_generator.py \
#     --limit 'hypervisor_hv1,localhost'

# ── Play 1: Run benchmarks one VM at a time ──────────────────────────────
- name: Run benchmarks on VMs (serial)
  hosts: "{{ 'all' if (run_benchmarks_include_windows | default(false) | bool) else 'all:!mswindows:!win:!win11' }}"
  gather_facts: false
  become: false
  serial: 1
  environment:
    LANG: C
    LC_ALL: C
  vars:
    run_benchmarks_scale_ram: true
    run_benchmarks_work_dir: /tmp/ansible-benchmarks
    run_benchmarks_work_dir_win: C:\ansible-benchmarks
    run_benchmarks_results_dir: "{{ playbook_dir }}/../benchmarks"
    # hypervisor_host is injected by inventory_generator.py for each VM.
    # Set to empty string as a safe default; health check is skipped when unset.
    hypervisor_host: "{{ hostvars[inventory_hostname].hypervisor_host | default('') }}"
    # Hypervisor load thresholds — skip VM if any are exceeded
    run_benchmarks_max_load_factor: 2.0
    run_benchmarks_min_free_mem_mb: 1024
    run_benchmarks_max_swap_used_pct: 90

  pre_tasks:
    - name: Check host is reachable
      ansible.builtin.raw: echo ok
      register: _reachable_check
      changed_when: false
      failed_when: false
      check_mode: false
      ignore_unreachable: true

    - name: Skip unreachable hosts
      ansible.builtin.meta: end_host
      when: >-
        _reachable_check is unreachable or
        _reachable_check is failed or
        _reachable_check.rc | default(1) != 0

    - name: Gather OS and hardware facts
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "!min"
          - distribution
          - os_family
          - hardware

    - name: Set effective work directory
      ansible.builtin.set_fact:
        run_benchmarks_effective_work_dir: >-
          {{ run_benchmarks_work_dir_win
             if (ansible_os_family | default('') == 'Windows')
             else run_benchmarks_work_dir }}

    # ── Sanity check: tools, sudo, disk space ───────────────────────────
    - name: Run pre-flight sanity check
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../roles/run_benchmarks/tasks/sanity_check.yml"
      when: ansible_os_family | default('') != 'Windows'

    # ── Hypervisor health check ─────────────────────────────────────────
    - name: Collect hypervisor status
      ansible.builtin.shell:
        cmd: |
          set -eo pipefail
          echo "::load::$(cat /proc/loadavg)"
          echo "::cpus::$(nproc)"
          echo "::mem::$(awk '/MemTotal/{t=$2} /MemAvailable/{a=$2} END{print t,a}' /proc/meminfo)"
          echo "::swap::$(awk '/SwapTotal/{t=$2} /SwapFree/{f=$2} END{print t,f}' /proc/meminfo)"
          echo "::procs::$(ps -e --no-headers | wc -l)"
      delegate_to: "{{ hypervisor_host }}"
      register: _hv_status_raw
      changed_when: false
      check_mode: false
      when: hypervisor_host != ''

    - name: Parse hypervisor status
      ansible.builtin.set_fact:
        _hv_load_1m: >-
          {{ (_hv_status_raw.stdout_lines
              | select('match', '^::load::')
              | first
              | regex_replace('^::load::', '')
             ).split()[0] | float }}
        _hv_cpus: >-
          {{ _hv_status_raw.stdout_lines
             | select('match', '^::cpus::')
             | first
             | regex_replace('^::cpus::', '')
             | int }}
        _hv_mem_total_mb: >-
          {{ ((_hv_status_raw.stdout_lines
               | select('match', '^::mem::')
               | first
               | regex_replace('^::mem::', '')
              ).split()[0] | int / 1024) | round(0) | int }}
        _hv_mem_avail_mb: >-
          {{ ((_hv_status_raw.stdout_lines
               | select('match', '^::mem::')
               | first
               | regex_replace('^::mem::', '')
              ).split()[1] | int / 1024) | round(0) | int }}
        _hv_swap_total_kb: >-
          {{ (_hv_status_raw.stdout_lines
              | select('match', '^::swap::')
              | first
              | regex_replace('^::swap::', '')
             ).split()[0] | int }}
        _hv_swap_free_kb: >-
          {{ (_hv_status_raw.stdout_lines
              | select('match', '^::swap::')
              | first
              | regex_replace('^::swap::', '')
             ).split()[1] | int }}
        _hv_procs: >-
          {{ _hv_status_raw.stdout_lines
             | select('match', '^::procs::')
             | first
             | regex_replace('^::procs::', '')
             | int }}
      when: hypervisor_host != '' and _hv_status_raw is not skipped

    - name: Compute hypervisor health metrics
      ansible.builtin.set_fact:
        _hv_load_per_cpu: >-
          {{ (_hv_load_1m | float / (_hv_cpus | int)) | round(2) }}
        _hv_swap_used_pct: >-
          {{ (100 - (_hv_swap_free_kb | int * 100 / (_hv_swap_total_kb | int)))
             | round(1)
             if (_hv_swap_total_kb | int > 0)
             else 0 }}
      when: hypervisor_host != '' and _hv_status_raw is not skipped

    - name: Log hypervisor status
      ansible.builtin.debug:
        msg: >-
          Hypervisor {{ hypervisor_host }}:
          load={{ _hv_load_1m }} ({{ _hv_load_per_cpu }}/cpu),
          mem={{ _hv_mem_avail_mb }}MB free / {{ _hv_mem_total_mb }}MB,
          swap={{ _hv_swap_used_pct }}% used,
          procs={{ _hv_procs }}
      when: hypervisor_host != '' and _hv_status_raw is not skipped

    - name: Abort — hypervisor too loaded
      ansible.builtin.fail:
        msg: >-
          Hypervisor {{ hypervisor_host }} is overloaded — skipping
          {{ inventory_hostname }}.
          Load/CPU={{ _hv_load_per_cpu }}
          (threshold={{ run_benchmarks_max_load_factor }}),
          free mem={{ _hv_mem_avail_mb }}MB
          (threshold={{ run_benchmarks_min_free_mem_mb }}MB),
          swap used={{ _hv_swap_used_pct }}%
          (threshold={{ run_benchmarks_max_swap_used_pct }}%).
      when: >-
        hypervisor_host != '' and _hv_status_raw is not skipped and
        ((_hv_load_per_cpu | float > run_benchmarks_max_load_factor | float) or
         (_hv_mem_avail_mb | int < run_benchmarks_min_free_mem_mb | int) or
         ((_hv_swap_used_pct | float > run_benchmarks_max_swap_used_pct | float) and
          (_hv_mem_avail_mb | int < run_benchmarks_min_free_mem_mb | int * 2)))

  tasks:
    - name: Benchmark with RAM scaling and automatic restore
      block:
        # ── Scale RAM up ──────────────────────────────────────────────
        - name: Read current and max VM memory
          ansible.builtin.shell:
            cmd: |
              set -eo pipefail
              virsh --connect qemu:///system dumpxml '{{ inventory_hostname }}' \
                | grep -oP '<(memory|currentMemory)[^>]*>\K[0-9]+' \
                | head -2
          delegate_to: "{{ hypervisor_host }}"
          register: _bench_ram_info
          changed_when: false
          check_mode: false
          when: run_benchmarks_scale_ram | bool

        - name: Save original RAM values
          ansible.builtin.set_fact:
            run_benchmarks_max_ram_kib: "{{ _bench_ram_info.stdout_lines[0] | trim }}"
            run_benchmarks_original_ram_kib: "{{ _bench_ram_info.stdout_lines[1] | trim }}"
          when: >-
            run_benchmarks_scale_ram | bool and
            _bench_ram_info is not skipped

        - name: Scale VM RAM to max memory (live)
          ansible.builtin.command:
            cmd: >-
              virsh --connect qemu:///system setmem '{{ inventory_hostname }}'
              {{ run_benchmarks_max_ram_kib }} --live
          delegate_to: "{{ hypervisor_host }}"
          changed_when: true
          when: >-
            run_benchmarks_scale_ram | bool and
            run_benchmarks_original_ram_kib is defined and
            run_benchmarks_original_ram_kib != run_benchmarks_max_ram_kib

        # ── Run benchmarks ────────────────────────────────────────────
        - name: Run benchmark suite
          ansible.builtin.include_role:
            name: run_benchmarks

        # ── Fetch results ─────────────────────────────────────────────
        - name: Find all benchmark result files (Unix)
          ansible.builtin.find:
            paths: "{{ run_benchmarks_effective_work_dir }}"
            patterns: "*.json"
          register: _bench_result_files
          when: ansible_os_family | default('') != 'Windows'

        - name: Find all benchmark result files (Windows)
          ansible.windows.win_find:
            paths: "{{ run_benchmarks_effective_work_dir }}"
            patterns: "*.json"
          register: _bench_result_files_win
          when: ansible_os_family | default('') == 'Windows'

        - name: Unify result file list
          ansible.builtin.set_fact:
            _bench_all_result_files: >-
              {{ (_bench_result_files.files | default([]))
                 + (_bench_result_files_win.files | default([])) }}

        - name: Create local results directory
          ansible.builtin.file:
            path: "{{ run_benchmarks_results_dir }}/results/{{ inventory_hostname }}"
            state: directory
            mode: "0755"
          delegate_to: localhost
          become: false

        - name: Fetch benchmark results to controller
          ansible.builtin.fetch:
            src: "{{ item.path }}"
            dest: "{{ run_benchmarks_results_dir }}/results/{{ inventory_hostname }}/"
            flat: true
          loop: "{{ _bench_all_result_files }}"
          loop_control:
            label: "{{ item.path | basename }}"

      # ── Always restore RAM, even on failure ─────────────────────────
      always:
        - name: Read configured minimal RAM from persistent XML
          ansible.builtin.shell:
            cmd: |
              set -eo pipefail
              virsh --connect qemu:///system dumpxml --inactive '{{ inventory_hostname }}' \
                | grep -oP '<currentMemory[^>]*>\K[0-9]+'
          delegate_to: "{{ hypervisor_host }}"
          register: _bench_minimal_ram
          changed_when: false
          failed_when: false
          check_mode: false
          when: run_benchmarks_scale_ram | bool

        - name: Restore VM RAM to minimal allocation (live)
          ansible.builtin.command:
            cmd: >-
              virsh --connect qemu:///system setmem '{{ inventory_hostname }}'
              {{ _bench_minimal_ram.stdout | trim }} --live
          delegate_to: "{{ hypervisor_host }}"
          changed_when: true
          failed_when: false
          when: >-
            run_benchmarks_scale_ram | bool and
            _bench_minimal_ram.stdout is defined and
            _bench_minimal_ram.stdout | trim | length > 0

# ── Play 2: Provision and benchmark hypervisors (bare-metal reference) ───
- name: Benchmark hypervisors as bare-metal reference
  hosts: hypervisors
  gather_facts: false
  become: true
  serial: 1
  environment:
    LANG: C
    LC_ALL: C
  vars:
    run_benchmarks_work_dir: /tmp/ansible-benchmarks
    run_benchmarks_results_dir: "{{ playbook_dir }}/../benchmarks"
    run_benchmarks_is_hypervisor: true
    # Only run categories likely present on a KVM hypervisor
    run_benchmarks_categories: "{{ run_benchmarks_hypervisor_categories | default([]) }}"

  pre_tasks:
    - name: Check hypervisor is reachable
      ansible.builtin.raw: echo ok
      register: _hv_reachable
      changed_when: false
      failed_when: false
      check_mode: false
      ignore_unreachable: true

    - name: Skip unreachable hypervisors
      ansible.builtin.meta: end_host
      when: >-
        _hv_reachable is unreachable or
        _hv_reachable is failed or
        _hv_reachable.rc | default(1) != 0

    - name: Gather OS and hardware facts
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "!min"
          - distribution
          - os_family
          - hardware

    - name: Set effective work directory
      ansible.builtin.set_fact:
        run_benchmarks_effective_work_dir: "{{ run_benchmarks_work_dir }}"

    # ── Sanity check: tools, sudo, disk space ───────────────────────────
    - name: Run pre-flight sanity check
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../roles/run_benchmarks/tasks/sanity_check.yml"

    - name: Install hyperfine and p7zip on hypervisor
      ansible.builtin.package:
        name:
          - app-benchmarks/hyperfine
          - app-arch/p7zip
        state: present

  tasks:
    - name: Benchmark hypervisor with automatic restore
      block:
        - name: Run benchmark suite on hypervisor
          ansible.builtin.include_role:
            name: run_benchmarks

        - name: Find all benchmark result files
          ansible.builtin.find:
            paths: "{{ run_benchmarks_effective_work_dir }}"
            patterns: "*.json"
          register: _hv_bench_result_files

        - name: Create local results directory for hypervisor
          ansible.builtin.file:
            path: "{{ run_benchmarks_results_dir }}/results/{{ inventory_hostname }}"
            state: directory
            mode: "0755"
          delegate_to: localhost
          become: false

        - name: Fetch hypervisor benchmark results to controller
          ansible.builtin.fetch:
            src: "{{ item.path }}"
            dest: "{{ run_benchmarks_results_dir }}/results/{{ inventory_hostname }}/"
            flat: true
          loop: "{{ _hv_bench_result_files.files | default([]) }}"
          loop_control:
            label: "{{ item.path | basename }}"

# ── Play 2: Generate report ──────────────────────────────────────────────
- name: Generate benchmark report
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [generate_report]

  tasks:
    - name: Generate Markdown and HTML reports
      ansible.builtin.command:
        cmd: >-
          python3 {{ playbook_dir }}/../scripts/generate_benchmark_report.py
          {{ playbook_dir }}/../benchmarks
      changed_when: true
