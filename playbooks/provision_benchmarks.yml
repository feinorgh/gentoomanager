# ── Play 12: Shut down VMs that were booted by this run (--manage-power) ─
- name: Shut down VMs booted by this provisioning run
  hosts: "{{ 'all' if (provision_include_windows | default(false) | bool) else 'all:!win:!win11:!win10' }}"
  serial: "100%"
  gather_facts: false
  ignore_unreachable: true
  any_errors_fatal: false
  vars:
    provision_manage_power: false
  tasks:
    - name: Shut down VM gracefully after provisioning
      ansible.builtin.command:
        cmd: virsh --connect qemu:///system shutdown '{{ inventory_hostname }}'
      delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
      changed_when: true
      failed_when: false
      when:
        - provision_manage_power | default(false) | bool
        - _provision_vm_was_off | default(false) | bool
        - hypervisor_host is defined
        - hypervisor_host | length > 0

    - name: Wait for VM to reach shut-off state
      ansible.builtin.shell:
        cmd: |
          set -eo pipefail
          for i in $(seq 1 30); do
            state=$(virsh --connect qemu:///system domstate '{{ inventory_hostname }}' 2>/dev/null | tr -d ' \n')
            [ "$state" = "shut off" ] && exit 0
            sleep 5
          done
          exit 1
        executable: /bin/bash
      delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
      changed_when: false
      failed_when: false
      when:
        - provision_manage_power | default(false) | bool
        - _provision_vm_was_off | default(false) | bool
        - hypervisor_host is defined
        - hypervisor_host | length > 0
