---
# Provision VMs with all software required for the benchmark suite.
#
# Strategy: play 1 gathers facts from all hosts in parallel and buckets them
# into per-OS-family dynamic groups; subsequent plays provision each OS family
# fully in parallel (no serial bottleneck).
#
# Usage:
#   ansible-playbook playbooks/provision_benchmarks.yml
#   ansible-playbook playbooks/provision_benchmarks.yml --limit hypervisor_hv2
#   ansible-playbook playbooks/provision_benchmarks.yml --ask-become-pass
#   ansible-playbook playbooks/provision_benchmarks.yml -e provision_manage_power=true
#
# --manage-power:
#   When provision_manage_power=true, each VM that is powered off when the
#   playbook starts is booted, provisioned, then shut down again.  VMs that
#   were already running are left running after provisioning.

# ── Play 0: Boot powered-off VMs (--manage-power) ────────────────────────
- name: Boot powered-off VMs before provisioning
  hosts: "{{ 'all' if (provision_include_windows | default(false) | bool) else 'all:!win:!win11:!win10' }}"
  serial: 1
  gather_facts: false
  ignore_unreachable: true
  any_errors_fatal: false
  vars:
    provision_manage_power: false
    provision_boot_timeout_sec: 120
  tasks:
    - name: Check VM power state via hypervisor
      ansible.builtin.command:
        cmd: virsh --connect qemu:///system domstate '{{ inventory_hostname }}'
      delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
      register: _provision_vm_domstate
      changed_when: false
      failed_when: false
      check_mode: false
      when:
        - provision_manage_power | default(false) | bool
        - hypervisor_host is defined
        - hypervisor_host | length > 0

    - name: Record whether this VM needs to be booted
      ansible.builtin.set_fact:
        _provision_vm_was_off: >-
          {{
            provision_manage_power | default(false) | bool and
            hypervisor_host is defined and hypervisor_host | length > 0 and
            _provision_vm_domstate is not skipped and
            _provision_vm_domstate.stdout | default('') | trim != 'running'
          }}

    - name: Boot VM via hypervisor
      ansible.builtin.command:
        cmd: virsh --connect qemu:///system start '{{ inventory_hostname }}'
      delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
      changed_when: true
      when: _provision_vm_was_off | default(false) | bool

    - name: Wait for SSH port 22 to open on VM (via hypervisor)
      ansible.builtin.shell:
        cmd: |
          set -eo pipefail
          end=$(( $(date +%s) + {{ provision_boot_timeout_sec | int }} ))
          while [ "$(date +%s)" -lt "$end" ]; do
            vm_addr=$(virsh --connect qemu:///system domifaddr '{{ inventory_hostname }}' \
              --source arp 2>/dev/null \
              | awk '/ipv4/{ gsub("/[0-9]+$", "", $4); print $4; exit }')
            if [ -n "$vm_addr" ] && nc -z -w 2 "$vm_addr" 22 2>/dev/null; then
              sleep 10
              exit 0
            fi
            sleep 3
          done
          exit 1
        executable: /bin/bash
      delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
      changed_when: false
      ignore_errors: true
      when:
        - _provision_vm_was_off | default(false) | bool
        - hypervisor_host is defined
        - hypervisor_host | length > 0

    - name: Remove stale SSH ControlMaster socket after VM reboot
      ansible.builtin.shell:
        cmd: |
          socket="${HOME}/.ansible/cp/ssh-{{ ansible_user | default('pk') }}@{{ ansible_host }}:22"
          if [ -S "$socket" ]; then
            ssh -O exit -o "ControlPath=$socket" \
              "{{ ansible_host }}" 2>/dev/null || true
            rm -f "$socket" 2>/dev/null || true
          fi
        executable: /bin/bash
      delegate_to: localhost
      changed_when: false
      ignore_errors: true
      when:
        - _provision_vm_was_off | default(false) | bool

- name: Gather facts and group hosts by OS family
  hosts: "{{ 'all' if (provision_include_windows | default(false) | bool) else 'all:!win:!win11:!win10' }}"
  serial: "100%"
  gather_facts: true
  ignore_unreachable: true
  any_errors_fatal: false
  tasks:
    - name: Group by OS family (standard families)
      ansible.builtin.group_by:
        key: "provision_os_{{ ansible_os_family | lower }}"
      when: >-
        ansible_os_family is defined and
        ansible_os_family in ['Gentoo', 'RedHat', 'Debian', 'Archlinux',
                              'Suse', 'FreeBSD', 'Void', 'NixOS', 'Solus']

    - name: Group by distribution (non-standard OS families)
      ansible.builtin.group_by:
        key: "provision_os_{{ ansible_distribution | lower }}"
      when: >-
        ansible_os_family is defined and
        ansible_os_family not in ['Gentoo', 'RedHat', 'Debian', 'Archlinux',
                                  'Suse', 'FreeBSD', 'Void', 'NixOS', 'Solus']

# ── Play 2: Gentoo – serial to avoid compile-time noise on shared CPUs ──
- name: Provision Gentoo hosts
  hosts: provision_os_gentoo
  serial: "{{ provision_serial | default(1) }}"
  gather_facts: false
  ignore_unreachable: true
  any_errors_fatal: false
  tasks:
    - name: Provision Gentoo with RAM scaling
      block:
        # ── Scale RAM up (VMs only) ───────────────────────────────────
        - name: Read current and max VM memory
          ansible.builtin.shell:
            cmd: |
              set -eo pipefail
              virsh --connect qemu:///system dumpxml '{{ inventory_hostname }}' \
                | grep -oP '<(memory|currentMemory)[^>]*>\K[0-9]+' \
                | head -2
          delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
          register: _provision_ram_info
          changed_when: false
          when: hypervisor_host is defined and hypervisor_host | length > 0

        - name: Save original RAM values
          ansible.builtin.set_fact:
            _provision_max_ram_kib: "{{ _provision_ram_info.stdout_lines[0] | trim }}"
            _provision_original_ram_kib: "{{ _provision_ram_info.stdout_lines[1] | trim }}"
          when: >-
            hypervisor_host is defined and hypervisor_host | length > 0 and
            _provision_ram_info is not skipped

        - name: Scale VM RAM to max memory (live)
          ansible.builtin.command:
            cmd: >-
              virsh --connect qemu:///system setmem '{{ inventory_hostname }}'
              {{ _provision_max_ram_kib }} --live
          delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
          changed_when: true
          when: >-
            hypervisor_host is defined and hypervisor_host | length > 0 and
            _provision_original_ram_kib is defined and
            _provision_original_ram_kib != _provision_max_ram_kib

        # ── Provision ─────────────────────────────────────────────────
        - name: Provision benchmark dependencies
          ansible.builtin.include_role:
            name: provision_benchmarks
            tasks_from: os/gentoo.yml

      # ── Always restore RAM, even on failure ─────────────────────────
      always:
        - name: Read configured minimal RAM from persistent XML
          ansible.builtin.shell:
            cmd: |
              set -eo pipefail
              virsh --connect qemu:///system dumpxml --inactive '{{ inventory_hostname }}' \
                | grep -oP '<currentMemory[^>]*>\K[0-9]+'
          delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
          register: _provision_minimal_ram
          changed_when: false
          failed_when: false
          when: hypervisor_host is defined and hypervisor_host | length > 0

        - name: Restore VM RAM to minimal allocation (live)
          ansible.builtin.command:
            cmd: >-
              virsh --connect qemu:///system setmem '{{ inventory_hostname }}'
              {{ _provision_minimal_ram.stdout | trim }} --live
          delegate_to: "{{ hypervisor_host | default(inventory_hostname) }}"
          changed_when: true
          failed_when: false
          when: >-
            hypervisor_host is defined and hypervisor_host | length > 0 and
            _provision_minimal_ram.stdout is defined and
            _provision_minimal_ram.stdout | trim | length > 0

# ── Play 3: Red Hat family – Fedora, RHEL, CentOS, Oracle Linux ─────────
- name: Provision Red Hat family hosts
  hosts: provision_os_redhat
  serial: "{{ provision_serial | default('100%') }}"
  gather_facts: false
  ignore_unreachable: true
  any_errors_fatal: false
  tasks:
    - name: Provision benchmark dependencies
      ansible.builtin.include_role:
        name: provision_benchmarks
        tasks_from: os/redhat.yml

