[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
]
ignore = [
  "B006",  # mutable default argument — common in test helpers
  "UP007", # use X | Y for union types — requires Python 3.10+
  "UP006", # use built-in type aliases — requires 3.9+ and is stylistic
]

[tool.ruff.lint.per-file-ignores]
# Ansible plugins require DOCUMENTATION/EXAMPLES/RETURN before imports
"plugins/**/*.py" = ["E402"]
# Test helpers use sys.path manipulation before imports
"tests/**/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
addopts = ["-vvv", "-n", "2", "--log-level", "WARNING", "--color", "yes"]
filterwarnings = ["ignore:AnsibleCollectionFinder has already been configured"]
testpaths = ["tests"]
