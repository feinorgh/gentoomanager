---
name: Release local.gentoomanager

on: # yamllint disable-line rule:truthy
  release:
    types: [published]

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to upload release assets
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ansible-core
        run: pip install ansible-core --quiet

      - name: Build collection tarball
        run: ansible-galaxy collection build --output-path dist/

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tarball=$(ls dist/*.tar.gz)
          gh release upload "${{ github.event.release.tag_name }}" "$tarball" --clobber
