---
# Number of benchmark runs per command
run_benchmarks_runs: 5

# Number of warmup runs before measurement
run_benchmarks_warmup: 3

# Runs and warmup for large-compile benchmarks (SQLite amalgamation,
# multi-file project).  Fewer runs keep wall-clock time manageable since
# each compile takes 5–35 s depending on optimisation level and host speed.
run_benchmarks_large_compile_runs: 3
run_benchmarks_large_compile_warmup: 1

# GIMP benchmark tuning.
# GIMP is launched once; all four operations (load, blur, unsharp, pipeline)
# are timed inside that single Script-Fu session using gettimeofday.
# This eliminates per-benchmark GIMP startup overhead entirely.
#
# A prescaled subset of the Kodak corpus is used so each per-run operation
# GIMP startup benchmark: measures cold-start time (GEGL/BABL init, plugin
# loading, Script-Fu interpreter startup) via hyperfine.  This is the most
# consistent metric across GIMP 2.x and GIMP 3.x.
#
# run_benchmarks_gimp_runs          — measured iterations (hyperfine --runs)
# run_benchmarks_gimp_warmup        — discarded warmup iterations
# run_benchmarks_gimp_timeout_sec   — wall-clock timeout for the entire run
run_benchmarks_gimp_runs: 3
run_benchmarks_gimp_warmup: 1
run_benchmarks_gimp_timeout_sec: 600

# CPU core(s) to pin benchmark processes to via taskset (empty string = no pinning)
# Example: "0-3" pins to cores 0-3; leave empty for no affinity constraint
run_benchmarks_cpu_affinity: ""

# Categories to run (empty list = all)
# Valid: compression, crypto, compiler, python, ffmpeg, coreutils, opencv, startup, gentoo_build_times,
#        numeric, sqlite, memory, process, disk, linker
run_benchmarks_categories: []

# Categories that have a Windows-specific task file variant (<name>_win.yml).
# Any category not in this list is silently skipped on Windows hosts.
run_benchmarks_windows_categories:
  - compression
  - crypto
  - compiler
  - python
  - coreutils

# Local directory for collected results
run_benchmarks_results_dir: "{{ playbook_dir }}/../benchmarks"

# Remote working directory for test data
run_benchmarks_work_dir: /tmp/ansible-benchmarks
run_benchmarks_work_dir_win: C:\ansible-benchmarks

# Local (controller-side) directory for deterministic benchmark fixture files.
# The ImageMagick source images are generated here once and copied to every
# host, ensuring bit-identical input across all benchmark runs.
# Path is relative to the collection root (one level above playbooks/).
run_benchmarks_fixture_dir: "{{ playbook_dir | dirname }}/benchmarks/fixtures"

# Minimum free disk space required on the work_dir partition (MB).
# A full benchmark run copies ~1.2 GB of fixture files (Silesia corpus,
# BBB 1080p FFV1 clip, ImageMagick images) and generates ~500 MB of
# intermediate encode files — 2048 MB is a safe floor for all categories.
# Reduce this value when running only a small subset of categories.
run_benchmarks_min_disk_mb: 2048

# Minimum total RAM required when the work_dir partition is backed by
# tmpfs (the default /tmp on most Linux systems).  tmpfs space is RAM,
# so the VM needs enough memory to hold fixture files (~1.7 GB) plus
# OS overhead and benchmark process memory.  4096 MB (4 GB) gives
# comfortable headroom.  For KVM VMs the RAM is scaled to max before
# benchmarks run — check max_memory in host_vars if this warning fires.
run_benchmarks_min_ram_mb: 4096

# Test data sizes
# Fallback random testdata.bin size (MiB) when the Silesia corpus is absent.
# 64 MiB clearly differentiates fast (lz4/zstd) from slow (xz/bzip2) codecs
# while keeping wall-clock time proportional for CI runs.  xz uses -T0.
run_benchmarks_compress_size_mb: 64
run_benchmarks_ffmpeg_duration_sec: 10

# Per-command time limit passed to hyperfine (--time-limit, seconds).
# Prevents slow HEVC/AV1 encoders from blocking the suite on slow hosts.
# Set to 0 to disable the limit.
run_benchmarks_ffmpeg_cmd_timeout_sec: 120

# Per-category runs/warmup overrides for slow categories.
# FFmpeg video encode: 3 runs, 1 warmup — encoding variance is low (<0.5%),
# and 4 total rounds keep the video encode section under ~5 minutes.
run_benchmarks_ffmpeg_video_runs: 3
run_benchmarks_ffmpeg_video_warmup: 1
# FFmpeg audio encode/decode: audio codecs are fast but there are many of
# them; 3 runs + 1 warmup keeps audio under ~8 minutes total.
run_benchmarks_ffmpeg_audio_runs: 3
run_benchmarks_ffmpeg_audio_warmup: 1
# Whether to include libaom-av1 in video encode/decode benchmarks.
# Deprecated: superseded by run_benchmarks_ffmpeg_extended_codecs.
# Kept for backwards compatibility — setting this to true still works but
# only enables libaom; use the new flag to gate all extended codecs at once.
run_benchmarks_ffmpeg_include_libaom: false
# Include non-standard FFmpeg codecs: slow, experimental, legacy, or niche.
# When false (default), only widely-used production codecs are benchmarked:
#   Video encode/decode: h264, h265, vp8, vp9, svt-av1
#   Audio encode/decode: aac, opus, mp3, flac, vorbis
# When true, adds:
#   Video: libaom-av1 (reference/research, very slow), librav1e (experimental),
#          theora (legacy Ogg), xvid (legacy MPEG-4), mpeg2 (legacy), mjpeg (niche)
#   Audio: ac3/eac3 (Dolby, niche on Linux), wavpack (lossless), alac (Apple lossless)
# Enable with: -e "run_benchmarks_ffmpeg_extended_codecs=true"
run_benchmarks_ffmpeg_extended_codecs: false
# Application startup: 3 runs are enough — variance comes from page-cache
run_benchmarks_startup_runs: 3
run_benchmarks_startup_warmup: 2

# Ansible task timeout for the full FFmpeg video encode hyperfine run (seconds).
# Must be larger than runs * warmup * ffmpeg_cmd_timeout_sec.  Default covers
# 9 codecs × 4 (runs+warmup) × 120 s = 4320 s with a safety margin.
run_benchmarks_ffmpeg_task_timeout_sec: 5400

# Hyperfine binary name
run_benchmarks_hyperfine_bin: hyperfine

# Include Windows hosts in benchmark runs (opt-in)
run_benchmarks_include_windows: false

# Skip hosts whose result directory already contains a complete set of
# JSON result files (one per active category).  Useful when resuming a
# partial run across many hosts without re-benchmarking those already done.
# Enable with: -e run_benchmarks_skip_complete=true
run_benchmarks_skip_complete: false

# Gentoo build time analysis: minimum build duration to include (seconds)
run_benchmarks_gentoo_min_build_secs: 300

# Gentoo build time analysis: number of recent builds to collect per package
run_benchmarks_gentoo_max_builds: 3

# Set to true when targeting hypervisor hosts (prevents swap disabling,
# skips VM-specific operations).
run_benchmarks_is_hypervisor: false

# Benchmark categories run on hypervisors (ffmpeg/opencv skipped by default
# as they are typically not installed on KVM hypervisors).
run_benchmarks_hypervisor_categories:
  - compression
  - crypto
  - coreutils
  - compiler
  - python
  - ffmpeg
  - imagemagick
  - opencv
  - startup
  - gentoo_build_times
  - numeric
  - sqlite
  - memory
  - process
  - disk
  - linker
