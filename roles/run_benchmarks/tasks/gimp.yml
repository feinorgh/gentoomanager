---
# GIMP benchmarks — cold-start timing via hyperfine.
#
# Measures how long GIMP takes to start up, initialise, and exit cleanly.
# This is intentionally the simplest possible GIMP benchmark:
#
#   hyperfine "gimp -i -n --no-data --no-fonts -b '(gimp-quit 0)'"
#
# Rationale: GIMP 3.x uses GEGL/BABL for all image operations and has
# substantially higher startup and per-operation cost than GIMP 2.x.  On
# constrained VMs (< 4 GB RAM), GIMP 3.x startup alone can exceed 5 minutes
# per iteration — making even a startup-only benchmark impractical.  We
# skip GIMP 3.x on hosts with less than run_benchmarks_gimp_min_ram_mb RAM
# and emit an informational message so the operator knows why.
#
# Tuning variables (see defaults/main.yml):
#   run_benchmarks_gimp_runs          (default 3)
#   run_benchmarks_gimp_warmup        (default 1)
#   run_benchmarks_gimp_timeout_sec   (default 600)
#   run_benchmarks_gimp_min_ram_mb    (default 4096)

- name: Check GIMP availability
  ansible.builtin.command:
    cmd: gimp --version
  register: run_benchmarks_gimp_check
  changed_when: false
  failed_when: false

- name: Warn if GIMP is not available
  ansible.builtin.debug:
    msg: >-
      [SKIP] {{ inventory_hostname }}: GIMP not found —
      gimp benchmark will be skipped.
      Install via the provisioning playbook:
      ansible-playbook playbooks/provision_benchmarks.yml
      -i inventory_generator.py --limit {{ inventory_hostname }}
  when: run_benchmarks_gimp_check.rc != 0

- name: Parse GIMP major version
  ansible.builtin.set_fact:
    run_benchmarks_gimp_major: >-
      {{ run_benchmarks_gimp_check.stdout
         | regex_search('(\d+)\.\d+', '\1')
         | default(['2'])
         | first
         | int }}
  when: run_benchmarks_gimp_check.rc == 0

- name: Warn — GIMP 3.x skipped on low-RAM host
  ansible.builtin.debug:
    msg: >-
      [SKIP] {{ inventory_hostname }}: GIMP {{ run_benchmarks_gimp_major }}.x
      detected with only {{ ansible_memtotal_mb }} MB RAM (minimum
      {{ run_benchmarks_gimp_min_ram_mb }} MB required).  GIMP 3.x initialises
      GEGL/BABL at startup and can take >5 min per run on constrained VMs.
      Skipping gimp benchmark to avoid timeout.
  when:
    - run_benchmarks_gimp_check.rc == 0
    - run_benchmarks_gimp_major | int >= 3
    - ansible_memtotal_mb | int < run_benchmarks_gimp_min_ram_mb | int

- name: Run GIMP startup benchmark
  ansible.builtin.shell:
    cmd: >-
      {{ run_benchmarks_hyperfine_bin }}
      --warmup {{ run_benchmarks_gimp_warmup }}
      --runs {{ run_benchmarks_gimp_runs }}
      --export-json {{ run_benchmarks_work_dir }}/gimp.json
      "gimp -i -n --no-data --no-fonts -b '(gimp-quit 0)'"
  register: run_benchmarks_gimp_result
  changed_when: false
  failed_when: false
  async: "{{ run_benchmarks_gimp_timeout_sec }}"
  poll: 15
  when:
    - run_benchmarks_gimp_check.rc == 0
    - (run_benchmarks_gimp_major | int < 3)
      or (ansible_memtotal_mb | int >= run_benchmarks_gimp_min_ram_mb | int)

- name: Warn on gimp benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: gimp benchmark exited
      rc={{ run_benchmarks_gimp_result.rc }}.
      {{ run_benchmarks_gimp_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_gimp_result is not skipped
    - run_benchmarks_gimp_result.rc | default(0) != 0
