---
# Compression benchmarks: gzip, bzip2, xz, zstd, lz4

- name: Run compression benchmarks
  ansible.builtin.shell:
    cmd: |
      set -e
      cd {{ run_benchmarks_work_dir }}
      CMDS=()
      {% for tool in ['gzip', 'bzip2', 'xz', 'zstd', 'lz4'] %}
      if command -v {{ tool }} >/dev/null 2>&1; then
      {% if tool == 'gzip' %}
        CMDS+=(--command-name "gzip-compress"    "gzip -k -f testdata.bin && rm -f testdata.bin.gz")
        CMDS+=(--command-name "gzip-decompress"  "gzip -k testdata.bin && gzip -d -f testdata.bin.gz")
      {% elif tool == 'bzip2' %}
        CMDS+=(--command-name "bzip2-compress"   "bzip2 -k -f testdata.bin && rm -f testdata.bin.bz2")
        CMDS+=(--command-name "bzip2-decompress" "bzip2 -k testdata.bin && bzip2 -d -f testdata.bin.bz2")
      {% elif tool == 'xz' %}
        CMDS+=(--command-name "xz-compress"      "xz -k -f -T0 testdata.bin && rm -f testdata.bin.xz")
        CMDS+=(--command-name "xz-decompress"    "xz -k -T0 testdata.bin && xz -d -f -T0 testdata.bin.xz")
      {% elif tool == 'zstd' %}
        CMDS+=(--command-name "zstd-compress"    "zstd -f testdata.bin -o testdata.bin.zst && rm -f testdata.bin.zst")
        CMDS+=(--command-name "zstd-decompress"  "zstd -f testdata.bin -o testdata.bin.zst && zstd -d -f testdata.bin.zst")
      {% elif tool == 'lz4' %}
        CMDS+=(--command-name "lz4-compress"     "lz4 -f testdata.bin testdata.bin.lz4 && rm -f testdata.bin.lz4")
        CMDS+=(--command-name "lz4-decompress"   "lz4 -f testdata.bin testdata.bin.lz4 && lz4 -d -f testdata.bin.lz4 /dev/null")
      {% endif %}
      fi
      {% endfor %}
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_compression_runs }} \
        --warmup {{ run_benchmarks_compression_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/compression.json \
        "${CMDS[@]}"
  args:
    executable: /bin/bash
  register: run_benchmarks_compression_result
  changed_when: false
  failed_when: false

- name: Warn on compression benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: compression benchmark exited
      rc={{ run_benchmarks_compression_result.rc }}.
      {{ run_benchmarks_compression_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_compression_result is not skipped
    - run_benchmarks_compression_result.rc | default(0) != 0
