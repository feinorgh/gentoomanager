---
# Setup: verify hyperfine, create test data, collect host metadata.
# OS-agnostic — works on Linux (all distros) and FreeBSD.
# Run playbooks/provision_benchmarks.yml first to install all dependencies.

# ---------------------------------------------------------------------------
# Verify hyperfine is available
# ---------------------------------------------------------------------------
- name: Check that hyperfine is installed
  ansible.builtin.command:
    cmd: hyperfine --version
  register: run_benchmarks_hf_check
  changed_when: false
  failed_when: false

- name: Warn if hyperfine is missing
  ansible.builtin.fail:
    msg: >-
      hyperfine is not installed on {{ inventory_hostname }}.
      Run 'ansible-playbook playbooks/provision_benchmarks.yml' first.
  when: run_benchmarks_hf_check.rc != 0

# ---------------------------------------------------------------------------
# Create test data
# ---------------------------------------------------------------------------
- name: Create benchmark working directory
  ansible.builtin.file:
    path: "{{ run_benchmarks_work_dir }}"
    state: directory
    mode: "0700"

# Remove any 0-byte files left by previous interrupted runs.
# All generated fixture files have a creates: guard; a stale 0-byte file
# permanently prevents regeneration, so we sweep them out up front.
- name: Remove 0-byte stale fixture files in work directory
  ansible.builtin.command:
    cmd: find "{{ run_benchmarks_work_dir }}" -maxdepth 3 -type f -empty -delete -print
  register: run_benchmarks_stale_removed
  changed_when: run_benchmarks_stale_removed.stdout | length > 0
  failed_when: false

# ── Download standardised fixture files on controller (once per collection run)
- name: Remove 0-byte stale fixture files in controller fixture directory
  ansible.builtin.command:
    cmd: find "{{ run_benchmarks_fixture_dir }}" -maxdepth 1 -type f -empty -delete -print
  register: run_benchmarks_fixture_stale_removed
  changed_when: run_benchmarks_fixture_stale_removed.stdout | length > 0
  failed_when: false
  delegate_to: localhost
  run_once: true

- name: Download standard benchmark fixture files on controller
  ansible.builtin.command:
    cmd: >-
      python3 {{ playbook_dir | dirname }}/scripts/download_benchmark_fixtures.py
      {{ run_benchmarks_fixture_dir }}
  delegate_to: localhost
  run_once: true
  changed_when: false

# ── Populate compression test data ───────────────────────────────────────────
- name: Check whether compression test data is already present on host
  ansible.builtin.stat:
    path: "{{ run_benchmarks_work_dir }}/testdata.bin"
  register: run_benchmarks_testdata_stat

- name: Remove undersized test data (will be regenerated at full size)
  # A file smaller than 100 MiB was generated by an old run of the role that
  # used the 64 MiB default.  Remove it so the copy/dd tasks below can replace
  # it with a properly-sized file for meaningful hash and lz4 benchmarks.
  ansible.builtin.file:
    path: "{{ run_benchmarks_work_dir }}/testdata.bin"
    state: absent
  when:
    - run_benchmarks_testdata_stat.stat.exists | default(false)
    - run_benchmarks_testdata_stat.stat.size | default(0) < 104857600  # < 100 MiB

- name: Re-stat test data after potential removal
  ansible.builtin.stat:
    path: "{{ run_benchmarks_work_dir }}/testdata.bin"
  register: run_benchmarks_testdata_stat

- name: Copy Silesia combined corpus to host (compression benchmark input)
  ansible.builtin.copy:
    src: "{{ run_benchmarks_fixture_dir }}/silesia_combined.bin"
    dest: "{{ run_benchmarks_work_dir }}/testdata.bin"
    mode: "0644"
  when:
    - not run_benchmarks_testdata_stat.stat.exists
    - (run_benchmarks_fixture_dir + '/silesia_combined.bin') is file

- name: Generate random test data (fallback when Silesia corpus is unavailable)
  ansible.builtin.command:
    cmd: >-
      dd if=/dev/urandom of={{ run_benchmarks_work_dir }}/testdata.bin
      bs=1M count={{ run_benchmarks_compress_size_mb }}
    creates: "{{ run_benchmarks_work_dir }}/testdata.bin"

# ---------------------------------------------------------------------------
# Collect host metadata (OS-agnostic, uses Ansible gathered facts)
# ---------------------------------------------------------------------------
- name: Gather compiler and tool versions
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      echo "::gcc::$(gcc --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::clang::$(clang --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::rustc::$(rustc --version 2>/dev/null || echo 'not installed')"
      echo "::go::$(go version 2>/dev/null || echo 'not installed')"
      echo "::python::$(python3 --version 2>/dev/null || echo 'not installed')"
      echo "::ffmpeg::$(ffmpeg -version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::openssl::$(openssl version 2>/dev/null || echo 'not installed')"
      echo "::kernel::$(uname -r)"
      echo "::bash::$(bash --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::7z::$(7z i 2>/dev/null | head -1 || echo 'not installed')"
      echo "::imagemagick::$(magick --version 2>/dev/null | head -1 || convert --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::lld::$(lld --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::sqlite3::$(sqlite3 --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::numpy::$(python3 -c 'import numpy; print(numpy.__version__)' 2>/dev/null || echo 'not installed')"
      echo "::gimp::$(gimp --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::inkscape::$(inkscape --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::perl::$(perl --version 2>/dev/null | grep -m1 'This is perl' || echo 'not installed')"
      echo "::ruby::$(ruby --version 2>/dev/null | head -1 || echo 'not installed')"
      echo "::node::$(node --version 2>/dev/null | head -1 || echo 'not installed')"
    executable: /bin/bash
  register: run_benchmarks_versions_raw
  changed_when: false
  # Non-fatal: version collection is informational only.  On systems where
  # /bin/bash is not at the standard path (e.g. NixOS), this task fails but
  # benchmarks can still proceed.
  failed_when: false

- name: Get CPU max clock speed (Linux)
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      if [ -f /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq ]; then
        cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq
      elif [ -f /proc/cpuinfo ]; then
        grep -m1 'cpu MHz' /proc/cpuinfo | awk '{print $NF * 1000}' | cut -d. -f1
      else
        echo '0'
      fi
    executable: /bin/bash
  register: run_benchmarks_cpu_freq_raw
  changed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Get CPU max clock speed (FreeBSD)
  ansible.builtin.command:
    cmd: sysctl -n hw.clockrate
  register: run_benchmarks_cpu_freq_bsd
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'FreeBSD'

# ---------------------------------------------------------------------------
# Detect distro default build flags (non-Gentoo)
# ---------------------------------------------------------------------------
- name: Initialize distro build flag variables
  ansible.builtin.set_fact:
    run_benchmarks_distro_cflags: ""
    run_benchmarks_distro_ldflags: ""

- name: Detect distro default build flags
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      CFLAGS=""
      LDFLAGS=""
      # RPM-based (Fedora, RHEL, CentOS, openSUSE, Oracle Linux)
      if command -v rpm >/dev/null 2>&1; then
        CFLAGS=$(rpm --eval '%{build_cflags}' 2>/dev/null) || \
        CFLAGS=$(rpm --eval '%{optflags}' 2>/dev/null) || true
        LDFLAGS=$(rpm --eval '%{build_ldflags}' 2>/dev/null) || true
      # Debian-based (Debian, Ubuntu, Mint, Elementary)
      elif command -v dpkg-buildflags >/dev/null 2>&1; then
        CFLAGS=$(dpkg-buildflags --get CFLAGS 2>/dev/null) || true
        LDFLAGS=$(dpkg-buildflags --get LDFLAGS 2>/dev/null) || true
      # Arch-based (Arch, Manjaro, CachyOS)
      elif [ -f /etc/makepkg.conf ]; then
        CFLAGS=$(grep '^CFLAGS=' /etc/makepkg.conf | head -1 | sed 's/^CFLAGS=//' | tr -d '"') || true
        LDFLAGS=$(grep '^LDFLAGS=' /etc/makepkg.conf | head -1 | sed 's/^LDFLAGS=//' | tr -d '"') || true
      fi
      # FreeBSD: check /etc/make.conf for overrides
      if [ -f /etc/make.conf ]; then
        fc=$(grep '^CFLAGS' /etc/make.conf | head -1 | sed 's/^CFLAGS[+:]*=[[:space:]]*//' | tr -d '"') || true
        fl=$(grep '^LDFLAGS' /etc/make.conf | head -1 | sed 's/^LDFLAGS[+:]*=[[:space:]]*//' | tr -d '"') || true
        [ -n "$fc" ] && CFLAGS="$fc"
        [ -n "$fl" ] && LDFLAGS="$fl"
      fi
      # Fallback: extract GCC default flags from its spec/config
      if [ -z "$CFLAGS" ] && command -v gcc >/dev/null 2>&1; then
        specs=$(gcc -dumpspecs 2>/dev/null || true)
        config=$(gcc -v 2>&1 | grep '^Configured with:' | sed 's/Configured with: //' || true)
        # Extract --with-arch and optimization defaults
        march=$(echo "$config" | grep -oP '(?<=--with-arch=)\S+' || true)
        mtune=$(echo "$config" | grep -oP '(?<=--with-tune=)\S+' || true)
        [ -n "$march" ] && CFLAGS="-march=${march}"
        [ -n "$mtune" ] && CFLAGS="${CFLAGS:+$CFLAGS }-mtune=${mtune}"
        # Detect hardening defaults
        echo "$specs" | grep -q 'fstack-protector' && CFLAGS="${CFLAGS:+$CFLAGS }-fstack-protector-strong"
        echo "$config" | grep -q 'enable-default-pie' && CFLAGS="${CFLAGS:+$CFLAGS }-fPIE"
        echo "$config" | grep -q 'enable-default-ssp' && CFLAGS="${CFLAGS:+$CFLAGS }-fstack-protector-strong"
      fi
      echo "${CFLAGS}"
      echo "${LDFLAGS}"
    executable: /bin/bash
  register: run_benchmarks_distro_flags_raw
  changed_when: false
  when: ansible_distribution | default('') != 'Gentoo'

- name: Parse distro build flags
  ansible.builtin.set_fact:
    run_benchmarks_distro_cflags: >-
      {{ (run_benchmarks_distro_flags_raw.stdout_lines | default([])
          | first | default('')) | trim }}
    run_benchmarks_distro_ldflags: >-
      {{ (run_benchmarks_distro_flags_raw.stdout_lines | default([]))
         [1] | default('') | trim
         if (run_benchmarks_distro_flags_raw.stdout_lines | default([]) | length > 1)
         else '' }}
  when: >-
    run_benchmarks_distro_flags_raw is defined and
    run_benchmarks_distro_flags_raw is not skipped

# ---------------------------------------------------------------------------
# GCC march=native expansion (all distros)
# ---------------------------------------------------------------------------
- name: Get GCC march=native expansion
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      gcc -march=native -Q --help=target 2>/dev/null |
        grep -m1 '^\s*-march=' | awk '{print $2}' || echo ''
    executable: /bin/bash
  register: run_benchmarks_march_native_raw
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------------
# libc variant and version (glibc vs musl — significant perf difference)
# ---------------------------------------------------------------------------
- name: Detect libc variant and version
  ansible.builtin.shell:
    cmd: |
      set +e
      set -o pipefail
      # ldd prints "ldd (GNU libc) 2.38" or "musl libc (x86_64) Version 1.2.4"
      libc_line=$(ldd --version 2>&1 | head -1 || true)
      if echo "$libc_line" | grep -qi 'musl'; then
        variant="musl"
        version=$(echo "$libc_line" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
      elif echo "$libc_line" | grep -qi 'gnu\|glibc\|eglibc'; then
        variant="glibc"
        version=$(echo "$libc_line" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
      else
        # FreeBSD libc or unknown — try getconf GNU_LIBC_VERSION
        gc=$(getconf GNU_LIBC_VERSION 2>/dev/null || true)
        if [ -n "$gc" ]; then
          variant="glibc"
          version=$(echo "$gc" | awk '{print $2}')
        else
          variant="unknown"
          version=""
        fi
      fi
      printf '%s\n%s\n' "$variant" "$version"
    executable: /bin/bash
  register: run_benchmarks_libc_raw
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------------
# GCC configured-with: hardening defaults and base architecture target
# ---------------------------------------------------------------------------
- name: Detect GCC configured-with fields
  ansible.builtin.shell:
    cmd: |
      set +e
      set -o pipefail
      cfg=$(gcc -v 2>&1 | grep '^Configured with:' | sed 's/^Configured with: //' || true)
      [ -z "$cfg" ] && cfg=$(gcc -v 2>&1 | grep '^COLLECT_GCC' | head -1 || true)
      # Emit key=value lines for fields we care about
      for field in --with-arch= --with-tune= --with-cpu=; do
        val=$(printf '%s' "$cfg" | grep -oE "${field}[^ ]+" | head -1 | sed "s/${field}//")
        [ -n "$val" ] && echo "${field#--with-}${val}"
      done
      # Boolean hardening features — emit present ones as flags
      if echo "$cfg" | grep -q 'enable-default-pie';          then echo 'default-pie=yes';     else echo 'default-pie=no';  fi
      if echo "$cfg" | grep -q 'enable-default-ssp';          then echo 'default-ssp=yes';     else echo 'default-ssp=no';  fi
      if echo "$cfg" | grep -q 'enable-link-mutex';           then echo 'link-mutex=yes';       fi
      if echo "$cfg" | grep -q 'enable-lto';                  then echo 'lto-support=yes';      else echo 'lto-support=no'; fi
      if echo "$cfg" | grep -q 'with-build-config=bootstrap-lto'; then echo 'bootstrap-lto=yes'; fi
    executable: /bin/bash
  register: run_benchmarks_gcc_config_raw
  changed_when: false
  failed_when: false

# ---------------------------------------------------------------------------
# Extended build flags: CXXFLAGS, MAKEFLAGS, RUSTFLAGS (non-Gentoo)
# ---------------------------------------------------------------------------
- name: Detect extended distro build flags
  ansible.builtin.shell:
    cmd: |
      set +e
      set -o pipefail
      CXXFLAGS=""
      MAKEFLAGS=""
      RUSTFLAGS=""
      # RPM-based
      if command -v rpm >/dev/null 2>&1; then
        CXXFLAGS=$(rpm --eval '%{build_cxxflags}' 2>/dev/null | grep -v '^%' || true)
        MAKEFLAGS=$(rpm --eval '%{_smp_mflags}' 2>/dev/null | grep -v '^%' || true)
        RUSTFLAGS=$(rpm --eval '%{build_rustflags}' 2>/dev/null | grep -v '^%' || true)
      fi
      # Debian-based
      if command -v dpkg-buildflags >/dev/null 2>&1; then
        [ -z "$CXXFLAGS" ] && CXXFLAGS=$(dpkg-buildflags --get CXXFLAGS 2>/dev/null || true)
        # DEB_BUILD_OPTIONS may contain parallel=N
        dbo=${DEB_BUILD_OPTIONS:-}
        par=$(echo "$dbo" | grep -oE 'parallel=[0-9]+' | grep -oE '[0-9]+' || true)
        [ -n "$par" ] && MAKEFLAGS="-j${par}"
      fi
      # Arch-based
      if [ -f /etc/makepkg.conf ]; then
        [ -z "$CXXFLAGS" ] && \
          CXXFLAGS=$(grep '^CXXFLAGS=' /etc/makepkg.conf | head -1 \
                     | sed 's/^CXXFLAGS=//' | tr -d '"' || true)
        [ -z "$MAKEFLAGS" ] && \
          MAKEFLAGS=$(grep '^MAKEFLAGS=' /etc/makepkg.conf | head -1 \
                      | sed 's/^MAKEFLAGS=//' | tr -d '"' || true)
        [ -z "$RUSTFLAGS" ] && \
          RUSTFLAGS=$(grep '^RUSTFLAGS=' /etc/makepkg.conf | head -1 \
                      | sed 's/^RUSTFLAGS=//' | tr -d '"' || true)
      fi
      # Alpine abuild
      if [ -f /etc/abuild.conf ]; then
        [ -z "$CXXFLAGS" ] && \
          CXXFLAGS=$(grep '^CXXFLAGS=' /etc/abuild.conf | head -1 \
                     | sed 's/^CXXFLAGS=//' | tr -d '"' || true)
        [ -z "$MAKEFLAGS" ] && \
          MAKEFLAGS=$(grep '^MAKEFLAGS=' /etc/abuild.conf | head -1 \
                      | sed 's/^MAKEFLAGS=//' | tr -d '"' || true)
      fi
      # FreeBSD /etc/make.conf
      if [ -f /etc/make.conf ]; then
        [ -z "$CXXFLAGS" ] && \
          CXXFLAGS=$(grep '^CXXFLAGS' /etc/make.conf | head -1 \
                     | sed 's/^CXXFLAGS[+:]*=[[:space:]]*//' | tr -d '"' || true)
        [ -z "$MAKEFLAGS" ] && \
          MAKEFLAGS=$(grep '^MAKEFLAGS\|^MAKE_JOBS_NUMBER' /etc/make.conf | head -1 \
                      | sed 's/^[A-Z_]*=[[:space:]]*//' | tr -d '"' || true)
      fi
      printf '%s\n%s\n%s\n' "$CXXFLAGS" "$MAKEFLAGS" "$RUSTFLAGS"
    executable: /bin/bash
  register: run_benchmarks_extended_flags_raw
  changed_when: false
  failed_when: false
  when: ansible_distribution | default('') != 'Gentoo'

- name: Detect Linux scheduler type
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      if [ -f /sys/kernel/debug/sched/features ] || [ -f /sys/kernel/debug/sched_features ]; then
        feat=$(cat /sys/kernel/debug/sched/features /sys/kernel/debug/sched_features 2>/dev/null | head -1)
        if echo "$feat" | grep -q 'EEVDF'; then
          echo 'EEVDF'
        else
          echo 'CFS'
        fi
      elif grep -q 'CONFIG_SCHED_CLASS_EXT=y' "/boot/config-$(uname -r)" 2>/dev/null; then
        echo 'sched_ext'
      elif [ -d /sys/kernel/sched_ext ] || [ -f /sys/kernel/sched_ext/state ]; then
        echo 'sched_ext'
      else
        kver=$(uname -r | grep -oP '^\d+\.\d+')
        major=$(echo "$kver" | cut -d. -f1)
        minor=$(echo "$kver" | cut -d. -f2)
        if [ "$major" -gt 6 ] || { [ "$major" -eq 6 ] && [ "$minor" -ge 6 ]; }; then
          echo 'EEVDF'
        else
          echo 'CFS'
        fi
      fi
    executable: /bin/bash
  register: run_benchmarks_scheduler_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect filesystem of work directory
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      df -T {{ run_benchmarks_work_dir }} 2>/dev/null | awk 'NR==2{print $2}' || echo 'unknown'
    executable: /bin/bash
  register: run_benchmarks_filesystem_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect filesystem of work directory (FreeBSD)
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      fstype=$(df -T {{ run_benchmarks_work_dir }} 2>/dev/null | awk 'NR==2{print $2}')
      [ -z "$fstype" ] && fstype='unknown'
      echo "$fstype"
    executable: /bin/bash
  register: run_benchmarks_filesystem_bsd_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'FreeBSD'

- name: Detect swap status
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      if swapon --show --noheadings 2>/dev/null | grep -q .; then
        echo 'enabled'
      elif [ -f /proc/swaps ] && awk 'NR>1{found=1} END{exit !found}' /proc/swaps 2>/dev/null; then
        echo 'enabled'
      else
        echo 'disabled'
      fi
    executable: /bin/bash
  register: run_benchmarks_swap_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect swap status (FreeBSD)
  ansible.builtin.command:
    cmd: swapinfo -k
  register: run_benchmarks_swap_bsd_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'FreeBSD'

- name: Detect CPU frequency governor
  ansible.builtin.shell:
    cmd: cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor 2>/dev/null || echo 'unknown'
  register: run_benchmarks_cpu_governor_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect SMT / Hyper-threading state
  ansible.builtin.shell:
    cmd: cat /sys/devices/system/cpu/smt/active 2>/dev/null || echo ''
  register: run_benchmarks_smt_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect virtualization type
  ansible.builtin.command:
    cmd: systemd-detect-virt
  register: run_benchmarks_virt_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect Transparent Huge Pages setting
  ansible.builtin.shell:
    cmd: >-
      grep -oP '\[\K\w+(?=\])' /sys/kernel/mm/transparent_hugepage/enabled
      2>/dev/null || echo 'unknown'
  register: run_benchmarks_thp_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect L3 cache size
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      lscpu 2>/dev/null | awk -F':[[:space:]]+' '/^L3 cache/{print $2; exit}'
    executable: /bin/bash
  register: run_benchmarks_l3_cache_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect kernel mitigation settings
  ansible.builtin.shell:
    cmd: grep -oP 'mitigations=\S+' /proc/cmdline 2>/dev/null || echo 'default'
  register: run_benchmarks_mitigations_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect kernel preemption model
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      for cfg in /boot/config-$(uname -r) /proc/config.gz; do
        [ -f "$cfg" ] || continue
        case "$cfg" in *.gz) zcat "$cfg";; *) cat "$cfg";; esac \
          | grep -E '^CONFIG_PREEMPT' | head -8
        break
      done
    executable: /bin/bash
  register: run_benchmarks_preempt_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect I/O scheduler for work directory device
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      dev=$(df --output=source {{ run_benchmarks_work_dir }} 2>/dev/null \
            | tail -1 | sed 's|/dev/||;s|[0-9]*$||;s|p[0-9]*$||')
      sched_file="/sys/block/${dev}/queue/scheduler"
      if [ -f "$sched_file" ]; then
        grep -oP '\[\K[^\]]+' "$sched_file" 2>/dev/null || cat "$sched_file"
      else
        echo 'unknown'
      fi
    executable: /bin/bash
  register: run_benchmarks_io_scheduler_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect NUMA node count
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      lscpu 2>/dev/null | awk -F':[[:space:]]+' '/^NUMA node\(s\)/{print $2; exit}' || echo '1'
    executable: /bin/bash
  register: run_benchmarks_numa_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect memory speed (via dmidecode)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      (sudo -n dmidecode -t 17 2>/dev/null || true) \
        | awk -F': ' '/^\s+Speed:/ && !/Unknown/{gsub(/^ +/,"",$2); print $2; exit}'
    executable: /bin/bash
  register: run_benchmarks_mem_speed_raw
  changed_when: false
  failed_when: false
  when: ansible_system | default('') == 'Linux'

- name: Detect Gentoo profile
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      eselect profile show 2>/dev/null | awk 'NR==2{gsub(/^ +/,""); print}' || echo ''
    executable: /bin/bash
  register: run_benchmarks_profile_raw
  changed_when: false
  failed_when: false
  when: ansible_distribution | default('') == 'Gentoo'

- name: Read Gentoo make.conf
  ansible.builtin.slurp:
    src: /etc/portage/make.conf
  register: run_benchmarks_makeconf_raw
  failed_when: false
  when: ansible_distribution | default('') == 'Gentoo'

- name: Run CPU calibration benchmark
  ansible.builtin.include_tasks: calibrate.yml

# ---------------------------------------------------------------------------
# CPU affinity support
# ---------------------------------------------------------------------------
- name: Check taskset availability  # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: command -v taskset
  register: run_benchmarks_taskset_check
  changed_when: false
  failed_when: false
  when:
    - ansible_system | default('Linux') == 'Linux'
    - run_benchmarks_cpu_affinity | length > 0

- name: Compute effective hyperfine invocation
  ansible.builtin.set_fact:
    run_benchmarks_hyperfine_bin: >-
      {%- if run_benchmarks_cpu_affinity | length > 0 -%}
      taskset -c {{ run_benchmarks_cpu_affinity }} hyperfine{%- else -%}
      hyperfine{%- endif -%}

- name: Parse host metadata
  ansible.builtin.set_fact:
    run_benchmarks_metadata:
      hostname: "{{ inventory_hostname }}"
      os: "{{ ansible_distribution | default('unknown') }}"
      os_version: "{{ ansible_distribution_version | default('') }}"
      os_family: "{{ ansible_os_family | default('unknown') }}"
      cpu_model: "{{ ansible_processor[2] | default('unknown') }}"
      cpu_cores: "{{ ansible_processor_vcpus | default(1) }}"
      cpu_mhz: >-
        {{
          (run_benchmarks_cpu_freq_raw.stdout | default('0') | trim | int / 1000)
          | round(0) | int
          if (ansible_system | default('') == 'Linux')
          else
          (run_benchmarks_cpu_freq_bsd.stdout | default('0') | trim | int)
          if (ansible_system | default('') == 'FreeBSD')
          else 0
        }}
      march_native: "{{ run_benchmarks_march_native_raw.stdout | default('') | trim }}"
      versions: >-
        {{ run_benchmarks_versions_raw.stdout_lines
           | select('match', '^::')
           | map('regex_replace', '^::([^:]+)::(.*)', '\1=\2')
           | list }}
      common_flags: >-
        {{
          (make_conf | default({})).get('COMMON_FLAGS', '')
          if (ansible_distribution | default('') == 'Gentoo')
          else run_benchmarks_distro_cflags
        }}
      cflags: >-
        {{
          (build_profile | default({})).get('CFLAGS', '')
          if (ansible_distribution | default('') == 'Gentoo')
          else run_benchmarks_distro_cflags
        }}
      ldflags: >-
        {{
          (build_profile | default({})).get('LDFLAGS', '')
          if (ansible_distribution | default('') == 'Gentoo')
          else run_benchmarks_distro_ldflags
        }}
      features: "{{ (make_conf | default({})).get('FEATURES', '') }}"
      scheduler: >-
        {{
          (run_benchmarks_scheduler_raw.stdout | default('') | trim)
          if (ansible_system | default('') == 'Linux')
          else 'ULE'
          if (ansible_system | default('') == 'FreeBSD')
          else 'unknown'
        }}
      filesystem: >-
        {{
          (run_benchmarks_filesystem_raw.stdout | default('') | trim)
          if (ansible_system | default('') == 'Linux')
          else (run_benchmarks_filesystem_bsd_raw.stdout | default('') | trim)
          if (ansible_system | default('') == 'FreeBSD')
          else 'unknown'
        }}
      swap_enabled: >-
        {{
          (run_benchmarks_swap_raw.stdout | default('') | trim == 'enabled')
          if (ansible_system | default('') == 'Linux')
          else (run_benchmarks_swap_bsd_raw.stdout_lines | default([]) | length > 1)
          if (ansible_system | default('') == 'FreeBSD')
          else false
        }}
      calibration_mips: "{{ run_benchmarks_calibration_mips | default(0) | int }}"
      is_hypervisor: "{{ run_benchmarks_is_hypervisor | default(false) | bool }}"
      cpu_governor: >-
        {{
          run_benchmarks_cpu_governor_raw.stdout | default('') | trim
          if (ansible_system | default('') == 'Linux')
          else 'unknown'
        }}
      smt_active: >-
        {{
          (run_benchmarks_smt_raw.stdout | default('') | trim == '1')
          if (ansible_system | default('') == 'Linux')
          else 'unknown'
        }}
      virt_type: >-
        {{
          run_benchmarks_virt_raw.stdout | default('none') | trim
          if (ansible_system | default('') == 'Linux')
          else 'unknown'
        }}
      thp: >-
        {{
          run_benchmarks_thp_raw.stdout | default('unknown') | trim
          if (ansible_system | default('') == 'Linux')
          else 'unknown'
        }}
      cpu_cache_l3: >-
        {{
          run_benchmarks_l3_cache_raw.stdout | default('') | trim
          if (ansible_system | default('') == 'Linux')
          else ''
        }}
      mitigations: >-
        {{
          run_benchmarks_mitigations_raw.stdout | default('default') | trim
          if (ansible_system | default('') == 'Linux')
          else 'unknown'
        }}
      preempt_model: >-
        {%- set pc = run_benchmarks_preempt_raw.stdout | default('') -%}
        {%- if 'CONFIG_PREEMPT_RT=y' in pc -%}RT{%- elif 'CONFIG_PREEMPT_DYNAMIC=y' in pc -%}DYNAMIC{%- elif 'CONFIG_PREEMPT=y' in pc -%}FULL{%- elif 'CONFIG_PREEMPT_VOLUNTARY=y' in pc -%}VOLUNTARY{%- elif 'CONFIG_PREEMPT_NONE=y' in pc -%}NONE{%- else -%}unknown{%- endif -%}
      io_scheduler: >-
        {{
          run_benchmarks_io_scheduler_raw.stdout | default('') | trim
          if (ansible_system | default('') == 'Linux')
          else 'unknown'
        }}
      numa_nodes: >-
        {{
          run_benchmarks_numa_raw.stdout | default('1') | trim | int
          if (ansible_system | default('') == 'Linux')
          else 1
        }}
      mem_speed: >-
        {{
          run_benchmarks_mem_speed_raw.stdout | default('') | trim
          if (ansible_system | default('') == 'Linux')
          else ''
        }}
      cpu_flags_x86: "{{ (make_conf | default({})).get('CPU_FLAGS_X86', '') }}"
      makeopts: "{{ (make_conf | default({})).get('MAKEOPTS', '') }}"
      gentoo_profile: >-
        {{
          run_benchmarks_profile_raw.stdout | default('') | trim
          if (ansible_distribution | default('') == 'Gentoo')
          else ''
        }}
      libc_variant: >-
        {{ (run_benchmarks_libc_raw.stdout_lines | default([]) | first | default('')) | trim }}
      libc_version: >-
        {{ (run_benchmarks_libc_raw.stdout_lines | default([]))[1] | default('') | trim }}
      gcc_config: >-
        {{ run_benchmarks_gcc_config_raw.stdout_lines | default([]) | map('trim') | reject('equalto', '') | list }}
      cxxflags: >-
        {{
          (make_conf | default({})).get('CXXFLAGS', '')
          if (ansible_distribution | default('') == 'Gentoo')
          else (run_benchmarks_extended_flags_raw.stdout_lines | default([]) | first | default('')) | trim
        }}
      makeflags: >-
        {{
          (make_conf | default({})).get('MAKEOPTS', '')
          if (ansible_distribution | default('') == 'Gentoo')
          else ((run_benchmarks_extended_flags_raw.stdout_lines | default([]))[1] | default('')) | trim
        }}
      rustflags: >-
        {{
          (make_conf | default({})).get('RUSTFLAGS', '')
          if (ansible_distribution | default('') == 'Gentoo')
          else ((run_benchmarks_extended_flags_raw.stdout_lines | default([]))[2] | default('')) | trim
        }}

- name: Write host metadata JSON
  ansible.builtin.copy:
    content: "{{ run_benchmarks_metadata | to_nice_json }}"
    dest: "{{ run_benchmarks_work_dir }}/metadata.json"
    mode: "0644"
