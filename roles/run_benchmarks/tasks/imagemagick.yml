---
# ImageMagick image processing benchmarks.
# Tests resize (filter quality/speed), convolution effects, and format
# encode/decode speed.  Results are sensitive to SIMD extensions (AVX2,
# AVX-512), libjpeg-turbo and libwebp builds, and OpenMP parallelism —
# making them a strong compiler-flag and CPU_FLAGS_X86 signal.

# ── Availability check ────────────────────────────────────────────────────

- name: Check ImageMagick availability
  ansible.builtin.shell:
    cmd: command -v magick 2>/dev/null || command -v convert 2>/dev/null
  register: run_benchmarks_im_check
  changed_when: false
  failed_when: false

# ── Detect binary and supported formats ──────────────────────────────────

- name: Detect ImageMagick binary and format support
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if command -v magick >/dev/null 2>&1; then BIN=magick; else BIN=convert; fi
      echo "::bin::${BIN}"
      FMTS=$(${BIN} -list format 2>/dev/null)
      echo "$FMTS" | grep -qi '^ *WEBP.*W' && echo '::has_webp::1' || echo '::has_webp::0'
      echo "$FMTS" | grep -qi '^ *AVIF.*W' && echo '::has_avif::1' || echo '::has_avif::0'
    executable: /bin/bash
  register: run_benchmarks_im_detect
  changed_when: false
  failed_when: false
  when: run_benchmarks_im_check.rc == 0

- name: Parse ImageMagick capabilities
  ansible.builtin.set_fact:
    run_benchmarks_im_bin: >-
      {{ (run_benchmarks_im_detect.stdout_lines
          | select('match', '^::bin::')
          | first
          | regex_replace('^::bin::', '')) | trim }}
    run_benchmarks_im_has_webp: >-
      {{ (run_benchmarks_im_detect.stdout_lines
          | select('match', '^::has_webp::')
          | first
          | regex_replace('^::has_webp::', '')) | trim == '1' }}
    run_benchmarks_im_has_avif: >-
      {{ (run_benchmarks_im_detect.stdout_lines
          | select('match', '^::has_avif::')
          | first
          | regex_replace('^::has_avif::', '')) | trim == '1' }}
  when:
    - run_benchmarks_im_check.rc == 0
    - run_benchmarks_im_detect is not skipped

# ── Generate test images ──────────────────────────────────────────────────

# Run once on the Ansible controller: generate deterministic fixture images
# from a fixed seed so every host receives identical source material.
- name: Generate deterministic benchmark fixture images on controller
  ansible.builtin.command:
    cmd: >-
      python3 {{ playbook_dir | dirname }}/scripts/generate_benchmark_images.py
      {{ run_benchmarks_fixture_dir }}
    creates: "{{ run_benchmarks_fixture_dir }}/im_4k.png"
  delegate_to: localhost
  run_once: true

- name: Copy benchmark PNG source image to host
  ansible.builtin.copy:
    src: "{{ run_benchmarks_fixture_dir }}/im_4k.png"
    dest: "{{ run_benchmarks_work_dir }}/im_4k.png"
    mode: "0644"
  when: run_benchmarks_im_check.rc == 0

- name: Copy benchmark JPEG source image to host
  ansible.builtin.copy:
    src: "{{ run_benchmarks_fixture_dir }}/im_4k_q90.jpg"
    dest: "{{ run_benchmarks_work_dir }}/im_4k_q90.jpg"
    mode: "0644"
  when: run_benchmarks_im_check.rc == 0

- name: Copy benchmark WebP source image to host
  ansible.builtin.copy:
    src: "{{ run_benchmarks_fixture_dir }}/im_4k.webp"
    dest: "{{ run_benchmarks_work_dir }}/im_4k.webp"
    mode: "0644"
  when:
    - run_benchmarks_im_check.rc == 0
    - run_benchmarks_im_has_webp | default(false) | bool
    - (run_benchmarks_fixture_dir + '/im_4k.webp') is file

# ── Kodak Lossless True Color Image Suite ────────────────────────────────
# 24 natural-scene photographs, 768×512 each — the standard reference set
# for published image-codec research.  Copied from controller fixtures.

- name: Check whether Kodak reference images are present on host
  ansible.builtin.stat:
    path: "{{ run_benchmarks_work_dir }}/kodak/kodim01.png"
  register: run_benchmarks_kodak_stat
  when: run_benchmarks_im_check.rc == 0

- name: Copy Kodak Lossless True Color Image Suite to host
  ansible.builtin.copy:
    src: "{{ run_benchmarks_fixture_dir }}/kodak/"
    dest: "{{ run_benchmarks_work_dir }}/kodak/"
    mode: "0644"
  when:
    - run_benchmarks_im_check.rc == 0
    - not run_benchmarks_kodak_stat.stat.exists | default(true)
    - (run_benchmarks_fixture_dir + '/kodak') is directory

- name: Run ImageMagick Kodak JPEG-Q90 encoding benchmark
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      IM={{ run_benchmarks_im_bin }}

      # Count available Kodak images
      count=$(find kodak -name "kodim*.png" -type f 2>/dev/null | wc -l)
      [ "$count" -eq 0 ] && exit 0

      # Benchmark: encode all Kodak images in a single command to accumulate
      # enough work for a meaningful timing (24 × ~20 ms = ~480 ms per run).
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/imagemagick_kodak_encode.json \
        --command-name "kodak-24-jpeg-q90" \
          "for img in kodak/kodim*.png; do ${IM} \"\$img\" -quality 90 JPEG:/dev/null; done" \
        --command-name "kodak-24-png-z6" \
          "for img in kodak/kodim*.png; do ${IM} \"\$img\" -define png:compression-level=6 PNG:/dev/null; done"
    executable: /bin/bash
  args:
    executable: /bin/bash
  register: run_benchmarks_kodak_encode_result
  changed_when: false
  failed_when: false
  when:
    - run_benchmarks_im_check.rc == 0
    - run_benchmarks_kodak_stat.stat.exists | default(false)

- name: Warn on imagemagick_kodak_encode benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: imagemagick_kodak_encode benchmark exited
      rc={{ run_benchmarks_kodak_encode_result.rc }}.
      {{ run_benchmarks_kodak_encode_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_kodak_encode_result is not skipped
    - run_benchmarks_kodak_encode_result.rc | default(0) != 0

# ── Resize benchmarks ─────────────────────────────────────────────────────

- name: Run ImageMagick resize benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      IM={{ run_benchmarks_im_bin }}

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json imagemagick_resize.json \
        --command-name "lanczos-4k-1080p"  "${IM} im_4k.png -filter Lanczos  -resize 1920x1080 null:" \
        --command-name "mitchell-4k-1080p" "${IM} im_4k.png -filter Mitchell -resize 1920x1080 null:" \
        --command-name "box-4k-1080p"      "${IM} im_4k.png -filter Box      -resize 1920x1080 null:" \
        --command-name "lanczos-4k-thumb"  "${IM} im_4k.png -filter Lanczos  -resize 256x256   null:" \
        --command-name "mitchell-4k-thumb" "${IM} im_4k.png -filter Mitchell -resize 256x256   null:"
    executable: /bin/bash
  register: run_benchmarks_imagemagick_resize_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_im_check.rc == 0

- name: Warn on imagemagick_resize benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: imagemagick_resize benchmark exited
      rc={{ run_benchmarks_imagemagick_resize_result.rc }}.
      {{ run_benchmarks_imagemagick_resize_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_imagemagick_resize_result is not skipped
    - run_benchmarks_imagemagick_resize_result.rc | default(0) != 0

# ── Effects benchmarks ────────────────────────────────────────────────────

- name: Run ImageMagick effects benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      IM={{ run_benchmarks_im_bin }}

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json imagemagick_effects.json \
        --command-name "gaussian-blur-r8"  "${IM} im_4k.png -blur 0x8 null:" \
        --command-name "unsharp-mask"      "${IM} im_4k.png -unsharp 0x1+1+0.05 null:" \
        --command-name "grayscale"         "${IM} im_4k.png -colorspace Gray null:" \
        --command-name "emboss"            "${IM} im_4k.png -emboss 2 null:" \
        --command-name "rotate-45"         "${IM} im_4k.png -background black -rotate 45 null:"
    executable: /bin/bash
  register: run_benchmarks_imagemagick_effects_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_im_check.rc == 0

- name: Warn on imagemagick_effects benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: imagemagick_effects benchmark exited
      rc={{ run_benchmarks_imagemagick_effects_result.rc }}.
      {{ run_benchmarks_imagemagick_effects_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_imagemagick_effects_result is not skipped
    - run_benchmarks_imagemagick_effects_result.rc | default(0) != 0

# ── Format encode benchmarks ──────────────────────────────────────────────

- name: Run ImageMagick format encode benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      IM={{ run_benchmarks_im_bin }}

      CMDS=()
      CMDS+=(--command-name "jpeg-q90" "${IM} im_4k.png   -quality 90 JPEG:/dev/null")
      CMDS+=(--command-name "jpeg-q50" "${IM} im_4k.png   -quality 50 JPEG:/dev/null")
      CMDS+=(--command-name "png-z6"   "${IM} im_4k_q90.jpg -define png:compression-level=6 PNG:/dev/null")
      CMDS+=(--command-name "png-z1"   "${IM} im_4k_q90.jpg -define png:compression-level=1 PNG:/dev/null")
      ${IM} -list format 2>/dev/null | grep -qi '^ *WEBP.*W' && {
        CMDS+=(--command-name "webp-lossy"    "${IM} im_4k.png -quality 90              WEBP:/dev/null")
        CMDS+=(--command-name "webp-lossless" "${IM} im_4k.png -define webp:lossless=true WEBP:/dev/null")
      }
      ${IM} -list format 2>/dev/null | grep -qi '^ *AVIF.*W' && \
        CMDS+=(--command-name "avif-q60" "${IM} im_4k.png -quality 60 AVIF:/dev/null")

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json imagemagick_encode.json \
        "${CMDS[@]}"
    executable: /bin/bash
  args:
    executable: /bin/bash
  register: run_benchmarks_imagemagick_encode_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_im_check.rc == 0

- name: Warn on imagemagick_encode benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: imagemagick_encode benchmark exited
      rc={{ run_benchmarks_imagemagick_encode_result.rc }}.
      {{ run_benchmarks_imagemagick_encode_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_imagemagick_encode_result is not skipped
    - run_benchmarks_imagemagick_encode_result.rc | default(0) != 0

# ── Format decode benchmarks ─────────────────────────────────────────────

- name: Run ImageMagick format decode benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      IM={{ run_benchmarks_im_bin }}

      CMDS=()
      CMDS+=(--command-name "jpeg-decode" "${IM} im_4k_q90.jpg null:")
      CMDS+=(--command-name "png-decode"  "${IM} im_4k.png     null:")
      [ -f im_4k.webp ] && \
        CMDS+=(--command-name "webp-decode" "${IM} im_4k.webp null:")

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json imagemagick_decode.json \
        "${CMDS[@]}"
    executable: /bin/bash
  args:
    executable: /bin/bash
  register: run_benchmarks_imagemagick_decode_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_im_check.rc == 0

- name: Warn on imagemagick_decode benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: imagemagick_decode benchmark exited
      rc={{ run_benchmarks_imagemagick_decode_result.rc }}.
      {{ run_benchmarks_imagemagick_decode_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_imagemagick_decode_result is not skipped
    - run_benchmarks_imagemagick_decode_result.rc | default(0) != 0
