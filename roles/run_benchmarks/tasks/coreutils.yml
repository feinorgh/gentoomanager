---
# Coreutils and development tools benchmarks

- name: Generate sort test data for coreutils benchmarks
  ansible.builtin.script:
    cmd: gen_sortdata.py
    chdir: "{{ run_benchmarks_work_dir }}"
    creates: "{{ run_benchmarks_work_dir }}/sortdata.txt"

- name: Check findtree file count
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      find {{ run_benchmarks_work_dir }}/findtree -type f 2>/dev/null | wc -l || echo 0
    executable: /bin/bash
  register: run_benchmarks_findtree_count
  changed_when: false
  failed_when: false

- name: Remove undersized findtree (will be regenerated with 10 000 files)
  # Old runs created 2 000 files (50 dirs × 2 subdirs × 20 files).
  # find/du/tar on 2 000 inodes completes in < 50 ms — not statistically
  # meaningful.  10 000 files pushes timings comfortably above 100 ms.
  ansible.builtin.file:
    path: "{{ run_benchmarks_work_dir }}/findtree"
    state: absent
  when: run_benchmarks_findtree_count.stdout | trim | int < 9000

- name: Create large directory tree for find/tar/du benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      python3 - << 'PYEOF'
      import os
      base = "{{ run_benchmarks_work_dir }}/findtree"
      for i in range(100):
          for sub in ("sub_a", "sub_b"):
              d = os.path.join(base, "dir_%03d" % i, sub)
              os.makedirs(d, exist_ok=True)
              for j in range(50):
                  with open(os.path.join(d, "file_%02d.txt" % j), "w") as f:
                      f.write("bench dir=%03d sub=%s n=%02d\n" % (i, sub, j) + "x" * 256 + "\n")
                  with open(os.path.join(d, "file_%02d.dat" % j), "w") as f:
                      f.write("bench dir=%03d sub=%s n=%02d\n" % (i, sub, j) + "y" * 256 + "\n")
      PYEOF
    executable: /bin/bash
    creates: "{{ run_benchmarks_work_dir }}/findtree"
  changed_when: false
  failed_when: false

- name: Run coreutils benchmarks
  ansible.builtin.shell:
    cmd: |
      set -e
      cd {{ run_benchmarks_work_dir }}
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_fast_runs }} \
        --warmup {{ run_benchmarks_fast_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/coreutils.json \
        --command-name 'sort' 'sort sortdata.txt > /dev/null' \
        --command-name 'sort-unique' 'sort -u sortdata.txt > /dev/null' \
        --command-name 'wc-lines' 'wc -l sortdata.txt' \
        --command-name 'grep-pattern' 'grep -c "^[A-Z].*[0-9]$" sortdata.txt || true' \
        --command-name 'find-files' 'find findtree -name "*.txt" -type f' \
        --command-name 'find-exec' 'find findtree -name "*.txt" -exec wc -c {} +' \
        --command-name 'tar-create' 'tar cf /dev/null findtree' \
        --command-name 'du-summary' 'du -sh findtree'
  register: run_benchmarks_coreutils_result
  changed_when: false
  failed_when: false

- name: Warn on coreutils benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: coreutils benchmark exited
      rc={{ run_benchmarks_coreutils_result.rc }}.
      {{ run_benchmarks_coreutils_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_coreutils_result is not skipped
    - run_benchmarks_coreutils_result.rc | default(0) != 0

- name: Check git availability  # noqa: command-instead-of-module command-instead-of-shell
  ansible.builtin.shell:
    cmd: command -v git
  register: run_benchmarks_git_check
  changed_when: false
  failed_when: false

- name: Create git test repo
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      if [ ! -d gitrepo/.git ]; then
        mkdir -p gitrepo && cd gitrepo
        git init
        git config user.email "bench@test"
        git config user.name "Bench"
        # Create commit history
        for i in $(seq 1 100); do
          echo "Content for commit $i with random data $(head -c 100 /dev/urandom | base64)" > "file_$i.txt"
          git add .
          git commit -m "Commit $i" --quiet
        done
        # Create a branch with changes
        git checkout -b feature
        for i in $(seq 1 20); do
          echo "Feature change $i" >> file_1.txt
          git commit -am "Feature $i" --quiet
        done
        git checkout main 2>/dev/null || git checkout master
      fi
    executable: /bin/bash
    creates: "{{ run_benchmarks_work_dir }}/gitrepo/.git"

- name: Run git benchmarks
  ansible.builtin.shell:
    cmd: |
      set -e
      cd {{ run_benchmarks_work_dir }}/gitrepo
      BRANCH=$(git branch --show-current)
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_fast_runs }} \
        --warmup {{ run_benchmarks_fast_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/git.json \
        --command-name 'git-log' 'git log --oneline' \
        --command-name 'git-log-stat' 'git log --stat --quiet' \
        --command-name 'git-diff' "git diff feature..${BRANCH}" \
        --command-name 'git-blame' 'git blame file_1.txt' \
        --command-name 'git-status' 'git status'
  when: run_benchmarks_git_check.rc == 0
  register: run_benchmarks_coreutils_git_result
  changed_when: false
  failed_when: false

- name: Warn on coreutils_git benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: coreutils_git benchmark exited
      rc={{ run_benchmarks_coreutils_git_result.rc }}.
      {{ run_benchmarks_coreutils_git_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_coreutils_git_result is not skipped
    - run_benchmarks_coreutils_git_result.rc | default(0) != 0

- name: Check diff tool availability
  ansible.builtin.command:
    cmd: command -v diff
  register: run_benchmarks_diff_check
  changed_when: false
  failed_when: false

- name: Run diff benchmark
  ansible.builtin.shell:
    cmd: |
      set -e
      cd {{ run_benchmarks_work_dir }}
      # Create two similar large files
      head -400000 sortdata.txt > diff_a.txt
      tail -400000 sortdata.txt > diff_b.txt
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/diff.json \
        --command-name 'diff' 'diff diff_a.txt diff_b.txt > /dev/null || true' \
        --command-name 'comm' 'comm <(sort diff_a.txt) <(sort diff_b.txt) > /dev/null'
  when: run_benchmarks_diff_check.rc == 0
  register: run_benchmarks_coreutils_diff_result
  changed_when: false
  failed_when: false

- name: Warn on coreutils_diff benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: coreutils_diff benchmark exited
      rc={{ run_benchmarks_coreutils_diff_result.rc }}.
      {{ run_benchmarks_coreutils_diff_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_coreutils_diff_result is not skipped
    - run_benchmarks_coreutils_diff_result.rc | default(0) != 0
