---
# Restore the VM to its original state after benchmarking.
# OS-agnostic — works on Linux (all distros) and FreeBSD.

# ── ASLR ──────────────────────────────────────────────────────────────────
- name: Re-enable ASLR (Linux)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      val="{{ run_benchmarks_orig_aslr.content | b64decode | trim }}"
      case "$val" in
        0|1|2) echo "$val" > /proc/sys/kernel/randomize_va_space ;;
        *) echo "WARN: unexpected ASLR value: $val" >&2 ;;
      esac
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_aslr is defined and
    run_benchmarks_orig_aslr.content is defined

- name: Re-enable ASLR (FreeBSD)
  ansible.builtin.command:
    cmd: >-
      sysctl kern.elf64.aslr.enable={{ run_benchmarks_orig_aslr_bsd.stdout | default('1') | trim }}
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'FreeBSD' and
    run_benchmarks_orig_aslr_bsd is defined and
    run_benchmarks_orig_aslr_bsd is not failed

# ── NMI watchdog ──────────────────────────────────────────────────────────
- name: Re-enable NMI watchdog (Linux)
  ansible.builtin.shell:
    cmd: echo 1 > /proc/sys/kernel/nmi_watchdog
  become: true
  changed_when: true
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

# ── CPU governor ──────────────────────────────────────────────────────────
- name: Restore CPU governor (Linux)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      val="{{ run_benchmarks_orig_governor.content | b64decode | trim }}"
      if echo "$val" | grep -qE '^[a-z_]+$'; then
        for f in /sys/devices/system/cpu/*/cpufreq/scaling_governor; do
          [ -f "$f" ] && echo "$val" > "$f"
        done
      else
        echo "WARN: unexpected governor value: $val" >&2
      fi
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_governor is defined and
    run_benchmarks_orig_governor.content is defined

# ── I/O scheduler ────────────────────────────────────────────────────────
- name: Restore I/O scheduler (Linux)
  ansible.builtin.shell:
    cmd: |
      SCHED="{{ run_benchmarks_orig_iosched.stdout | trim }}"
      for disk in $(lsblk -dno NAME); do
        echo "$SCHED" > "/sys/block/${disk}/queue/scheduler" 2>/dev/null || true
      done
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_iosched is defined and
    run_benchmarks_orig_iosched is not failed

# ── Services ─────────────────────────────────────────────────────────────
- name: Restart stopped services (systemd)
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop: "{{ run_benchmarks_active_services.stdout_lines | default([]) }}"
  become: true
  when: >-
    ansible_service_mgr | default('systemd') == 'systemd' and
    run_benchmarks_active_services.stdout_lines | default([]) | length > 0
  failed_when: false

# ── Swap ─────────────────────────────────────────────────────────────────
- name: Re-enable swap (Linux)
  ansible.builtin.command:
    cmd: swapon -a
  become: true
  changed_when: true
  failed_when: false
  when:
    - ansible_system | default('Linux') == 'Linux'
    - not (run_benchmarks_is_hypervisor | default(false) | bool)
    - run_benchmarks_orig_swap is defined
    - run_benchmarks_orig_swap.stdout | default('') | length > 0

- name: Re-enable swap (FreeBSD)
  ansible.builtin.command:
    cmd: swapon -a
  become: true
  changed_when: true
  failed_when: false
  when:
    - ansible_system | default('Linux') == 'FreeBSD'
    - not (run_benchmarks_is_hypervisor | default(false) | bool)
    - run_benchmarks_orig_swap_bsd is defined
    - run_benchmarks_orig_swap_bsd.stdout_lines | default([]) | length > 1

# ── Caches ───────────────────────────────────────────────────────────────
- name: Drop filesystem caches after benchmarks (Linux)
  ansible.builtin.shell:
    cmd: echo 3 > /proc/sys/vm/drop_caches
  become: true
  changed_when: true
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

# ── CPU boost ────────────────────────────────────────────────────────────
- name: Restore Intel turbo boost
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      val="{{ run_benchmarks_orig_intel_turbo.content | b64decode | trim }}"
      if echo "$val" | grep -qE '^[01]$'; then
        echo "$val" > /sys/devices/system/cpu/intel_pstate/no_turbo
      fi
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_intel_turbo is defined and
    run_benchmarks_orig_intel_turbo.content is defined

- name: Restore AMD/generic CPU boost
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      val="{{ run_benchmarks_orig_amd_boost.content | b64decode | trim }}"
      if echo "$val" | grep -qE '^[01]$'; then
        echo "$val" > /sys/devices/system/cpu/cpufreq/boost
      fi
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_amd_boost is defined and
    run_benchmarks_orig_amd_boost.content is defined

# ── C-states ─────────────────────────────────────────────────────────────
- name: Restore CPU C-state latency constraint
  ansible.builtin.shell:
    cmd: |
      for f in /sys/devices/system/cpu/cpu*/power/pm_qos_resume_latency_us; do
        if [ -f "$f" ]; then echo n/a > "$f" 2>/dev/null; fi
      done
  become: true
  changed_when: true
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

# ── THP ──────────────────────────────────────────────────────────────────
- name: Restore THP setting (Linux)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      val="{{ run_benchmarks_orig_thp.content | b64decode | trim }}"
      # Extract the active option from e.g. "always [madvise] never"
      active=$(echo "$val" | grep -oP '\[\K[^\]]+' | head -1)
      if echo "$active" | grep -qE '^(always|madvise|never)$'; then
        echo "$active" > /sys/kernel/mm/transparent_hugepage/enabled
      fi
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_thp is defined and
    run_benchmarks_orig_thp.content is defined

# ── KSM ──────────────────────────────────────────────────────────────────
- name: Restore KSM state (Linux)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      val="{{ run_benchmarks_orig_ksm.content | b64decode | trim }}"
      if echo "$val" | grep -qE '^[01]$'; then
        echo "$val" > /sys/kernel/mm/ksm/run
      fi
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_ksm is defined and
    run_benchmarks_orig_ksm.content is defined

# ── Timers & irqbalance ───────────────────────────────────────────────────
- name: Restart stopped timers (systemd)
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
  loop: "{{ run_benchmarks_active_timers.stdout_lines | default([]) }}"
  become: true
  failed_when: false
  when: >-
    ansible_service_mgr | default('systemd') == 'systemd' and
    run_benchmarks_active_timers.stdout_lines | default([]) | length > 0

- name: Restart irqbalance (systemd)
  ansible.builtin.systemd_service:
    name: irqbalance
    state: started
  become: true
  failed_when: false
  when: >-
    ansible_service_mgr | default('systemd') == 'systemd' and
    run_benchmarks_irqbalance_stopped is defined and
    not run_benchmarks_irqbalance_stopped.failed
