---
# SQLite benchmarks: bulk INSERT, indexed SELECT, full-table scan, ORDER BY.
# Tests B-tree manipulation, query planner, and branch-prediction-sensitive
# code paths in the SQLite library — a strong PGO and branch-opt signal.
#
# Template database: 1 000 000 rows, created once with Python's sqlite3
# module (much faster than loading a large .sql file).

# ── Availability check ────────────────────────────────────────────────────

- name: Check sqlite3 availability
  ansible.builtin.command:
    cmd: sqlite3 --version
  register: run_benchmarks_sqlite_check
  changed_when: false
  failed_when: false

# ── Setup: build 1M-row template database ─────────────────────────────────

- name: Stat SQLite template database
  ansible.builtin.stat:
    path: "{{ run_benchmarks_work_dir }}/sqlite_template.db"
  register: run_benchmarks_sqlite_template_stat
  when: run_benchmarks_sqlite_check.rc == 0

- name: Remove invalid or undersized SQLite template database
  # A file < 10 MiB was made by the old 100 k-row generator; a zero-byte file
  # is a stale artefact from an interrupted run.  Delete either to allow
  # regeneration with the full 1 M-row schema.
  ansible.builtin.file:
    path: "{{ run_benchmarks_work_dir }}/sqlite_template.db"
    state: absent
  when:
    - run_benchmarks_sqlite_check.rc == 0
    - run_benchmarks_sqlite_template_stat.stat.exists | default(false)
    - run_benchmarks_sqlite_template_stat.stat.size | default(1) < 10485760  # < 10 MiB

- name: Create SQLite template database (1 000 000 rows)
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      python3 - << 'PYEOF'
      import sqlite3, random
      random.seed(42)
      db = "{{ run_benchmarks_work_dir }}/sqlite_template.db"
      conn = sqlite3.connect(db)
      conn.execute("PRAGMA synchronous = OFF")
      conn.execute("PRAGMA journal_mode = WAL")
      conn.execute("CREATE TABLE bench(id INTEGER PRIMARY KEY, val REAL, str TEXT)")
      conn.execute("CREATE INDEX idx_val ON bench(val)")
      conn.executemany(
          "INSERT INTO bench VALUES(?,?,?)",
          ((i, random.random(), "%08x" % i) for i in range(1000000))
      )
      conn.commit()
      conn.close()
      PYEOF
    executable: /bin/bash
  args:
    creates: "{{ run_benchmarks_work_dir }}/sqlite_template.db"
  changed_when: false
  failed_when: false
  when: run_benchmarks_sqlite_check.rc == 0

# ── Write benchmarks ──────────────────────────────────────────────────────

- name: Run SQLite write benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/sqlite_write.json \
        --command-name "insert-100k" \
          "python3 -c \"import sqlite3,random; r=random.Random(42); c=sqlite3.connect(':memory:'); c.execute('CREATE TABLE bench(id INTEGER PRIMARY KEY, val REAL, str TEXT)'); c.execute('CREATE INDEX idx_val ON bench(val)'); c.executemany('INSERT INTO bench VALUES(?,?,?)', ((i,r.random(),'%08x'%i) for i in range(100000))); c.commit()\"" \
        --prepare "cp {{ run_benchmarks_work_dir }}/sqlite_template.db /tmp/sqlite_bench_upd.db" \
        --command-name "update-500k" \
          "sqlite3 /tmp/sqlite_bench_upd.db 'UPDATE bench SET val=1.0-val WHERE id%2=0'"
    executable: /bin/bash
  register: run_benchmarks_sqlite_write_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_sqlite_check.rc == 0

- name: Warn if SQLite write benchmarks failed
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: sqlite_write benchmark failed
      (rc={{ run_benchmarks_sqlite_write_result.rc }}).
      {{ run_benchmarks_sqlite_write_result.stderr | default('') | truncate(400) | trim }}
  when:
    - run_benchmarks_sqlite_check.rc == 0
    - run_benchmarks_sqlite_write_result.rc != 0

# ── Read benchmarks ───────────────────────────────────────────────────────

- name: Run SQLite read benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/sqlite_read.json \
        --command-name "full-scan-agg" \
          "sqlite3 {{ run_benchmarks_work_dir }}/sqlite_template.db 'SELECT COUNT(*), AVG(val) FROM bench WHERE id % 7 = 0'" \
        --command-name "indexed-range-sum" \
          "sqlite3 {{ run_benchmarks_work_dir }}/sqlite_template.db 'SELECT COUNT(*), SUM(val) FROM bench WHERE val BETWEEN 0.25 AND 0.75'" \
        --command-name "order-top-100k" \
          "sqlite3 {{ run_benchmarks_work_dir }}/sqlite_template.db 'SELECT id, val FROM bench ORDER BY val LIMIT 100000'"
    executable: /bin/bash
  register: run_benchmarks_sqlite_read_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_sqlite_check.rc == 0

- name: Warn if SQLite read benchmarks failed
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: sqlite_read benchmark failed
      (rc={{ run_benchmarks_sqlite_read_result.rc }}).
      {{ run_benchmarks_sqlite_read_result.stderr | default('') | truncate(400) | trim }}
  when:
    - run_benchmarks_sqlite_check.rc == 0
    - run_benchmarks_sqlite_read_result.rc != 0
