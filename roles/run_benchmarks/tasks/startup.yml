---
# Application startup time benchmarks

- name: Check available GUI applications
  ansible.builtin.shell:
    cmd: |
      for cmd in firefox gimp inkscape; do
        command -v "$cmd" >/dev/null 2>&1 && echo "$cmd"
      done
  register: run_benchmarks_gui_apps
  changed_when: false
  failed_when: false

- name: Run application startup benchmarks
  ansible.builtin.shell:
    cmd: |
      set -e
      export DISPLAY=:99
      export XDG_RUNTIME_DIR=/tmp/bench-xdg-$$
      mkdir -p "$XDG_RUNTIME_DIR"

      # Start Xvfb if available and no display
      XVFB_PID=""
      if command -v Xvfb >/dev/null 2>&1; then
        Xvfb :99 -screen 0 1280x1024x24 &
        XVFB_PID=$!
        sleep 1
      fi

      CMDS=()

      {% for app in ['firefox', 'gimp', 'inkscape'] %}
      if command -v {{ app }} >/dev/null 2>&1; then
      {% if app == 'firefox' %}
        # Firefox: measure startup to first window with a timeout
        CMDS+=(--command-name "firefox-startup"
          "timeout 10 firefox --headless --screenshot /dev/null about:blank 2>/dev/null || true")
      {% elif app == 'gimp' %}
        # GIMP: use batch mode for startup measurement
        CMDS+=(--command-name "gimp-startup" "gimp -i --quit 2>/dev/null")
      {% elif app == 'inkscape' %}
        # Inkscape: feed a minimal valid SVG via stdin to avoid the ~25 s timeout
        # that occurs when --pipe receives empty/invalid input on headless systems.
        CMDS+=(--command-name "inkscape-startup"
          "printf '<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"1\" height=\"1\"><rect width=\"1\" height=\"1\" fill=\"red\"/></svg>' | inkscape --pipe --export-type=png --export-filename=/dev/null 2>/dev/null")
      {% endif %}
      fi
      {% endfor %}

      # Interpreter startup: measure Python, Node.js, and Perl init time
      if command -v python3 >/dev/null 2>&1; then
        CMDS+=(--command-name "python3-startup" "python3 -c pass")
      fi
      if command -v node >/dev/null 2>&1; then
        CMDS+=(--command-name "node-startup" 'node -e ""')
      fi
      # Validate perl actually executes before benchmarking — on Gentoo, the
      # perl-exec wrapper may exist on PATH but exit instantly (exit 0) without
      # running perl when no active slot is configured, giving 0 ms timings.
      if command -v perl >/dev/null 2>&1 && perl -e 'print "ok"' 2>/dev/null | grep -q "^ok$"; then
        CMDS+=(--command-name "perl-startup" "perl -e 1")
      fi

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_startup_runs }} \
        --warmup {{ run_benchmarks_startup_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/startup.json \
        "${CMDS[@]}"

      # Cleanup Xvfb
      if [ -n "$XVFB_PID" ]; then
        kill "$XVFB_PID" 2>/dev/null || true
      fi
      rm -rf "$XDG_RUNTIME_DIR"
  args:
    executable: /bin/bash
  register: run_benchmarks_startup_result
  changed_when: false
  failed_when: false

- name: Warn on startup benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: startup benchmark exited
      rc={{ run_benchmarks_startup_result.rc }}.
      {{ run_benchmarks_startup_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_startup_result is not skipped
    - run_benchmarks_startup_result.rc | default(0) != 0
