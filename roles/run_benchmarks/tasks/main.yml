---
# Main tasks: orchestrate benchmark setup, normalization, and all categories.
# Dispatches to Windows-specific task files when ansible_os_family == 'Windows'.
# Windows variants exist for: compression, crypto, compiler, python, coreutils
# (controlled by run_benchmarks_windows_categories in defaults/main.yml).

- name: Set OS dispatch flag
  ansible.builtin.set_fact:
    run_benchmarks_is_windows: "{{ ansible_os_family | default('') == 'Windows' }}"

# ── Setup ─────────────────────────────────────────────────────────────────
- name: Run benchmark setup
  ansible.builtin.include_tasks:
    file: "setup{{ '_win' if run_benchmarks_is_windows else '' }}.yml"
  tags: [benchmark, setup]

# ── Normalize ─────────────────────────────────────────────────────────────
- name: Normalize VM state
  ansible.builtin.include_tasks:
    file: "normalize{{ '_win' if run_benchmarks_is_windows else '' }}.yml"
    apply:
      # Normalization tasks improve benchmark consistency but are not required
      # for benchmarks to run.  On hosts without passwordless sudo, privilege
      # escalation failures are connection-level fatals that bypass
      # failed_when.  Applying ignore_errors at the include level lets all
      # tasks in normalize.yml silently continue when become fails.
      ignore_errors: true
  tags: [benchmark, normalize]

# ── Benchmark categories ───────────────────────────────────────────────────
- name: Define active benchmark categories
  ansible.builtin.set_fact:
    run_benchmarks_active_categories: >-
      {{
        _cats if (_cats | length > 0)
        else ['compression', 'crypto', 'compiler', 'python',
              'ffmpeg', 'imagemagick', 'coreutils', 'opencv', 'gimp',
              'inkscape', 'startup', 'gentoo_build_times', 'numeric',
              'sqlite', 'memory', 'process', 'disk', 'linker',
              'boot_time', 'bash']
      }}
  vars:
    _cats: >-
      {{
        run_benchmarks_categories
        if run_benchmarks_categories is not string
        else (run_benchmarks_categories | from_yaml
              if run_benchmarks_categories | length > 0
              else [])
      }}
  tags: [benchmark]

# ── Skip-existing: remove categories whose primary result file already ────
# exists (non-empty) on the Ansible controller.  Only active when
# run_benchmarks_skip_existing is true; a separate find is used here so
# that setup/normalize always run regardless of existing results.
- name: Find non-empty result files for skip-existing check
  ansible.builtin.find:
    paths: "{{ run_benchmarks_results_dir }}/results/{{ inventory_hostname }}"
    patterns: "*.json"
    size: 1
  delegate_to: localhost
  become: false
  register: run_benchmarks_skip_existing_found
  when: run_benchmarks_skip_existing | default(false) | bool

- name: Filter already-complete categories from active list
  ansible.builtin.set_fact:
    run_benchmarks_active_categories: >-
      {%- set primary = {
            'compression':        'compression.json',
            'crypto':             'crypto_symmetric.json',
            'compiler':           'compiler_c_compile.json',
            'python':             'python.json',
            'numeric':            'numeric_compiled.json',
            'sqlite':             'sqlite_write.json',
            'ffmpeg':             'ffmpeg_video_encode.json',
            'imagemagick':        'imagemagick_resize.json',
            'coreutils':          'coreutils.json',
            'memory':             'memory_bandwidth.json',
            'process':            'process.json',
            'disk':               'disk.json',
            'linker':             'linker.json',
            'opencv':             'opencv.json',
            'gimp':               'gimp.json',
            'inkscape':           'inkscape.json',
            'startup':            'startup.json',
            'boot_time':          'boot_times.json',
            'bash':               'bash.json',
            'gentoo_build_times': 'gentoo_build_times.json'
          } -%}
      {%- set existing = run_benchmarks_skip_existing_found.files
                         | default([])
                         | map(attribute='path')
                         | map('basename')
                         | list -%}
      {%- set filtered = [] -%}
      {%- for cat in run_benchmarks_active_categories -%}
        {%- set f = primary.get(cat, '') -%}
        {%- if not f or f not in existing -%}
          {%- set _ = filtered.append(cat) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ filtered }}
  when: run_benchmarks_skip_existing | default(false) | bool

- name: Run benchmark category
  ansible.builtin.include_tasks:
    file: run_category.yml
  loop: "{{ run_benchmarks_active_categories }}"
  loop_control:
    label: "{{ run_benchmarks_current_category }}"
    loop_var: run_benchmarks_current_category
  when: >-
    not run_benchmarks_is_windows or
    run_benchmarks_current_category in run_benchmarks_windows_categories
  tags: [benchmark]

# ── Denormalize ───────────────────────────────────────────────────────────
- name: Restore VM to original state
  ansible.builtin.include_tasks:
    file: "denormalize{{ '_win' if run_benchmarks_is_windows else '' }}.yml"
    apply:
      ignore_errors: true
  tags: [benchmark, denormalize]
