---
# Main tasks: orchestrate benchmark setup, normalization, and all categories.
# Dispatches to Windows-specific task files when ansible_os_family == 'Windows'.
# Windows variants exist for: compression, crypto, compiler, python, coreutils
# (controlled by run_benchmarks_windows_categories in defaults/main.yml).

- name: Set OS dispatch flag
  ansible.builtin.set_fact:
    run_benchmarks_is_windows: "{{ ansible_os_family | default('') == 'Windows' }}"

# ── Setup ─────────────────────────────────────────────────────────────────
- name: Run benchmark setup
  ansible.builtin.include_tasks:
    file: "setup{{ '_win' if run_benchmarks_is_windows else '' }}.yml"
  tags: [benchmark, setup]

# ── Normalize ─────────────────────────────────────────────────────────────
- name: Normalize VM state
  ansible.builtin.include_tasks:
    file: "normalize{{ '_win' if run_benchmarks_is_windows else '' }}.yml"
  tags: [benchmark, normalize]

# ── Benchmark categories ───────────────────────────────────────────────────
- name: Define active benchmark categories
  ansible.builtin.set_fact:
    run_benchmarks_active_categories: >-
      {{
        _cats if (_cats | length > 0)
        else ['compression', 'crypto', 'compiler', 'python',
              'ffmpeg', 'imagemagick', 'coreutils', 'opencv', 'gimp',
              'inkscape', 'startup', 'gentoo_build_times', 'numeric',
              'sqlite', 'memory', 'process', 'disk', 'linker']
      }}
  vars:
    _cats: >-
      {{
        run_benchmarks_categories
        if run_benchmarks_categories is not string
        else (run_benchmarks_categories | from_yaml
              if run_benchmarks_categories | length > 0
              else [])
      }}
  tags: [benchmark]

- name: Run benchmark category
  ansible.builtin.include_tasks:
    file: run_category.yml
  loop: "{{ run_benchmarks_active_categories }}"
  loop_control:
    label: "{{ run_benchmarks_current_category }}"
    loop_var: run_benchmarks_current_category
  when: >-
    not run_benchmarks_is_windows or
    run_benchmarks_current_category in run_benchmarks_windows_categories
  tags: [benchmark]

# ── Denormalize ───────────────────────────────────────────────────────────
- name: Restore VM to original state
  ansible.builtin.include_tasks:
    file: "denormalize{{ '_win' if run_benchmarks_is_windows else '' }}.yml"
  tags: [benchmark, denormalize]
