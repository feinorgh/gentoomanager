---
# Python performance benchmarks

- name: Check Python3 availability
  ansible.builtin.command:
    cmd: python3 --version
  register: run_benchmarks_python_check
  changed_when: false
  failed_when: false

- name: Create Python benchmark script
  ansible.builtin.copy:
    dest: "{{ run_benchmarks_work_dir }}/pybench.py"
    mode: "0755"
    content: |
      #!/usr/bin/env python3
      """Micro-benchmarks for Python performance."""
      import sys
      import json
      import re
      import hashlib
      import time

      def bench_sieve():
          """Sieve of Eratosthenes to 2,000,000 — integer + memory access."""
          limit = 2_000_000
          sieve = bytearray([1]) * (limit + 1)
          sieve[0] = sieve[1] = 0
          for i in range(2, int(limit ** 0.5) + 1):
              if sieve[i]:
                  sieve[i * i::i] = bytearray(len(sieve[i * i::i]))
          return sum(sieve)

      def bench_json():
          data = {f"key_{i}": list(range(100)) for i in range(100)}
          for _ in range(200):
              s = json.dumps(data)
              json.loads(s)

      def bench_regex():
          pattern = re.compile(
              r'(?:(?:25[0-5]|2[0-4]\d|[01]?\d\d?)\.){3}(?:25[0-5]|2[0-4]\d|[01]?\d\d?)'
          )
          text = "Connect from 192.168.1.100 to 10.0.0.1 via 172.16.0.255 " * 1000
          for _ in range(500):
              pattern.findall(text)

      def bench_hash():
          data = b"x" * (1024 * 1024)
          for _ in range(200):
              hashlib.sha256(data).hexdigest()

      def bench_list_comprehension():
          for _ in range(500):
              _ = [x ** 2 for x in range(10000)]

      def bench_dict_operations():
          for _ in range(500):
              d = {str(i): i for i in range(10000)}
              _ = sum(d.values())

      benchmarks = {
          "sieve": bench_sieve,
          "json_serde": bench_json,
          "regex": bench_regex,
          "sha256_hash": bench_hash,
          "list_comprehension": bench_list_comprehension,
          "dict_operations": bench_dict_operations,
      }

      if __name__ == "__main__":
          name = sys.argv[1] if len(sys.argv) > 1 else "all"
          if name == "all":
              for fn in benchmarks.values():
                  fn()
          else:
              benchmarks[name]()
  when: run_benchmarks_python_check.rc == 0

# Discover all installed python3.X versioned binaries on PATH, deduplicated by
# resolved real path so that symlinks (python3 → python3.13) are not double-counted.
- name: Discover versioned Python binaries
  ansible.builtin.shell:
    cmd: |
      set +e
      set -o pipefail
      {
        IFS=:
        for d in $PATH; do
          [ -d "$d" ] || continue
          for f in "$d"/python3.[0-9]*; do
            [ -x "$f" ] || continue
            name=$(basename "$f")
            # Only accept python3.X (e.g. python3.13) — skip python3-config,
            # python3-dbg, python3m, python3.13-config, python3.13t, etc.
            echo "$name" | grep -qE '^python3\.[0-9]+$' || continue
            full=$(command -v "$name" 2>/dev/null) || full="$f"
            printf '%s %s\n' "$name" "$full"
          done
        done
        unset IFS
        # Generic python3 last (dedup drops it if it resolves to an already-seen binary)
        full=$(command -v python3 2>/dev/null) || true
        [ -n "$full" ] && printf 'python3 %s\n' "$full"
      } | while IFS=' ' read -r label path; do
          real=$(readlink -f "$path" 2>/dev/null || echo "$path")
          printf '%s\t%s\t%s\n' "$real" "$label" "$path"
        done | sort -t$'\t' -k1,1 -u | awk -F'\t' '{print $2" "$3}'
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_py_versions
  changed_when: false
  failed_when: false
  when: run_benchmarks_python_check.rc == 0

- name: Run Python benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      # Map bench display-name → pybench.py argument
      declare -A BENCH_ARGS
      BENCH_ARGS[prime-sieve]=sieve
      BENCH_ARGS[json-serde]=json_serde
      BENCH_ARGS[regex]=regex
      BENCH_ARGS[sha256-hash]=sha256_hash
      BENCH_ARGS[list-comprehension]=list_comprehension
      BENCH_ARGS[dict-operations]=dict_operations
      BENCH_ARGS[python-all]=all
      BENCH_NAMES=(prime-sieve json-serde regex sha256-hash list-comprehension dict-operations python-all)
      CMDS=()
      {% for py in run_benchmarks_py_versions.stdout_lines | default([]) %}
      {% set py_parts = py.split() %}
      {% if py_parts | length >= 2 %}
      {% set py_label = py_parts[0] %}
      {% set py_exe = py_parts[1] %}
      {% set py_prefix = py_label | regex_replace('^python', 'py') %}
      if [ -x "{{ py_exe }}" ]; then
        for bench in "${BENCH_NAMES[@]}"; do
          bench_arg="${BENCH_ARGS[$bench]}"
          CMDS+=(--command-name "{{ py_prefix }}-${bench}" "{{ py_exe }} pybench.py ${bench_arg}")
        done
      fi
      {% endif %}
      {% endfor %}
      if [ -z "${CMDS[*]}" ]; then
        echo "No Python interpreters found, skipping"
        exit 0
      fi
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/python.json \
        "${CMDS[@]}"
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  when: run_benchmarks_python_check.rc == 0
  register: run_benchmarks_python_result
  changed_when: false
  failed_when: false

- name: Warn on python benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: python benchmark exited
      rc={{ run_benchmarks_python_result.rc }}.
      {{ run_benchmarks_python_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_python_result is not skipped
    - run_benchmarks_python_result.rc | default(0) != 0
