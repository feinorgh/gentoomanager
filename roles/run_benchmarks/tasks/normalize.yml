---
# Normalize the VM into a predictable state before benchmarking.
# This ensures fair, consistent, and reproducible results across hosts.
# OS-agnostic — works on Linux (all distros) and FreeBSD.

# ── 1. CPU governor: lock to 'performance' for stable clock speeds ────────
- name: Save current CPU governor (Linux)
  ansible.builtin.slurp:
    src: /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor
  register: run_benchmarks_orig_governor
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

- name: Set CPU governor to performance (Linux)
  ansible.builtin.shell:
    cmd: |
      for gov in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
        [ -f "$gov" ] && echo performance > "$gov"
      done
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_governor is defined and
    run_benchmarks_orig_governor.content is defined

- name: Save current CPU governor (FreeBSD)
  ansible.builtin.command:
    cmd: sysctl -n dev.cpufreq.0.freq_driver
  register: run_benchmarks_orig_governor_bsd
  changed_when: false
  failed_when: false
  when: ansible_system | default('Linux') == 'FreeBSD'

- name: Set CPU to maximum frequency (FreeBSD)
  ansible.builtin.command:
    cmd: sysctl dev.cpu.0.freq=99999
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'FreeBSD' and
    run_benchmarks_orig_governor_bsd is not failed

# ── 2. Disable swap to prevent memory pressure variance ──────────────────
- name: Save current swap state (Linux)
  ansible.builtin.command:
    cmd: swapon --show --noheadings
  register: run_benchmarks_orig_swap
  changed_when: false
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

- name: Disable swap (Linux)
  ansible.builtin.command:
    cmd: swapoff -a
  become: true
  changed_when: true
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_swap.stdout | default('') | length > 0

- name: Save current swap state (FreeBSD)
  ansible.builtin.command:
    cmd: swapctl -l
  register: run_benchmarks_orig_swap_bsd
  changed_when: false
  failed_when: false
  when: ansible_system | default('Linux') == 'FreeBSD'

- name: Disable swap (FreeBSD)
  ansible.builtin.command:
    cmd: swapoff -a
  become: true
  changed_when: true
  failed_when: false
  when: >-
    ansible_system | default('Linux') == 'FreeBSD' and
    run_benchmarks_orig_swap_bsd.stdout_lines | default([]) | length > 1

# ── 3. Sync filesystems and drop caches ───────────────────────────────────
- name: Sync filesystems
  ansible.builtin.command:
    cmd: sync
  changed_when: false

- name: Drop filesystem caches (Linux)
  ansible.builtin.shell:
    cmd: echo 3 > /proc/sys/vm/drop_caches
  become: true
  changed_when: true
  when: ansible_system | default('Linux') == 'Linux'

- name: Purge filesystem caches (FreeBSD)
  ansible.builtin.command:
    cmd: sysctl vm.drop_caches=3
  become: true
  changed_when: true
  failed_when: false
  when: ansible_system | default('Linux') == 'FreeBSD'

# ── 4. Stop heavyweight services that consume CPU/RAM ─────────────────────
- name: Identify stoppable services (systemd)
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      for svc in \
        cups cupsd print-manager \
        bluetooth bluez \
        ModemManager NetworkManager-wait-online \
        accounts-daemon packagekitd \
        tracker-miner-fs tracker-extract tracker-store \
        fwupd thermald power-profiles-daemon \
        cron cronie atd anacron \
        snapd packagekit unattended-upgrades; do
        systemctl is-active "$svc" 2>/dev/null | grep -q '^active$' && echo "$svc"
      done
      true
  register: run_benchmarks_active_services
  changed_when: false
  become: true
  when: ansible_service_mgr | default('systemd') == 'systemd'

- name: Stop non-essential services (systemd)
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: stopped
  loop: "{{ run_benchmarks_active_services.stdout_lines | default([]) }}"
  become: true
  when: >-
    ansible_service_mgr | default('systemd') == 'systemd' and
    run_benchmarks_active_services.stdout_lines | default([]) | length > 0

# ── 5. Set I/O scheduler to noop/none for consistent disk behavior ───────
- name: Save current I/O scheduler (Linux)
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      DISK=$(lsblk -dno NAME | head -1)
      cat "/sys/block/${DISK}/queue/scheduler" | grep -oP '\[\K[^\]]+'
  register: run_benchmarks_orig_iosched
  changed_when: false
  failed_when: false
  become: true
  when: ansible_system | default('Linux') == 'Linux'

- name: Set I/O scheduler to none (Linux)
  ansible.builtin.shell:
    cmd: |
      for disk in $(lsblk -dno NAME); do
        echo none > "/sys/block/${disk}/queue/scheduler" 2>/dev/null || true
      done
  become: true
  changed_when: true
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_iosched is defined and
    run_benchmarks_orig_iosched is not failed

# ── 6. Disable kernel address space randomization for reproducibility ─────
- name: Save current ASLR setting (Linux)
  ansible.builtin.slurp:
    src: /proc/sys/kernel/randomize_va_space
  register: run_benchmarks_orig_aslr
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

- name: Disable ASLR (Linux)
  ansible.builtin.shell:
    cmd: echo 0 > /proc/sys/kernel/randomize_va_space
  become: true
  changed_when: true
  when: >-
    ansible_system | default('Linux') == 'Linux' and
    run_benchmarks_orig_aslr is defined and
    run_benchmarks_orig_aslr.content is defined

- name: Save current ASLR setting (FreeBSD)
  ansible.builtin.command:
    cmd: sysctl -n kern.elf64.aslr.enable
  register: run_benchmarks_orig_aslr_bsd
  changed_when: false
  failed_when: false
  when: ansible_system | default('Linux') == 'FreeBSD'

- name: Disable ASLR (FreeBSD)
  ansible.builtin.command:
    cmd: sysctl kern.elf64.aslr.enable=0
  become: true
  changed_when: true
  when: >-
    ansible_system | default('Linux') == 'FreeBSD' and
    run_benchmarks_orig_aslr_bsd is not failed

# ── 7. Reduce kernel jitter ──────────────────────────────────────────────
- name: Disable kernel NMI watchdog (Linux)
  ansible.builtin.shell:
    cmd: echo 0 > /proc/sys/kernel/nmi_watchdog
  become: true
  changed_when: true
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

# ── 8. Wait for system to settle ─────────────────────────────────────────
- name: Wait for load average to drop
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      for i in $(seq 1 30); do
        LOAD=$(awk '{printf "%.0f", $1 * 100}' /proc/loadavg 2>/dev/null \
               || sysctl -n vm.loadavg 2>/dev/null | awk '{printf "%.0f", $2 * 100}')
        [ "$LOAD" -lt 50 ] && exit 0
        sleep 2
      done
  changed_when: false
