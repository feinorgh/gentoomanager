---
# FFmpeg encode/decode benchmarks — discovers and benchmarks all available codecs

- name: Check FFmpeg availability
  ansible.builtin.command:
    cmd: ffmpeg -version
  register: run_benchmarks_ffmpeg_check
  changed_when: false
  failed_when: false

- name: Discover available FFmpeg codecs
  local.gentoomanager.probe_command_output:
    probes:
      - output_name: video_encoders
        command: [ffmpeg, -encoders]
        pattern: '^\s*V[\.\w]{5}\s+(\S+)'
      - output_name: audio_encoders
        command: [ffmpeg, -encoders]
        pattern: '^\s*A[\.\w]{5}\s+(\S+)'
      - output_name: video_decoders
        command: [ffmpeg, -decoders]
        pattern: '^\s*V[\.\w]{5}\s+(\S+)'
      - output_name: audio_decoders
        command: [ffmpeg, -decoders]
        pattern: '^\s*A[\.\w]{5}\s+(\S+)'
  register: run_benchmarks_ffmpeg_codecs_raw
  when: run_benchmarks_ffmpeg_check.rc == 0
  failed_when: false

- name: Write FFmpeg codec list to JSON
  ansible.builtin.copy:
    content: "{{ run_benchmarks_ffmpeg_codecs_raw.data | to_nice_json }}"
    dest: "{{ run_benchmarks_work_dir }}/ffmpeg_codecs.json"
    mode: "0644"
  when: >-
    run_benchmarks_ffmpeg_check.rc == 0 and
    run_benchmarks_ffmpeg_codecs_raw is not skipped

# ── Test media (controller-generated BBB fixtures with synthetic fallback) ────

- name: Check whether BBB video fixture is already present on host
  ansible.builtin.stat:
    path: "{{ run_benchmarks_work_dir }}/test_raw.avi"
  register: run_benchmarks_video_src_stat
  when: run_benchmarks_ffmpeg_check.rc == 0

- name: Copy Big Buck Bunny FFV1 video source from controller to host
  ansible.builtin.copy:
    src: "{{ run_benchmarks_fixture_dir }}/bbb_1080p_30s.mkv"
    dest: "{{ run_benchmarks_work_dir }}/test_raw.avi"
    mode: "0644"
  when:
    - run_benchmarks_ffmpeg_check.rc == 0
    - not run_benchmarks_video_src_stat.stat.exists | default(true)
    - (run_benchmarks_fixture_dir + '/bbb_1080p_30s.mkv') is file

- name: Generate synthetic 1080p FFV1 video source (fallback when BBB is unavailable)
  ansible.builtin.shell:
    cmd: |
      ffmpeg -y -f lavfi \
        -i "testsrc2=duration={{ run_benchmarks_ffmpeg_duration_sec }}:size=1280x720:rate=30" \
        -c:v ffv1 -level 3 -threads 0 -an \
        {{ run_benchmarks_work_dir }}/test_raw.avi
    creates: "{{ run_benchmarks_work_dir }}/test_raw.avi"
  when: run_benchmarks_ffmpeg_check.rc == 0

- name: Check whether BBB audio fixture is already present on host
  ansible.builtin.stat:
    path: "{{ run_benchmarks_work_dir }}/test_raw.wav"
  register: run_benchmarks_audio_src_stat
  when: run_benchmarks_ffmpeg_check.rc == 0

- name: Copy Big Buck Bunny PCM audio source from controller to host
  ansible.builtin.copy:
    src: "{{ run_benchmarks_fixture_dir }}/bbb_audio_60s.wav"
    dest: "{{ run_benchmarks_work_dir }}/test_raw.wav"
    mode: "0644"
  when:
    - run_benchmarks_ffmpeg_check.rc == 0
    - not run_benchmarks_audio_src_stat.stat.exists | default(true)
    - (run_benchmarks_fixture_dir + '/bbb_audio_60s.wav') is file

- name: Generate synthetic PCM audio source (fallback when BBB is unavailable)
  ansible.builtin.shell:
    cmd: |
      ffmpeg -y -f lavfi \
        -i "sine=frequency=440:duration={{ run_benchmarks_ffmpeg_duration_sec * 6 }}" \
        -c:a pcm_s16le \
        {{ run_benchmarks_work_dir }}/test_raw.wav
    creates: "{{ run_benchmarks_work_dir }}/test_raw.wav"
  when: run_benchmarks_ffmpeg_check.rc == 0

# ── Video encoding ────────────────────────────────────────────────────────

- name: Run FFmpeg video encoding benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      ENCS=$(ffmpeg -encoders 2>/dev/null | awk '/^ V/ {print $2}')
      has() { echo "$ENCS" | grep -qx "$1"; }

      # Per-command timeout wrapper (0 = no limit)
      T={{ run_benchmarks_ffmpeg_cmd_timeout_sec | int }}
      wrap() { [ "$T" -gt 0 ] && echo "timeout ${T}s $*" || echo "$*"; }

      CMDS=()
      has libx264    && CMDS+=(--command-name "h264-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libx264 -preset medium -crf 23 -an -f null /dev/null)")
      has libx265    && CMDS+=(--command-name "h265-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libx265 -preset medium -crf 28 -an -f null /dev/null)")
      # VP8: deadline=realtime for consistent throughput measurement (good/best is 10x slower)
      has libvpx     && CMDS+=(--command-name "vp8-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libvpx -crf 10 -b:v 1M -deadline realtime -an -f null /dev/null)")
      # VP9: cpu-used=8 (fastest) keeps runtime proportional to SVT-AV1
      has libvpx-vp9 && CMDS+=(--command-name "vp9-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libvpx-vp9 -crf 30 -b:v 0 -deadline realtime -cpu-used 8 -an -f null /dev/null)")
      has libsvtav1  && CMDS+=(--command-name "av1-svt-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libsvtav1 -crf 35 -preset 8 -an -f null /dev/null)")
      has libaom-av1 && CMDS+=(--command-name "av1-aom-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libaom-av1 -crf 35 -cpu-used 8 -row-mt 1 -an -f null /dev/null)")
      # rav1e omitted: research-only encoder; 10x slower than SVT-AV1 at equivalent quality
      has libtheora  && CMDS+=(--command-name "theora-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libtheora -q:v 7 -an -f null /dev/null)")
      has libxvid    && CMDS+=(--command-name "xvid-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v libxvid -q:v 5 -an -f null /dev/null)")
      has mpeg2video && CMDS+=(--command-name "mpeg2-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v mpeg2video -b:v 5M -an -f null /dev/null)")
      has mjpeg      && CMDS+=(--command-name "mjpeg-encode"
        "$(wrap ffmpeg -y -i test_raw.avi -c:v mjpeg -q:v 5 -an -f null /dev/null)")

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_ffmpeg_video_runs }} \
        --warmup {{ run_benchmarks_ffmpeg_video_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/ffmpeg_video_encode.json \
        "${CMDS[@]}"
  when: run_benchmarks_ffmpeg_check.rc == 0
  args:
    executable: /bin/bash
  register: run_benchmarks_ffmpeg_video_encode_result
  changed_when: false
  failed_when: false
  async: "{{ run_benchmarks_ffmpeg_task_timeout_sec | int }}"
  poll: 30

- name: Warn on ffmpeg_video_encode benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: ffmpeg_video_encode benchmark exited
      rc={{ run_benchmarks_ffmpeg_video_encode_result.rc }}.
      {{ run_benchmarks_ffmpeg_video_encode_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_ffmpeg_video_encode_result is not skipped
    - run_benchmarks_ffmpeg_video_encode_result.rc | default(0) != 0

# ── Video decoding ────────────────────────────────────────────────────────

- name: Prepare encoded video files for decode benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      ENCS=$(ffmpeg -encoders 2>/dev/null | awk '/^ V/ {print $2}')
      has() { echo "$ENCS" | grep -qx "$1"; }

      if has libx264;    then ffmpeg -y -i test_raw.avi -c:v libx264 -preset ultrafast -crf 18 -an test_h264.mp4           2>/dev/null; fi
      if has libx265;    then ffmpeg -y -i test_raw.avi -c:v libx265 -preset ultrafast -crf 22 -an test_h265.mp4           2>/dev/null; fi
      if has libvpx;     then ffmpeg -y -i test_raw.avi -c:v libvpx -crf 10 -b:v 2M -deadline realtime -an test_vp8.webm  2>/dev/null; fi
      if has libvpx-vp9; then ffmpeg -y -i test_raw.avi -c:v libvpx-vp9 -crf 30 -b:v 0 -deadline realtime -an test_vp9.webm 2>/dev/null; fi
      if has libsvtav1;  then ffmpeg -y -i test_raw.avi -c:v libsvtav1 -crf 45 -preset 12 -an test_av1_svt.mp4            2>/dev/null; fi
      if has libaom-av1; then ffmpeg -y -i test_raw.avi -c:v libaom-av1 -crf 50 -cpu-used 8 -row-mt 1 -an test_av1_aom.mp4 2>/dev/null; fi
      if has librav1e;   then ffmpeg -y -i test_raw.avi -c:v librav1e -qp 200 -speed 10 -an test_av1_rav1e.mp4            2>/dev/null; fi
      if has libtheora;  then ffmpeg -y -i test_raw.avi -c:v libtheora -q:v 5 -an test_theora.mkv                         2>/dev/null; fi
      if has libxvid;    then ffmpeg -y -i test_raw.avi -c:v libxvid -q:v 8 -an test_xvid.avi                             2>/dev/null; fi
      if has mpeg2video; then ffmpeg -y -i test_raw.avi -c:v mpeg2video -b:v 8M -an test_mpeg2.mpg                        2>/dev/null; fi
      if has mjpeg;      then ffmpeg -y -i test_raw.avi -c:v mjpeg -q:v 10 -an test_mjpeg.avi                             2>/dev/null; fi
  when: run_benchmarks_ffmpeg_check.rc == 0
  changed_when: true

- name: Run FFmpeg video decoding benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      CMDS=()
      [ -f test_h264.mp4 ]       && CMDS+=(--command-name "h264-decode"      "ffmpeg -y -i test_h264.mp4 -f null /dev/null")
      [ -f test_h265.mp4 ]       && CMDS+=(--command-name "h265-decode"      "ffmpeg -y -i test_h265.mp4 -f null /dev/null")
      [ -f test_vp8.webm ]       && CMDS+=(--command-name "vp8-decode"       "ffmpeg -y -i test_vp8.webm -f null /dev/null")
      [ -f test_vp9.webm ]       && CMDS+=(--command-name "vp9-decode"       "ffmpeg -y -i test_vp9.webm -f null /dev/null")
      [ -f test_av1_svt.mp4 ]    && CMDS+=(--command-name "av1-svt-decode"   "ffmpeg -y -i test_av1_svt.mp4 -f null /dev/null")
      [ -f test_av1_aom.mp4 ]    && CMDS+=(--command-name "av1-aom-decode"   "ffmpeg -y -i test_av1_aom.mp4 -f null /dev/null")
      [ -f test_av1_rav1e.mp4 ]  && CMDS+=(--command-name "av1-rav1e-decode" "ffmpeg -y -i test_av1_rav1e.mp4 -f null /dev/null")
      [ -f test_theora.mkv ]     && CMDS+=(--command-name "theora-decode"    "ffmpeg -y -i test_theora.mkv -f null /dev/null")
      [ -f test_xvid.avi ]       && CMDS+=(--command-name "xvid-decode"      "ffmpeg -y -i test_xvid.avi -f null /dev/null")
      [ -f test_mpeg2.mpg ]      && CMDS+=(--command-name "mpeg2-decode"     "ffmpeg -y -i test_mpeg2.mpg -f null /dev/null")
      [ -f test_mjpeg.avi ]      && CMDS+=(--command-name "mjpeg-decode"     "ffmpeg -y -i test_mjpeg.avi -f null /dev/null")

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/ffmpeg_video_decode.json \
        "${CMDS[@]}"
  when: run_benchmarks_ffmpeg_check.rc == 0
  args:
    executable: /bin/bash
  register: run_benchmarks_ffmpeg_video_decode_result
  changed_when: false
  failed_when: false

- name: Warn on ffmpeg_video_decode benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: ffmpeg_video_decode benchmark exited
      rc={{ run_benchmarks_ffmpeg_video_decode_result.rc }}.
      {{ run_benchmarks_ffmpeg_video_decode_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_ffmpeg_video_decode_result is not skipped
    - run_benchmarks_ffmpeg_video_decode_result.rc | default(0) != 0

# ── Audio encoding ────────────────────────────────────────────────────────

- name: Run FFmpeg audio encoding benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      ENCS=$(ffmpeg -encoders 2>/dev/null | awk '/^ A/ {print $2}')
      has() { echo "$ENCS" | grep -qx "$1"; }

      CMDS=()
      has aac        && CMDS+=(--command-name "aac-encode"     "ffmpeg -y -i test_raw.wav -c:a aac -b:a 192k -f null /dev/null")
      has libopus    && CMDS+=(--command-name "opus-encode"    "ffmpeg -y -i test_raw.wav -c:a libopus -b:a 128k -f null /dev/null")
      has libmp3lame && CMDS+=(--command-name "mp3-encode"     "ffmpeg -y -i test_raw.wav -c:a libmp3lame -b:a 192k -f null /dev/null")
      has flac       && CMDS+=(--command-name "flac-encode"    "ffmpeg -y -i test_raw.wav -c:a flac -f null /dev/null")
      has libvorbis  && CMDS+=(--command-name "vorbis-encode"  "ffmpeg -y -i test_raw.wav -c:a libvorbis -q:a 4 -f null /dev/null")
      has ac3        && CMDS+=(--command-name "ac3-encode"     "ffmpeg -y -i test_raw.wav -c:a ac3 -b:a 384k -f null /dev/null")
      has eac3       && CMDS+=(--command-name "eac3-encode"    "ffmpeg -y -i test_raw.wav -c:a eac3 -b:a 384k -f null /dev/null")
      has wavpack    && CMDS+=(--command-name "wavpack-encode" "ffmpeg -y -i test_raw.wav -c:a wavpack -f null /dev/null")
      has alac       && CMDS+=(--command-name "alac-encode"    "ffmpeg -y -i test_raw.wav -c:a alac -f null /dev/null")

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/ffmpeg_audio_encode.json \
        "${CMDS[@]}"
  when: run_benchmarks_ffmpeg_check.rc == 0
  args:
    executable: /bin/bash
  register: run_benchmarks_ffmpeg_audio_encode_result
  changed_when: false
  failed_when: false

- name: Warn on ffmpeg_audio_encode benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: ffmpeg_audio_encode benchmark exited
      rc={{ run_benchmarks_ffmpeg_audio_encode_result.rc }}.
      {{ run_benchmarks_ffmpeg_audio_encode_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_ffmpeg_audio_encode_result is not skipped
    - run_benchmarks_ffmpeg_audio_encode_result.rc | default(0) != 0

# ── Audio decoding ────────────────────────────────────────────────────────

- name: Prepare encoded audio files for decode benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      ENCS=$(ffmpeg -encoders 2>/dev/null | awk '/^ A/ {print $2}')
      has() { echo "$ENCS" | grep -qx "$1"; }

      if has aac;        then ffmpeg -y -i test_raw.wav -c:a aac -b:a 192k test_enc_aac.m4a        2>/dev/null; fi
      if has libopus;    then ffmpeg -y -i test_raw.wav -c:a libopus -b:a 128k test_enc_opus.opus   2>/dev/null; fi
      if has libmp3lame; then ffmpeg -y -i test_raw.wav -c:a libmp3lame -b:a 192k test_enc_mp3.mp3  2>/dev/null; fi
      if has flac;       then ffmpeg -y -i test_raw.wav -c:a flac test_enc_flac.flac                2>/dev/null; fi
      if has libvorbis;  then ffmpeg -y -i test_raw.wav -c:a libvorbis -q:a 4 test_enc_vorbis.ogg   2>/dev/null; fi
      if has ac3;        then ffmpeg -y -i test_raw.wav -c:a ac3 -b:a 384k test_enc_ac3.ac3         2>/dev/null; fi
      if has eac3;       then ffmpeg -y -i test_raw.wav -c:a eac3 -b:a 384k test_enc_eac3.eac3      2>/dev/null; fi
      if has wavpack;    then ffmpeg -y -i test_raw.wav -c:a wavpack test_enc_wavpack.wv             2>/dev/null; fi
      if has alac;       then ffmpeg -y -i test_raw.wav -c:a alac test_enc_alac.m4a                  2>/dev/null; fi
  when: run_benchmarks_ffmpeg_check.rc == 0
  changed_when: true

- name: Run FFmpeg audio decoding benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      CMDS=()
      [ -f test_enc_aac.m4a ]      && CMDS+=(--command-name "aac-decode"     "ffmpeg -y -i test_enc_aac.m4a -f null /dev/null")
      [ -f test_enc_opus.opus ]    && CMDS+=(--command-name "opus-decode"    "ffmpeg -y -i test_enc_opus.opus -f null /dev/null")
      [ -f test_enc_mp3.mp3 ]      && CMDS+=(--command-name "mp3-decode"     "ffmpeg -y -i test_enc_mp3.mp3 -f null /dev/null")
      [ -f test_enc_flac.flac ]    && CMDS+=(--command-name "flac-decode"    "ffmpeg -y -i test_enc_flac.flac -f null /dev/null")
      [ -f test_enc_vorbis.ogg ]   && CMDS+=(--command-name "vorbis-decode"  "ffmpeg -y -i test_enc_vorbis.ogg -f null /dev/null")
      [ -f test_enc_ac3.ac3 ]      && CMDS+=(--command-name "ac3-decode"     "ffmpeg -y -i test_enc_ac3.ac3 -f null /dev/null")
      [ -f test_enc_eac3.eac3 ]    && CMDS+=(--command-name "eac3-decode"    "ffmpeg -y -i test_enc_eac3.eac3 -f null /dev/null")
      [ -f test_enc_wavpack.wv ]   && CMDS+=(--command-name "wavpack-decode" "ffmpeg -y -i test_enc_wavpack.wv -f null /dev/null")
      [ -f test_enc_alac.m4a ]     && CMDS+=(--command-name "alac-decode"    "ffmpeg -y -i test_enc_alac.m4a -f null /dev/null")

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/ffmpeg_audio_decode.json \
        "${CMDS[@]}"
  when: run_benchmarks_ffmpeg_check.rc == 0
  args:
    executable: /bin/bash
  register: run_benchmarks_ffmpeg_audio_decode_result
  changed_when: false
  failed_when: false

- name: Warn on ffmpeg_audio_decode benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: ffmpeg_audio_decode benchmark exited
      rc={{ run_benchmarks_ffmpeg_audio_decode_result.rc }}.
      {{ run_benchmarks_ffmpeg_audio_decode_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_ffmpeg_audio_decode_result is not skipped
    - run_benchmarks_ffmpeg_audio_decode_result.rc | default(0) != 0
