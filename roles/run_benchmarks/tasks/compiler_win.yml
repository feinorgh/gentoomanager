---
# Compiler benchmarks on Windows: detect MSVC/gcc/clang/rustc/go.

- name: Create C benchmark source (Windows)
  ansible.windows.win_copy:
    content: |
      #include <stdio.h>
      #include <math.h>
      int main() {
          double sum = 0.0;
          for (int i = 0; i < 10000000; i++) {
              sum += sin((double)i) * cos((double)i);
          }
          printf("%.6f\n", sum);
          return 0;
      }
    dest: "{{ run_benchmarks_work_dir_win }}\\bench.c"

- name: Detect available compilers (Windows)
  ansible.windows.win_shell: |
    $compilers = @()
    if (Get-Command gcc -ErrorAction SilentlyContinue) { $compilers += 'gcc' }
    if (Get-Command clang -ErrorAction SilentlyContinue) { $compilers += 'clang' }
    if (Get-Command cl -ErrorAction SilentlyContinue) { $compilers += 'cl' }
    if (Get-Command rustc -ErrorAction SilentlyContinue) { $compilers += 'rustc' }
    if (Get-Command go -ErrorAction SilentlyContinue) { $compilers += 'go' }
    $compilers -join ','
  register: run_benchmarks_win_compilers
  changed_when: false

- name: Run C compiler benchmarks (Windows)
  ansible.windows.win_shell: |
    $wd = "{{ run_benchmarks_work_dir_win }}"
    $hf = "hyperfine"
    $runs = {{ run_benchmarks_runs }}
    $warmup = {{ run_benchmarks_warmup }}
    $cmds = @()
    $compilers = '{{ run_benchmarks_win_compilers.stdout | trim }}'.Split(',')

    if ($compilers -contains 'gcc') {
      $cmds += "--command-name 'gcc-compile' 'gcc -O2 -o $wd\bench_gcc.exe $wd\bench.c -lm'"
      $cmds += "--command-name 'gcc-run' '$wd\bench_gcc.exe'"
    }
    if ($compilers -contains 'clang') {
      $cmds += "--command-name 'clang-compile' 'clang -O2 -o $wd\bench_clang.exe $wd\bench.c -lm'"
      $cmds += "--command-name 'clang-run' '$wd\bench_clang.exe'"
    }
    if ($compilers -contains 'cl') {
      $cmds += "--command-name 'msvc-compile' 'cl /O2 /Fe:$wd\bench_cl.exe $wd\bench.c >NUL 2>&1'"
      $cmds += "--command-name 'msvc-run' '$wd\bench_cl.exe'"
    }

    if ($cmds.Count -gt 0) {
      $argStr = $cmds -join ' '
      Invoke-Expression "$hf --runs $runs --warmup $warmup --export-json $wd\compiler-c.json $argStr"
    }
  changed_when: false
  when: >-
    'gcc' in run_benchmarks_win_compilers.stdout or
    'clang' in run_benchmarks_win_compilers.stdout or
    'cl' in run_benchmarks_win_compilers.stdout

- name: Create Rust benchmark source (Windows)
  ansible.windows.win_copy:
    content: |
      fn main() {
          let sum: f64 = (0..10_000_000)
              .map(|i| (i as f64).sin() * (i as f64).cos())
              .sum();
          println!("{:.6}", sum);
      }
    dest: "{{ run_benchmarks_work_dir_win }}\\bench.rs"
  when: "'rustc' in run_benchmarks_win_compilers.stdout"

- name: Run Rust compiler benchmarks (Windows)
  ansible.windows.win_shell: |
    $wd = "{{ run_benchmarks_work_dir_win }}"
    $hf = "hyperfine"
    $runs = {{ run_benchmarks_runs }}
    $warmup = {{ run_benchmarks_warmup }}
    Invoke-Expression "$hf --runs $runs --warmup $warmup --export-json $wd\compiler-rust.json --command-name 'rustc-compile' 'rustc -O -o $wd\bench_rs.exe $wd\bench.rs' --command-name 'rustc-run' '$wd\bench_rs.exe'"
  changed_when: false
  when: "'rustc' in run_benchmarks_win_compilers.stdout"

- name: Create Go benchmark source (Windows)
  ansible.windows.win_copy:
    content: |
      package main
      import (
          "fmt"
          "math"
      )
      func main() {
          sum := 0.0
          for i := 0; i < 10000000; i++ {
              sum += math.Sin(float64(i)) * math.Cos(float64(i))
          }
          fmt.Printf("%.6f\n", sum)
      }
    dest: "{{ run_benchmarks_work_dir_win }}\\bench.go"
  when: "'go' in run_benchmarks_win_compilers.stdout"

- name: Run Go compiler benchmarks (Windows)
  ansible.windows.win_shell: |
    $wd = "{{ run_benchmarks_work_dir_win }}"
    $hf = "hyperfine"
    $runs = {{ run_benchmarks_runs }}
    $warmup = {{ run_benchmarks_warmup }}
    Invoke-Expression "$hf --runs $runs --warmup $warmup --export-json $wd\compiler-go.json --command-name 'go-build' 'go build -o $wd\bench_go.exe $wd\bench.go' --command-name 'go-run' '$wd\bench_go.exe'"
  changed_when: false
  when: "'go' in run_benchmarks_win_compilers.stdout"
