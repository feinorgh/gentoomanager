---
# Python micro-benchmarks on Windows.

- name: Check Python availability (Windows)
  ansible.windows.win_shell: python --version 2>&1
  register: run_benchmarks_win_python_check
  changed_when: false
  failed_when: false

- name: Create Python benchmark script (Windows)
  ansible.windows.win_copy:
    content: |
      import json, time, hashlib, re, sys, os

      def bench_fibonacci():
          def fib(n):
              a, b = 0, 1
              for _ in range(n):
                  a, b = b, a + b
              return a
          start = time.perf_counter()
          fib(500000)
          return time.perf_counter() - start

      def bench_json():
          data = {str(i): list(range(100)) for i in range(100)}
          start = time.perf_counter()
          for _ in range(200):
              json.loads(json.dumps(data))
          return time.perf_counter() - start

      def bench_regex():
          text = "The quick brown fox " * 10000
          pattern = re.compile(r'\b\w{4,6}\b')
          start = time.perf_counter()
          for _ in range(500):
              pattern.findall(text)
          return time.perf_counter() - start

      def bench_hash():
          data = os.urandom(1024 * 1024)
          start = time.perf_counter()
          for _ in range(100):
              hashlib.sha256(data).hexdigest()
          return time.perf_counter() - start

      def bench_sort():
          import random
          data = list(range(100000))
          random.shuffle(data)
          start = time.perf_counter()
          for _ in range(50):
              sorted(data)
          return time.perf_counter() - start

      def bench_string():
          start = time.perf_counter()
          for _ in range(500):
              s = ""
              for i in range(5000):
                  s += str(i)
          return time.perf_counter() - start

      benchmarks = {
          'fibonacci': bench_fibonacci,
          'json': bench_json,
          'regex': bench_regex,
          'hash': bench_hash,
          'sort': bench_sort,
          'string': bench_string,
      }

      results = {}
      for name, fn in benchmarks.items():
          results[name] = fn()
      print(json.dumps(results))
    dest: "{{ run_benchmarks_work_dir_win }}\\pybench.py"
  when: run_benchmarks_win_python_check.rc == 0

- name: Run Python benchmarks via hyperfine (Windows)
  ansible.windows.win_shell: |
    $wd = "{{ run_benchmarks_work_dir_win }}"
    $hf = "hyperfine"
    $runs = {{ run_benchmarks_runs }}
    $warmup = {{ run_benchmarks_warmup }}

    # Discover all installed Python versions using the Windows Python Launcher,
    # resolve each to its full version (e.g. 3.14 → 3.14.1), and deduplicate
    # so aliases pointing to the same patch release are benchmarked only once.
    $pyVersions = @()
    $seenFullVersions = @{}
    $versionMap = @{}
    try {
      $pyList = (py -0 2>&1) | Select-String -Pattern '^\s*-V:(\S+)' |
                ForEach-Object { $_.Matches[0].Groups[1].Value }
      foreach ($v in $pyList) {
        $pyExe = "py -$v"
        $verOutput = "Python $v"
        try {
          $verOutput = (& py "-$v" --version 2>&1) | Select-Object -First 1
          if ($verOutput -match '(\d+\.\d+\.\d+)') {
            $fullVer = $Matches[1]
          } else {
            $fullVer = $v
          }
        } catch {
          $fullVer = $v
        }
        if (-not $seenFullVersions.ContainsKey($fullVer)) {
          $seenFullVersions[$fullVer] = $true
          $pyLabel = "py$fullVer"
          $pyVersions += "$pyLabel $pyExe"
          $versionMap[$pyLabel] = "$verOutput"
        }
      }
    } catch {}
    if ($pyVersions.Count -eq 0) {
      try {
        $verOutput = (python --version 2>&1) | Select-Object -First 1
      } catch { $verOutput = "unknown" }
      $pyVersions += "python python"
      $versionMap["python"] = "$verOutput"
    }

    # Write python_versions.json
    $versionMap | ConvertTo-Json | Set-Content "$wd\python_versions.json"

    $cmds = @()
    foreach ($pyEntry in $pyVersions) {
      $parts = $pyEntry.Split(' ', 2)
      $pyLabel = $parts[0]
      $pyExe = $parts[1]
      $pyPrefix = $pyLabel -replace '^python', 'py'
      $cmds += "--command-name '${pyPrefix}-full' '${pyExe} $wd\pybench.py'"
    }

    if ($cmds.Count -gt 0) {
      $argStr = $cmds -join ' '
      Invoke-Expression "$hf --runs $runs --warmup $warmup --export-json $wd\python.json $argStr"
    }
  changed_when: false
  when: run_benchmarks_win_python_check.rc == 0
