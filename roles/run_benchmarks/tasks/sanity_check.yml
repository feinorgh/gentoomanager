---
# Pre-flight sanity check: verify tools, sudo access, and disk space.
# Always produces warnings rather than failures — the benchmark play continues.

# ── 1. Probe for required and optional tools ──────────────────────────────
- name: Probe benchmark tool availability
  ansible.builtin.shell:
    cmd: |
      set -e
      missing_req=""
      missing_opt=""
      for tool in hyperfine gcc python3 openssl; do
        command -v "$tool" >/dev/null 2>&1 || missing_req="$missing_req $tool"
      done
      for tool in clang rustc go ffmpeg; do
        command -v "$tool" >/dev/null 2>&1 || missing_opt="$missing_opt $tool"
      done
      if command -v magick >/dev/null 2>&1 || command -v convert >/dev/null 2>&1; then
        :
      else
        missing_opt="$missing_opt imagemagick"
      fi
      if command -v 7z >/dev/null 2>&1 || command -v 7zz >/dev/null 2>&1; then
        :
      else
        missing_opt="$missing_opt 7zip"
      fi
      echo "missing_req=${missing_req# }"
      echo "missing_opt=${missing_opt# }"
    executable: /bin/sh
  register: run_benchmarks_sanity_tools
  changed_when: false
  failed_when: false

- name: Parse tool probe output
  ansible.builtin.set_fact:
    run_benchmarks_sanity_missing_req: >-
      {{ (run_benchmarks_sanity_tools.stdout_lines
          | select('match', '^missing_req=')
          | first
          | default('missing_req=')
          | regex_replace('^missing_req=', '')
         ).split() | select | list }}
    run_benchmarks_sanity_missing_opt: >-
      {{ (run_benchmarks_sanity_tools.stdout_lines
          | select('match', '^missing_opt=')
          | first
          | default('missing_opt=')
          | regex_replace('^missing_opt=', '')
         ).split() | select | list }}

# ── 2. Probe sudo / become access ────────────────────────────────────────
- name: Probe passwordless sudo access
  ansible.builtin.command:
    cmd: sudo -n true
  register: run_benchmarks_sanity_sudo
  changed_when: false
  failed_when: false

# ── 3. Probe available disk space on the work_dir partition ──────────────
- name: Probe free disk space on the work_dir partition
  ansible.builtin.shell:
    cmd: |
      # Walk up from work_dir to find the first existing ancestor so df works
      # even before the directory has been created.
      wdir="{{ run_benchmarks_work_dir }}"
      while [ ! -e "$wdir" ] && [ "$wdir" != "/" ]; do
        wdir=$(dirname "$wdir")
      done
      df -Pk "$wdir"
    executable: /bin/sh
  register: run_benchmarks_sanity_disk
  changed_when: false
  failed_when: false

- name: Evaluate disk space on work_dir partition
  ansible.builtin.set_fact:
    run_benchmarks_sanity_disk_free_mb: >-
      {{ ((run_benchmarks_sanity_disk.stdout_lines[-1].split()[3] | default('0') | int) / 1024) | round(0) | int }}
    run_benchmarks_sanity_disk_mount: >-
      {{ run_benchmarks_sanity_disk.stdout_lines[-1].split()[-1] | default('unknown') }}
    run_benchmarks_sanity_disk_ok: >-
      {{ ((run_benchmarks_sanity_disk.stdout_lines[-1].split()[3] | default('0') | int) / 1024) | int
         >= run_benchmarks_min_disk_mb }}

# ── 4. Check RAM when work_dir is on tmpfs ───────────────────────────────
# tmpfs "disk space" is backed by RAM, so the VM needs enough total RAM to
# hold all fixture files (~1.7 GB) plus OS and process overhead.
# This check runs before virsh RAM scaling (normalize.yml), so it reads
# MemTotal — the RAM currently allocated to the VM.  For KVM VMs the RAM
# is scaled to max before benchmarks start; this warning is informational.
- name: Detect whether work_dir partition is backed by tmpfs
  ansible.builtin.shell:
    cmd: |
      wdir="{{ run_benchmarks_work_dir }}"
      while [ ! -e "$wdir" ] && [ "$wdir" != "/" ]; do
        wdir=$(dirname "$wdir")
      done
      fstype=$(stat -f -c '%T' "$wdir" 2>/dev/null || echo unknown)
      echo "fstype=$fstype"
    executable: /bin/sh
  register: run_benchmarks_sanity_fstype_raw
  changed_when: false
  failed_when: false

- name: Probe total RAM (MemTotal from /proc/meminfo)
  ansible.builtin.shell:
    cmd: awk '/^MemTotal:/{print $2}' /proc/meminfo
    executable: /bin/sh
  register: run_benchmarks_sanity_memtotal_raw
  changed_when: false
  failed_when: false

- name: Evaluate RAM vs tmpfs requirement
  ansible.builtin.set_fact:
    run_benchmarks_sanity_is_tmpfs: >-
      {{ (run_benchmarks_sanity_fstype_raw.stdout | default('')).find('tmpfs') != -1 }}
    run_benchmarks_sanity_ram_total_mb: >-
      {{ ((run_benchmarks_sanity_memtotal_raw.stdout | default('0') | int) / 1024) | round(0) | int }}
    run_benchmarks_sanity_ram_ok: >-
      {{ ((run_benchmarks_sanity_memtotal_raw.stdout | default('0') | int) / 1024) | int
         >= run_benchmarks_min_ram_mb
         or (run_benchmarks_scale_ram | default(true) | bool) }}

# ── 5. Emit warning when issues are detected ─────────────────────────────
- name: Warn — benchmark sanity check issues detected
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════════════╗
      ║  BENCHMARK PRE-FLIGHT WARNING: {{ inventory_hostname }}
      ╚══════════════════════════════════════════════════════════════════════╝
      {% if run_benchmarks_sanity_missing_req | length > 0 %}
      ✗ REQUIRED tools missing — affected benchmark categories will be skipped:
          {{ run_benchmarks_sanity_missing_req | join(', ') }}
      {% endif %}
      {% if run_benchmarks_sanity_missing_opt | length > 0 %}
      ⚠ Optional tools missing — associated categories will be skipped:
          {{ run_benchmarks_sanity_missing_opt | join(', ') }}
      {% endif %}
      {% if run_benchmarks_sanity_sudo.rc | default(1) != 0 %}
      ✗ Passwordless sudo NOT available — CPU governor pinning and swap
          disable/restore steps will be skipped or may fail.
          Ensure the Ansible user is in the sudoers file with NOPASSWD.
      {% endif %}
      {% if not run_benchmarks_sanity_disk_ok %}
      ✗ Low disk space on partition '{{ run_benchmarks_sanity_disk_mount }}'
          (used by {{ run_benchmarks_work_dir }}):
          {{ run_benchmarks_sanity_disk_free_mb }} MB free,
          {{ run_benchmarks_min_disk_mb }} MB required.
          Free up space or set run_benchmarks_min_disk_mb to a lower value
          if running only a subset of benchmark categories.
      {% endif %}
      {% if run_benchmarks_sanity_is_tmpfs and not run_benchmarks_sanity_ram_ok %}
      ⚠ Work directory is on tmpfs (RAM-backed) but total RAM is only
          {{ run_benchmarks_sanity_ram_total_mb }} MB — below the recommended
          {{ run_benchmarks_min_ram_mb }} MB for a full benchmark run.
          Fixture files (~1.7 GB) and encode intermediates (~500 MB) reside
          in RAM when using tmpfs; insufficient RAM causes swap thrashing
          and distorts compression/coreutils results.
          Set run_benchmarks_scale_ram=true (default) so that KVM VMs have
          their RAM temporarily raised to max_memory before benchmarks run.
          To override: set run_benchmarks_min_ram_mb to a lower value.
      {% endif %}
      {% if run_benchmarks_sanity_missing_req | length > 0 or run_benchmarks_sanity_missing_opt | length > 0 %}
      ─────────────────────────────────────────────────────────────────────
      To install missing tools, run the provisioning playbook:

          ansible-playbook playbooks/provision_benchmarks.yml \
            -i inventory_generator.py \
            --limit {{ inventory_hostname }}

      ─────────────────────────────────────────────────────────────────────
      {% endif %}
      The benchmark run will proceed regardless of the above warnings.
  when: >-
    run_benchmarks_sanity_missing_req | length > 0 or
    run_benchmarks_sanity_missing_opt | length > 0 or
    run_benchmarks_sanity_sudo.rc | default(1) != 0 or
    not run_benchmarks_sanity_disk_ok or
    (run_benchmarks_sanity_is_tmpfs and not run_benchmarks_sanity_ram_ok)

# ── 6. Persist sanity-check notes ────────────────────────────────────────
- name: Write benchmark notes (missing tools)
  ansible.builtin.copy:
    dest: "{{ run_benchmarks_work_dir }}/benchmark_notes.json"
    content: "{{ _notes | to_nice_json }}"
    mode: "0644"
  vars:
    _notes:
      missing_tools:
        required: "{{ run_benchmarks_sanity_missing_req | default([]) }}"
        optional: "{{ run_benchmarks_sanity_missing_opt | default([]) }}"
  changed_when: false
  failed_when: false
