---
# Disk I/O benchmarks: sequential read/write speed on the benchmark work
# directory filesystem.  VM storage backends (virtio-blk, NFS, NVME) vary
# enormously; this captures the difference without requiring fio or special tools.
# Results are intentionally NOT comparable across runs if the work directory
# changes filesystems.

# ── Detect work directory filesystem ─────────────────────────────────────

- name: Detect work directory device
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      df --output=source {{ run_benchmarks_work_dir }} | tail -1 | tr -d ' '
    executable: /bin/bash
  register: run_benchmarks_disk_dev
  changed_when: false
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'

- name: Skip disk benchmark if work directory is tmpfs
  ansible.builtin.set_fact:
    run_benchmarks_disk_skip: >-
      {{ run_benchmarks_disk_dev.stdout | default('') in ['tmpfs', 'none', '']
         or run_benchmarks_disk_dev.stdout | default('') | regex_search('^(tmpfs|devtmpfs|ramfs)') }}
  when: ansible_system | default('Linux') == 'Linux'

- name: Show disk benchmark target
  ansible.builtin.debug:
    msg: >-
      Disk benchmark target: {{ run_benchmarks_disk_dev.stdout | default('unknown') }}
      {{ '(SKIP: tmpfs)' if run_benchmarks_disk_skip | default(false) else '' }}
  when: ansible_system | default('Linux') == 'Linux'

# ── Disk I/O benchmarks ───────────────────────────────────────────────────

- name: Run disk sequential I/O benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      TESTFILE="{{ run_benchmarks_work_dir }}/disk_bench.bin"
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup 1 \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/disk.json \
        --prepare "rm -f ${TESTFILE}" \
        --command-name "seq-write-256m" \
          "dd if=/dev/zero of=${TESTFILE} bs=64M count=4 oflag=sync 2>&1" \
        --prepare "sync && echo 3 > /proc/sys/vm/drop_caches" \
        --command-name "seq-read-256m" \
          "dd if=${TESTFILE} of=/dev/null bs=64M count=4 2>&1"
    executable: /bin/bash
  become: true
  register: run_benchmarks_disk_result
  changed_when: false
  failed_when: false
  when:
    - ansible_system | default('Linux') == 'Linux'
    - not (run_benchmarks_disk_skip | default(true) | bool)

- name: Warn if disk benchmarks failed
  ansible.builtin.debug:
    msg: "[WARN] disk benchmark failed or timed out"
  when:
    - ansible_system | default('Linux') == 'Linux'
    - not (run_benchmarks_disk_skip | default(true) | bool)
    - run_benchmarks_disk_result is defined
    - run_benchmarks_disk_result.rc | default(0) != 0

- name: Clean up disk benchmark test file
  ansible.builtin.file:
    path: "{{ run_benchmarks_work_dir }}/disk_bench.bin"
    state: absent
  failed_when: false
  when: ansible_system | default('Linux') == 'Linux'
