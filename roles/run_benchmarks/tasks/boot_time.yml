---
# Collect system boot timing via systemd-analyze.
# Writes boot_times.json to the work directory.
# If systemd-analyze is unavailable (OpenRC, container, etc.), writes {"available": false}.

- name: Check systemd-analyze availability
  ansible.builtin.command: systemd-analyze --version
  register: run_benchmarks_boot_sa_check
  failed_when: false
  changed_when: false

- name: Collect boot times via systemd-analyze # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: |
      python3 - << 'PYEOF'
      import subprocess, json, re, sys

      def parse_time(s):
          """Parse a systemd time string (e.g. '2.168s', '302ms', '1min 2.3s') → float seconds."""
          s = s.strip()
          m = re.match(r'(\d+)min\s+([\d.]+)s', s)
          if m:
              return round(int(m.group(1)) * 60 + float(m.group(2)), 3)
          m = re.match(r'([\d.]+)ms$', s)
          if m:
              return round(float(m.group(1)) / 1000, 3)
          m = re.match(r'([\d.]+)s$', s)
          if m:
              return round(float(m.group(1)), 3)
          return None

      # Pattern that captures a systemd-formatted time token (ms/s/min s)
      TIME_TOK = r'[\d.]+ms|[\d]+min\s+[\d.]+s|[\d.]+s'

      out = {'available': True}
      try:
          txt = subprocess.check_output(['systemd-analyze'], text=True, stderr=subprocess.DEVNULL)
          for key, label in [
              ('firmware_sec',  'firmware'),
              ('loader_sec',    'loader'),
              ('kernel_sec',    'kernel'),
              ('userspace_sec', 'userspace'),
              ('graphical_sec', 'graphical.target'),
          ]:
              pat = rf'({TIME_TOK})\s*\({re.escape(label)}\)'
              m = re.search(pat, txt)
              out[key] = parse_time(m.group(1)) if m else None
          # Total is after the '=' sign
          m = re.search(rf'=\s*({TIME_TOK})', txt)
          out['total_sec'] = parse_time(m.group(1)) if m else None
      except Exception as e:
          out['available'] = False
          out['error'] = str(e)
          print(json.dumps(out))
          sys.exit(0)

      # Top slow services
      try:
          blame = subprocess.check_output(
              ['systemd-analyze', 'blame', '--no-pager'], text=True, stderr=subprocess.DEVNULL)
          services = []
          for line in blame.strip().splitlines()[:15]:
              line = line.strip()
              m = re.match(rf'({TIME_TOK})\s+(.+)', line)
              if m:
                  t = parse_time(m.group(1))
                  name = m.group(2).strip()
                  if t is not None:
                      services.append({'name': name, 'time_sec': t})
          out['top_services'] = services
      except Exception:
          out['top_services'] = []

      print(json.dumps(out))
      PYEOF
  register: run_benchmarks_boot_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_boot_sa_check.rc == 0

- name: Write boot times result (systemd available)
  ansible.builtin.copy:
    content: "{{ run_benchmarks_boot_result.stdout }}\n"
    dest: "{{ run_benchmarks_work_dir }}/boot_times.json"
    mode: '0644'
  when:
    - run_benchmarks_boot_sa_check.rc == 0
    - run_benchmarks_boot_result.stdout | default('') | length > 0

- name: Write boot times result (systemd unavailable)
  ansible.builtin.copy:
    content: '{"available": false}'
    dest: "{{ run_benchmarks_work_dir }}/boot_times.json"
    mode: '0644'
  when: run_benchmarks_boot_sa_check.rc != 0
