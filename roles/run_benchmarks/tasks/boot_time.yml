---
# Collect system boot timing.
# 1. Prefers systemd-analyze (accurate phase breakdown + per-service blame).
# 2. Falls back to dmesg timestamp parsing for non-systemd hosts (OpenRC,
#    SysVinit, etc.).  Writes boot_times.json to the work directory.

- name: Check systemd-analyze availability
  ansible.builtin.command: systemd-analyze --version
  register: run_benchmarks_boot_sa_check
  failed_when: false
  changed_when: false

- name: Collect boot times via systemd-analyze # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: |
      python3 - << 'PYEOF'
      import subprocess, json, re, sys

      def parse_time(s):
          """Parse a systemd time string ('2.168s', '302ms', '1min 2.3s') → float seconds."""
          s = s.strip()
          m = re.match(r'(\d+)min\s+([\d.]+)s', s)
          if m:
              return round(int(m.group(1)) * 60 + float(m.group(2)), 3)
          m = re.match(r'([\d.]+)ms$', s)
          if m:
              return round(float(m.group(1)) / 1000, 3)
          m = re.match(r'([\d.]+)s$', s)
          if m:
              return round(float(m.group(1)), 3)
          return None

      TIME_TOK = r'[\d.]+ms|[\d]+min\s+[\d.]+s|[\d.]+s'

      out = {'available': True, 'method': 'systemd-analyze'}
      try:
          txt = subprocess.check_output(['systemd-analyze'], text=True, stderr=subprocess.DEVNULL)
          for key, label in [
              ('firmware_sec',  'firmware'),
              ('loader_sec',    'loader'),
              ('kernel_sec',    'kernel'),
              ('userspace_sec', 'userspace'),
              ('graphical_sec', 'graphical.target'),
          ]:
              pat = rf'({TIME_TOK})\s*\({re.escape(label)}\)'
              m = re.search(pat, txt)
              out[key] = parse_time(m.group(1)) if m else None
          m = re.search(rf'=\s*({TIME_TOK})', txt)
          out['total_sec'] = parse_time(m.group(1)) if m else None
      except Exception as e:
          out['available'] = False
          out['error'] = str(e)
          print(json.dumps(out))
          sys.exit(0)

      try:
          blame = subprocess.check_output(
              ['systemd-analyze', 'blame', '--no-pager'], text=True, stderr=subprocess.DEVNULL)
          services = []
          for line in blame.strip().splitlines()[:15]:
              line = line.strip()
              m = re.match(rf'({TIME_TOK})\s+(.+)', line)
              if m:
                  t = parse_time(m.group(1))
                  name = m.group(2).strip()
                  if t is not None:
                      services.append({'name': name, 'time_sec': t})
          out['top_services'] = services
      except Exception:
          out['top_services'] = []

      print(json.dumps(out))
      PYEOF
  register: run_benchmarks_boot_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_boot_sa_check.rc == 0

- name: Write boot times result (systemd)
  ansible.builtin.copy:
    content: "{{ run_benchmarks_boot_result.stdout }}\n"
    dest: "{{ run_benchmarks_work_dir }}/boot_times.json"
    mode: '0644'
  when:
    - run_benchmarks_boot_sa_check.rc == 0
    - run_benchmarks_boot_result.stdout | default('') | length > 0

# ── dmesg fallback (OpenRC / SysVinit / any non-systemd Linux) ────────────────
#
# dmesg timestamps are "seconds since boot" for every kernel and early-userspace
# message, providing a reasonable equivalent to systemd-analyze's kernel and
# (partial) userspace phases:
#
#   kernel_sec   – timestamp of last "pure kernel" message, identified by the
#                  "Freeing unused kernel image" line that marks end of kernel
#                  init.  Falls back to the last message before any obvious init
#                  string if that marker is absent.
#   userspace_sec – time between kernel handoff and the last dmesg entry within
#                   the boot window (≤ 300 s).  Early-userspace writes to dmesg
#                   (udev, OpenRC, module loads) appear here.
#   total_sec     – last dmesg timestamp within the boot window.
#   top_services  – not available; empty list.

- name: Collect boot times via dmesg (non-systemd fallback) # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: |
      python3 - << 'PYEOF'
      import subprocess, json, re, sys

      BOOT_WINDOW_SEC = 300   # ignore dmesg entries > 5 min after boot

      # Kernel-init-complete markers (last one seen → kernel phase end)
      KERNEL_END_RE = re.compile(
          r'Freeing unused kernel (?:image|memory)'
          r'|Initialisation of inode table'
          r'|All bugs added by Dave Miller'
          r'|Brought up \d+ CPU'
      )
      # Userspace-start markers (first one seen → init handoff)
      USERSPACE_START_RE = re.compile(
          r'(?i)run /sbin/init|openrc|INIT:|sysvinit|runit|s6-svscan'
          r'|systemd\[1\]|Starting version'
      )

      def dmesg_ts(line):
          """Extract dmesg timestamp → float, or None."""
          m = re.match(r'\[\s*([\d.]+)\]', line)
          return float(m.group(1)) if m else None

      try:
          raw = subprocess.check_output(
              ['dmesg'], text=True, stderr=subprocess.DEVNULL)
      except Exception as e:
          print(json.dumps({'available': False, 'method': 'dmesg', 'error': str(e)}))
          sys.exit(0)

      lines = raw.strip().splitlines()
      # Collect timestamped entries within the boot window
      boot_lines = []
      for line in lines:
          t = dmesg_ts(line)
          if t is not None and t <= BOOT_WINDOW_SEC:
              boot_lines.append((t, line))

      if not boot_lines:
          print(json.dumps({'available': False, 'method': 'dmesg',
                            'error': 'no timestamped dmesg entries in boot window'}))
          sys.exit(0)

      all_ts = [t for t, _ in boot_lines]
      total_sec = round(max(all_ts), 3)

      # Find kernel phase end
      kernel_end_ts = None
      for t, line in boot_lines:
          if KERNEL_END_RE.search(line):
              kernel_end_ts = t  # keep updating — want the last match

      # Find userspace start (first init-related message)
      userspace_start_ts = None
      for t, line in boot_lines:
          if USERSPACE_START_RE.search(line):
              userspace_start_ts = t
              break  # want the first match

      # Derive phases
      if kernel_end_ts is not None:
          kernel_sec = round(kernel_end_ts, 3)
      elif userspace_start_ts is not None:
          kernel_sec = round(userspace_start_ts, 3)
      else:
          # No clear boundary — use 50% heuristic as rough kernel share
          kernel_sec = round(total_sec * 0.5, 3)

      if userspace_start_ts is not None:
          userspace_sec = round(total_sec - userspace_start_ts, 3)
      elif kernel_end_ts is not None:
          userspace_sec = round(total_sec - kernel_end_ts, 3)
      else:
          userspace_sec = None

      out = {
          'available': True,
          'method': 'dmesg',
          'firmware_sec': None,
          'loader_sec': None,
          'kernel_sec': kernel_sec,
          'userspace_sec': userspace_sec,
          'graphical_sec': None,
          'total_sec': total_sec,
          'top_services': [],
      }
      print(json.dumps(out))
      PYEOF
  register: run_benchmarks_boot_dmesg_result
  changed_when: false
  failed_when: false
  when: run_benchmarks_boot_sa_check.rc != 0

- name: Write boot times result (dmesg fallback)
  ansible.builtin.copy:
    content: "{{ run_benchmarks_boot_dmesg_result.stdout }}\n"
    dest: "{{ run_benchmarks_work_dir }}/boot_times.json"
    mode: '0644'
  when:
    - run_benchmarks_boot_sa_check.rc != 0
    - run_benchmarks_boot_dmesg_result.stdout | default('') | length > 0
