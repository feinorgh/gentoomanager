---
# Crypto benchmarks: OpenSSL speed tests (symmetric, hash, asymmetric), GPG sign/verify
#
# These benchmarks are especially sensitive to compiler flags (-march, -O level,
# LTO) because OpenSSL's crypto primitives rely on hardware acceleration
# (AES-NI, SHA-NI, AVX2) and compiler auto-vectorization.

# ── 1. Detect available OpenSSL algorithms ────────────────────────────────
- name: Detect available OpenSSL ciphers and algorithms
  local.gentoomanager.probe_command_output:
    timeout: 15
    probes:
      - output_name: ciphers
        command: [openssl, enc, -list]
        pattern: '-(\S+)'
        combine_stderr: true
      - output_name: digests
        command: [openssl, dgst, -list]
        pattern: '-(\S+)'
        combine_stderr: true
      - output_name: speed_help
        command: [openssl, speed, -help]
        combine_stderr: true
        raw: true
        max_length: 2000
  register: run_benchmarks_crypto_detect
  failed_when: false

- name: Set available crypto algorithms fact
  ansible.builtin.set_fact:
    run_benchmarks_crypto_info: "{{ run_benchmarks_crypto_detect.data }}"

# ── 2. Symmetric cipher benchmarks (AES, ChaCha20) ──────────────────────
- name: Run symmetric cipher benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      has_cipher() { echo "{{ run_benchmarks_crypto_info.ciphers | join(' ') }}" | grep -qw "$1"; }

      CMDS=()

      # AES-256-CBC — block cipher, benefits from AES-NI
      if has_cipher aes-256-cbc; then
        CMDS+=(--command-name "aes-256-cbc"
          "openssl enc -aes-256-cbc -in testdata.bin -out /dev/null -pass pass:benchmark -pbkdf2")
      fi

      # AES-128-CBC — smaller key, still AES-NI accelerated
      if has_cipher aes-128-cbc; then
        CMDS+=(--command-name "aes-128-cbc"
          "openssl enc -aes-128-cbc -in testdata.bin -out /dev/null -pass pass:benchmark -pbkdf2")
      fi

      # AES-256-CTR — counter mode, parallelizable
      if has_cipher aes-256-ctr; then
        CMDS+=(--command-name "aes-256-ctr"
          "openssl enc -aes-256-ctr -in testdata.bin -out /dev/null -pass pass:benchmark -pbkdf2")
      fi

      # ChaCha20-Poly1305 — no hardware accel, pure software, very compiler-sensitive
      if has_cipher chacha20; then
        CMDS+=(--command-name "chacha20"
          "openssl enc -chacha20 -in testdata.bin -out /dev/null -pass pass:benchmark -pbkdf2")
      fi

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_symmetric.json \
        "${CMDS[@]}"
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  args:
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_crypto_symmetric_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_symmetric benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_symmetric benchmark exited
      rc={{ run_benchmarks_crypto_symmetric_result.rc }}.
      {{ run_benchmarks_crypto_symmetric_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_symmetric_result is not skipped
    - run_benchmarks_crypto_symmetric_result.rc | default(0) != 0

# ── 3. Hash / digest benchmarks via OpenSSL ──────────────────────────────
- name: Run OpenSSL digest benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      has_dgst() { echo "{{ run_benchmarks_crypto_info.digests | join(' ') }}" | grep -qw "$1"; }

      CMDS=()

      if has_dgst sha256; then
        CMDS+=(--command-name "openssl-sha256" "openssl dgst -sha256 testdata.bin")
      fi

      if has_dgst sha512; then
        CMDS+=(--command-name "openssl-sha512" "openssl dgst -sha512 testdata.bin")
      fi

      if has_dgst sha3-256; then
        CMDS+=(--command-name "openssl-sha3-256" "openssl dgst -sha3-256 testdata.bin")
      fi

      if has_dgst sha1; then
        CMDS+=(--command-name "openssl-sha1" "openssl dgst -sha1 testdata.bin")
      fi

      if has_dgst md5; then
        CMDS+=(--command-name "openssl-md5" "openssl dgst -md5 testdata.bin")
      fi

      if has_dgst blake2b512; then
        CMDS+=(--command-name "openssl-blake2b512" "openssl dgst -blake2b512 testdata.bin")
      fi

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_hash.json \
        "${CMDS[@]}"
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  args:
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_crypto_hash_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_hash benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_hash benchmark exited
      rc={{ run_benchmarks_crypto_hash_result.rc }}.
      {{ run_benchmarks_crypto_hash_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_hash_result is not skipped
    - run_benchmarks_crypto_hash_result.rc | default(0) != 0

# ── 4. Coreutils hash benchmarks (for comparison) ───────────────────────
- name: Run coreutils hash benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      has_cmd() { command -v "$1" >/dev/null 2>&1; }

      CMDS=()
      if has_cmd sha256sum; then
        CMDS+=(--command-name "sha256sum" "sha256sum testdata.bin")
      fi
      if has_cmd sha512sum; then
        CMDS+=(--command-name "sha512sum" "sha512sum testdata.bin")
      fi
      if has_cmd md5sum; then
        CMDS+=(--command-name "md5sum" "md5sum testdata.bin")
      fi
      if has_cmd b2sum; then
        CMDS+=(--command-name "b2sum" "b2sum testdata.bin")
      fi

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_hash_coreutils.json \
        "${CMDS[@]}"
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  args:
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_crypto_hash_coreutils_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_hash_coreutils benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_hash_coreutils benchmark exited
      rc={{ run_benchmarks_crypto_hash_coreutils_result.rc }}.
      {{ run_benchmarks_crypto_hash_coreutils_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_hash_coreutils_result is not skipped
    - run_benchmarks_crypto_hash_coreutils_result.rc | default(0) != 0

# ── 5. OpenSSL speed — built-in throughput benchmarks ────────────────────
# Run openssl speed directly and parse the KB/s throughput from its output.
# Wrapping in hyperfine discarded the real data because openssl speed always
# runs for exactly the requested number of seconds (the wall-clock time is
# constant, not the throughput). We instead run each algorithm for
# warmup+runs iterations and store actual KB/s values.
- name: Run OpenSSL speed benchmarks (symmetric + AEAD)
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      python3 - << 'PYEOF'
      import json
      import math
      import re
      import subprocess
      import sys

      ALGORITHMS = [
          ("speed-aes-256-gcm",       ["openssl", "speed", "-seconds", "3", "-bytes", "16384", "-evp", "aes-256-gcm"]),
          ("speed-aes-256-cbc",       ["openssl", "speed", "-seconds", "3", "-bytes", "16384", "aes-256-cbc"]),
          ("speed-chacha20-poly1305", ["openssl", "speed", "-seconds", "3", "-bytes", "16384", "-evp", "chacha20-poly1305"]),
          ("speed-sha256",            ["openssl", "speed", "-seconds", "3", "-bytes", "16384", "sha256"]),
          ("speed-sha512",            ["openssl", "speed", "-seconds", "3", "-bytes", "16384", "sha512"]),
      ]
      WARMUP = {{ run_benchmarks_warmup }}
      RUNS   = {{ run_benchmarks_runs }}
      OUTFILE = "{{ run_benchmarks_work_dir }}/crypto_openssl_speed.json"

      # Pattern: last number with 'k' suffix on the algorithm result line
      _KB_RE = re.compile(r"([\d.]+)k\s*$")

      def parse_kbps(output):
          """Return KB/s float from openssl speed stdout, or None."""
          for line in reversed(output.splitlines()):
              m = _KB_RE.search(line.strip())
              if m:
                  return float(m.group(1)) * 1000.0
          return None

      results = []
      for name, cmd in ALGORITHMS:
          samples = []
          total_iters = WARMUP + RUNS
          for i in range(total_iters):
              proc = subprocess.run(cmd, capture_output=True, text=True, check=False)
              combined = proc.stdout + proc.stderr
              val = parse_kbps(combined)
              if val is not None and i >= WARMUP:
                  samples.append(val)

          if not samples:
              continue

          n = len(samples)
          mean = sum(samples) / n
          variance = sum((x - mean) ** 2 for x in samples) / (n - 1) if n > 1 else 0.0
          stddev = math.sqrt(variance)
          sorted_s = sorted(samples)
          mid = n // 2
          median = (sorted_s[mid - 1] + sorted_s[mid]) / 2.0 if n % 2 == 0 else sorted_s[mid]

          results.append({
              "command": name,
              "mean":    mean,
              "stddev":  stddev,
              "min":     min(samples),
              "max":     max(samples),
              "median":  median,
              "unit":    "KB/s",
              "higher_is_better": True,
          })

      with open(OUTFILE, "w") as fh:
          json.dump({"results": results}, fh, indent=2)

      print(f"Wrote {len(results)} result(s) to {OUTFILE}", file=sys.stderr)
      PYEOF
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_crypto_speed_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_openssl_speed benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_openssl_speed benchmark exited
      rc={{ run_benchmarks_crypto_speed_result.rc }}.
      {{ run_benchmarks_crypto_speed_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_speed_result is not skipped
    - run_benchmarks_crypto_speed_result.rc | default(0) != 0

# ── 6. Asymmetric / public-key benchmarks ────────────────────────────────
#
# Key types benchmarked and their NIST/industry status (2025):
#   RSA-2048   — acceptable to 2030 (NIST SP 800-57); legacy threshold
#   RSA-3072   — NIST minimum for post-2030 security
#   RSA-4096   — well above requirements; used for long-lived CA keys
#   ECDSA P-256 — 128-bit security; widely deployed; acceptable for commercial use
#   ECDSA P-384 — 192-bit security; CNSA Suite 2.0 minimum for new systems
#   ECDSA P-521 — 260-bit security; maximum classical NIST curve strength
#   Ed25519    — 128-bit security; FIPS 186-5; fast, constant-time
#   Ed448      — 224-bit security; FIPS 186-5; constant-time
#   ML-DSA-44/65/87 — FIPS 204 (post-quantum); 128/192/256-bit PQ security
#   SLH-DSA-SHA2-128f — FIPS 205 (post-quantum, fast variant); 128-bit PQ
#
# Post-quantum algorithms require OpenSSL 3.5+ (April 2025) and are
# detected at runtime; the benchmark skips them gracefully if unavailable.
#
# All algorithms run the same 1000-iteration inner loop so wall-clock totals
# are directly comparable across key types.
- name: Run OpenSSL asymmetric benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      N=1000

      # ── Generate classical keys ──────────────────────────────────────────
      [ -f rsa2048.pem ] || openssl genrsa -out rsa2048.pem 2048 2>/dev/null
      [ -f rsa3072.pem ] || openssl genrsa -out rsa3072.pem 3072 2>/dev/null
      [ -f rsa4096.pem ] || openssl genrsa -out rsa4096.pem 4096 2>/dev/null
      [ -f ec256.pem ]   || openssl ecparam -genkey -name prime256v1 -out ec256.pem 2>/dev/null
      [ -f ec384.pem ]   || openssl ecparam -genkey -name secp384r1  -out ec384.pem 2>/dev/null
      [ -f ec521.pem ]   || openssl ecparam -genkey -name secp521r1  -out ec521.pem 2>/dev/null
      [ -f ed25519.pem ] || openssl genpkey -algorithm Ed25519 -out ed25519.pem 2>/dev/null
      [ -f ed448.pem ]   || openssl genpkey -algorithm Ed448   -out ed448.pem   2>/dev/null

      # ── Probe and generate post-quantum keys (OpenSSL 3.5+, non-fatal) ──
      [ -f mldsa44.pem ]    || openssl genpkey -algorithm ML-DSA-44          -out mldsa44.pem    2>/dev/null || true
      [ -f mldsa65.pem ]    || openssl genpkey -algorithm ML-DSA-65          -out mldsa65.pem    2>/dev/null || true
      [ -f mldsa87.pem ]    || openssl genpkey -algorithm ML-DSA-87          -out mldsa87.pem    2>/dev/null || true
      [ -f slhdsa128f.pem ] || openssl genpkey -algorithm SLH-DSA-SHA2-128f  -out slhdsa128f.pem 2>/dev/null || true

      # ── Data to sign (1 KiB: realistic without I/O dominating crypto) ───
      dd if=/dev/urandom of=signdata.bin bs=1k count=1 2>/dev/null

      # ── Derive public keys ───────────────────────────────────────────────
      openssl rsa  -in rsa2048.pem -pubout -out rsa2048pub.pem 2>/dev/null
      openssl rsa  -in rsa3072.pem -pubout -out rsa3072pub.pem 2>/dev/null
      openssl rsa  -in rsa4096.pem -pubout -out rsa4096pub.pem 2>/dev/null
      openssl ec   -in ec256.pem   -pubout -out ec256pub.pem   2>/dev/null
      openssl ec   -in ec384.pem   -pubout -out ec384pub.pem   2>/dev/null
      openssl ec   -in ec521.pem   -pubout -out ec521pub.pem   2>/dev/null
      openssl pkey -in ed25519.pem -pubout -out ed25519pub.pem 2>/dev/null
      openssl pkey -in ed448.pem   -pubout -out ed448pub.pem   2>/dev/null
      if [ -f mldsa44.pem ];    then openssl pkey -in mldsa44.pem    -pubout -out mldsa44pub.pem    2>/dev/null; fi
      if [ -f mldsa65.pem ];    then openssl pkey -in mldsa65.pem    -pubout -out mldsa65pub.pem    2>/dev/null; fi
      if [ -f mldsa87.pem ];    then openssl pkey -in mldsa87.pem    -pubout -out mldsa87pub.pem    2>/dev/null; fi
      if [ -f slhdsa128f.pem ]; then openssl pkey -in slhdsa128f.pem -pubout -out slhdsa128fpub.pem 2>/dev/null; fi

      # ── Pre-generate reference signatures for verify loops ───────────────
      openssl dgst   -sha256 -sign rsa2048.pem   -out sig_rsa2048.bin   signdata.bin
      openssl dgst   -sha256 -sign rsa3072.pem   -out sig_rsa3072.bin   signdata.bin
      openssl dgst   -sha256 -sign rsa4096.pem   -out sig_rsa4096.bin   signdata.bin
      openssl dgst   -sha256 -sign ec256.pem     -out sig_ec256.bin     signdata.bin
      openssl dgst   -sha256 -sign ec384.pem     -out sig_ec384.bin     signdata.bin
      openssl dgst   -sha256 -sign ec521.pem     -out sig_ec521.bin     signdata.bin
      openssl pkeyutl -sign -inkey ed25519.pem   -in signdata.bin -out sig_ed25519.bin
      openssl pkeyutl -sign -inkey ed448.pem     -in signdata.bin -out sig_ed448.bin
      if [ -f mldsa44.pem ];    then openssl pkeyutl -sign -inkey mldsa44.pem    -in signdata.bin -out sig_mldsa44.bin    2>/dev/null; fi
      if [ -f mldsa65.pem ];    then openssl pkeyutl -sign -inkey mldsa65.pem    -in signdata.bin -out sig_mldsa65.bin    2>/dev/null; fi
      if [ -f mldsa87.pem ];    then openssl pkeyutl -sign -inkey mldsa87.pem    -in signdata.bin -out sig_mldsa87.bin    2>/dev/null; fi
      if [ -f slhdsa128f.pem ]; then openssl pkeyutl -sign -inkey slhdsa128f.pem -in signdata.bin -out sig_slhdsa128f.bin 2>/dev/null; fi

      # ── Build hyperfine command list ─────────────────────────────────────
      CMDS=()

      CMDS+=(--command-name "rsa-2048-sign-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -sign rsa2048.pem -out sig.bin signdata.bin; done")
      CMDS+=(--command-name "rsa-2048-verify-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -verify rsa2048pub.pem -signature sig_rsa2048.bin signdata.bin; done")

      CMDS+=(--command-name "rsa-3072-sign-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -sign rsa3072.pem -out sig.bin signdata.bin; done")
      CMDS+=(--command-name "rsa-3072-verify-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -verify rsa3072pub.pem -signature sig_rsa3072.bin signdata.bin; done")

      CMDS+=(--command-name "rsa-4096-sign-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -sign rsa4096.pem -out sig.bin signdata.bin; done")
      CMDS+=(--command-name "rsa-4096-verify-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -verify rsa4096pub.pem -signature sig_rsa4096.bin signdata.bin; done")

      CMDS+=(--command-name "ecdsa-p256-sign-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -sign ec256.pem -out sig.bin signdata.bin; done")
      CMDS+=(--command-name "ecdsa-p256-verify-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -verify ec256pub.pem -signature sig_ec256.bin signdata.bin; done")

      CMDS+=(--command-name "ecdsa-p384-sign-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -sign ec384.pem -out sig.bin signdata.bin; done")
      CMDS+=(--command-name "ecdsa-p384-verify-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -verify ec384pub.pem -signature sig_ec384.bin signdata.bin; done")

      CMDS+=(--command-name "ecdsa-p521-sign-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -sign ec521.pem -out sig.bin signdata.bin; done")
      CMDS+=(--command-name "ecdsa-p521-verify-${N}x"
        "for _i in \$(seq $N); do openssl dgst -sha256 -verify ec521pub.pem -signature sig_ec521.bin signdata.bin; done")

      CMDS+=(--command-name "ed25519-sign-${N}x"
        "for _i in \$(seq $N); do openssl pkeyutl -sign -inkey ed25519.pem -in signdata.bin -out sig.bin; done")
      CMDS+=(--command-name "ed25519-verify-${N}x"
        "for _i in \$(seq $N); do openssl pkeyutl -verify -pubin -inkey ed25519pub.pem -in signdata.bin -sigfile sig_ed25519.bin; done")

      CMDS+=(--command-name "ed448-sign-${N}x"
        "for _i in \$(seq $N); do openssl pkeyutl -sign -inkey ed448.pem -in signdata.bin -out sig.bin; done")
      CMDS+=(--command-name "ed448-verify-${N}x"
        "for _i in \$(seq $N); do openssl pkeyutl -verify -pubin -inkey ed448pub.pem -in signdata.bin -sigfile sig_ed448.bin; done")

      # Post-quantum: add only if key generation and pre-signing succeeded
      if [ -f mldsa44pub.pem ] && [ -f sig_mldsa44.bin ]; then
        CMDS+=(--command-name "ml-dsa-44-sign-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -sign -inkey mldsa44.pem -in signdata.bin -out sig.bin; done")
        CMDS+=(--command-name "ml-dsa-44-verify-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -verify -pubin -inkey mldsa44pub.pem -in signdata.bin -sigfile sig_mldsa44.bin; done")
      fi
      if [ -f mldsa65pub.pem ] && [ -f sig_mldsa65.bin ]; then
        CMDS+=(--command-name "ml-dsa-65-sign-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -sign -inkey mldsa65.pem -in signdata.bin -out sig.bin; done")
        CMDS+=(--command-name "ml-dsa-65-verify-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -verify -pubin -inkey mldsa65pub.pem -in signdata.bin -sigfile sig_mldsa65.bin; done")
      fi
      if [ -f mldsa87pub.pem ] && [ -f sig_mldsa87.bin ]; then
        CMDS+=(--command-name "ml-dsa-87-sign-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -sign -inkey mldsa87.pem -in signdata.bin -out sig.bin; done")
        CMDS+=(--command-name "ml-dsa-87-verify-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -verify -pubin -inkey mldsa87pub.pem -in signdata.bin -sigfile sig_mldsa87.bin; done")
      fi
      if [ -f slhdsa128fpub.pem ] && [ -f sig_slhdsa128f.bin ]; then
        CMDS+=(--command-name "slh-dsa-sha2-128f-sign-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -sign -inkey slhdsa128f.pem -in signdata.bin -out sig.bin; done")
        CMDS+=(--command-name "slh-dsa-sha2-128f-verify-${N}x"
          "for _i in \$(seq $N); do openssl pkeyutl -verify -pubin -inkey slhdsa128fpub.pem -in signdata.bin -sigfile sig_slhdsa128f.bin; done")
      fi

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_asymmetric.json \
        "${CMDS[@]}"
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  args:
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_crypto_asymmetric_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_asymmetric benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_asymmetric benchmark exited
      rc={{ run_benchmarks_crypto_asymmetric_result.rc }}.
      {{ run_benchmarks_crypto_asymmetric_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_asymmetric_result is not skipped
    - run_benchmarks_crypto_asymmetric_result.rc | default(0) != 0

# ── 7. HMAC benchmarks ──────────────────────────────────────────────────
- name: Run HMAC benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      has_dgst() { echo "{{ run_benchmarks_crypto_info.digests | join(' ') }}" | grep -qw "$1"; }

      CMDS=()

      if has_dgst sha256; then
        CMDS+=(--command-name "hmac-sha256" "openssl dgst -sha256 -hmac benchmarkkey testdata.bin")
      fi

      if has_dgst sha512; then
        CMDS+=(--command-name "hmac-sha512" "openssl dgst -sha512 -hmac benchmarkkey testdata.bin")
      fi

      if has_dgst sha3-256; then
        CMDS+=(--command-name "hmac-sha3-256" "openssl dgst -sha3-256 -hmac benchmarkkey testdata.bin")
      fi

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_hmac.json \
        "${CMDS[@]}"
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  args:
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_crypto_hmac_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_hmac benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_hmac benchmark exited
      rc={{ run_benchmarks_crypto_hmac_result.rc }}.
      {{ run_benchmarks_crypto_hmac_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_hmac_result is not skipped
    - run_benchmarks_crypto_hmac_result.rc | default(0) != 0

# ── 8. Key derivation benchmarks ────────────────────────────────────────
- name: Run key derivation benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_kdf.json \
        --command-name 'pbkdf2-sha256-100k' \
          'openssl kdf -keylen 32 -kdfopt digest:sha256 -kdfopt pass:benchmark -kdfopt salt:0123456789abcdef -kdfopt iter:100000 PBKDF2 2>/dev/null || openssl enc -aes-256-cbc -pass pass:benchmark -pbkdf2 -iter 100000 -in signdata.bin -out /dev/null 2>/dev/null' \
        --command-name 'pbkdf2-sha256-10k' \
          'openssl kdf -keylen 32 -kdfopt digest:sha256 -kdfopt pass:benchmark -kdfopt salt:0123456789abcdef -kdfopt iter:10000 PBKDF2 2>/dev/null || openssl enc -aes-256-cbc -pass pass:benchmark -pbkdf2 -iter 10000 -in signdata.bin -out /dev/null 2>/dev/null'
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_crypto_kdf_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_kdf benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_kdf benchmark exited
      rc={{ run_benchmarks_crypto_kdf_result.rc }}.
      {{ run_benchmarks_crypto_kdf_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_kdf_result is not skipped
    - run_benchmarks_crypto_kdf_result.rc | default(0) != 0

# ── 9. GPG sign/verify (kept from original) ──────────────────────────────
- name: Check if GPG is available  # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: command -v gpg
  register: run_benchmarks_gpg_check
  changed_when: false
  failed_when: false

- name: Run GPG benchmarks
  ansible.builtin.shell:
    cmd: |
      set -e
      cd {{ run_benchmarks_work_dir }}

      # Create a temporary GPG key for benchmarking
      if [ ! -f bench_gpg_key ]; then
        export GNUPGHOME={{ run_benchmarks_work_dir }}/gnupg
        mkdir -p "$GNUPGHOME" && chmod 700 "$GNUPGHOME"
        gpg --batch --gen-key <<EOF
      Key-Type: RSA
      Key-Length: 2048
      Name-Real: Benchmark
      Name-Email: bench@test
      Expire-Date: 1
      %no-protection
      %commit
      EOF
        touch bench_gpg_key
      fi

      export GNUPGHOME={{ run_benchmarks_work_dir }}/gnupg
      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_gpg.json \
        --command-name 'gpg-sign' \
          'gpg --batch --yes --sign -o /dev/null testdata.bin' \
        --command-name 'gpg-verify' \
          'gpg --batch --yes --detach-sign testdata.bin && gpg --batch --verify testdata.bin.sig testdata.bin && rm -f testdata.bin.sig'
  when: run_benchmarks_gpg_check.rc == 0
  register: run_benchmarks_crypto_gpg_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_gpg benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_gpg benchmark exited
      rc={{ run_benchmarks_crypto_gpg_result.rc }}.
      {{ run_benchmarks_crypto_gpg_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_gpg_result is not skipped
    - run_benchmarks_crypto_gpg_result.rc | default(0) != 0

# ── 10. SSH signing benchmarks ───────────────────────────────────────────────
#
# Benchmarks ssh-keygen -Y sign/verify (OpenSSH 8.0+) across all key types
# that OpenSSH supports: RSA-2048/3072/4096, ECDSA P-256/P-384/P-521, Ed25519.
# This measures the full real-world cost of SSH signing including process
# startup, key parsing, and protocol overhead — not just raw crypto math.
# Each inner loop runs 1000 operations for direct comparison to the OpenSSL
# asymmetric benchmark (crypto_asymmetric.json).
- name: Check if ssh-keygen supports file signing (-Y, OpenSSH 8.0+)
  ansible.builtin.shell:
    cmd: |
      ver=$(ssh -V 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
      major=$(echo "$ver" | cut -d. -f1)
      [ "${major:-0}" -ge 8 ]
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_ssh_sign_check
  changed_when: false
  failed_when: false

- name: Run SSH signing benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}
      N=1000

      # ── Generate passphrase-free SSH keys ────────────────────────────────
      [ -f ssh_ed25519 ]   || ssh-keygen -t ed25519  -f ssh_ed25519   -N "" -q
      [ -f ssh_rsa2048 ]   || ssh-keygen -t rsa -b 2048 -f ssh_rsa2048 -N "" -q
      [ -f ssh_rsa3072 ]   || ssh-keygen -t rsa -b 3072 -f ssh_rsa3072 -N "" -q
      [ -f ssh_rsa4096 ]   || ssh-keygen -t rsa -b 4096 -f ssh_rsa4096 -N "" -q
      [ -f ssh_ecdsa256 ]  || ssh-keygen -t ecdsa -b 256 -f ssh_ecdsa256 -N "" -q
      [ -f ssh_ecdsa384 ]  || ssh-keygen -t ecdsa -b 384 -f ssh_ecdsa384 -N "" -q
      [ -f ssh_ecdsa521 ]  || ssh-keygen -t ecdsa -b 521 -f ssh_ecdsa521 -N "" -q

      # ── Build allowed_signers file (one identity per key type) ───────────
      {
        echo "bench-ed25519  $(awk '{print $1,$2}' ssh_ed25519.pub)"
        echo "bench-rsa2048  $(awk '{print $1,$2}' ssh_rsa2048.pub)"
        echo "bench-rsa3072  $(awk '{print $1,$2}' ssh_rsa3072.pub)"
        echo "bench-rsa4096  $(awk '{print $1,$2}' ssh_rsa4096.pub)"
        echo "bench-ecdsa256 $(awk '{print $1,$2}' ssh_ecdsa256.pub)"
        echo "bench-ecdsa384 $(awk '{print $1,$2}' ssh_ecdsa384.pub)"
        echo "bench-ecdsa521 $(awk '{print $1,$2}' ssh_ecdsa521.pub)"
      } > ssh_allowed_signers

      # ── Pre-generate reference signatures for verify loops ───────────────
      ssh-keygen -Y sign -f ssh_ed25519   -n benchmark signdata.bin >/dev/null 2>&1 && mv signdata.bin.sig ssh_sig_ed25519.sig
      ssh-keygen -Y sign -f ssh_rsa2048   -n benchmark signdata.bin >/dev/null 2>&1 && mv signdata.bin.sig ssh_sig_rsa2048.sig
      ssh-keygen -Y sign -f ssh_rsa3072   -n benchmark signdata.bin >/dev/null 2>&1 && mv signdata.bin.sig ssh_sig_rsa3072.sig
      ssh-keygen -Y sign -f ssh_rsa4096   -n benchmark signdata.bin >/dev/null 2>&1 && mv signdata.bin.sig ssh_sig_rsa4096.sig
      ssh-keygen -Y sign -f ssh_ecdsa256  -n benchmark signdata.bin >/dev/null 2>&1 && mv signdata.bin.sig ssh_sig_ecdsa256.sig
      ssh-keygen -Y sign -f ssh_ecdsa384  -n benchmark signdata.bin >/dev/null 2>&1 && mv signdata.bin.sig ssh_sig_ecdsa384.sig
      ssh-keygen -Y sign -f ssh_ecdsa521  -n benchmark signdata.bin >/dev/null 2>&1 && mv signdata.bin.sig ssh_sig_ecdsa521.sig

      # ── Build hyperfine command list ─────────────────────────────────────
      CMDS=()

      CMDS+=(--command-name "ssh-ed25519-sign-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y sign -f ssh_ed25519 -n benchmark signdata.bin >/dev/null 2>&1; done")
      CMDS+=(--command-name "ssh-ed25519-verify-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y verify -f ssh_allowed_signers -I bench-ed25519 -n benchmark -s ssh_sig_ed25519.sig < signdata.bin >/dev/null 2>&1; done")

      CMDS+=(--command-name "ssh-rsa-2048-sign-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y sign -f ssh_rsa2048 -n benchmark signdata.bin >/dev/null 2>&1; done")
      CMDS+=(--command-name "ssh-rsa-2048-verify-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y verify -f ssh_allowed_signers -I bench-rsa2048 -n benchmark -s ssh_sig_rsa2048.sig < signdata.bin >/dev/null 2>&1; done")

      CMDS+=(--command-name "ssh-rsa-3072-sign-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y sign -f ssh_rsa3072 -n benchmark signdata.bin >/dev/null 2>&1; done")
      CMDS+=(--command-name "ssh-rsa-3072-verify-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y verify -f ssh_allowed_signers -I bench-rsa3072 -n benchmark -s ssh_sig_rsa3072.sig < signdata.bin >/dev/null 2>&1; done")

      CMDS+=(--command-name "ssh-rsa-4096-sign-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y sign -f ssh_rsa4096 -n benchmark signdata.bin >/dev/null 2>&1; done")
      CMDS+=(--command-name "ssh-rsa-4096-verify-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y verify -f ssh_allowed_signers -I bench-rsa4096 -n benchmark -s ssh_sig_rsa4096.sig < signdata.bin >/dev/null 2>&1; done")

      CMDS+=(--command-name "ssh-ecdsa-p256-sign-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y sign -f ssh_ecdsa256 -n benchmark signdata.bin >/dev/null 2>&1; done")
      CMDS+=(--command-name "ssh-ecdsa-p256-verify-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y verify -f ssh_allowed_signers -I bench-ecdsa256 -n benchmark -s ssh_sig_ecdsa256.sig < signdata.bin >/dev/null 2>&1; done")

      CMDS+=(--command-name "ssh-ecdsa-p384-sign-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y sign -f ssh_ecdsa384 -n benchmark signdata.bin >/dev/null 2>&1; done")
      CMDS+=(--command-name "ssh-ecdsa-p384-verify-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y verify -f ssh_allowed_signers -I bench-ecdsa384 -n benchmark -s ssh_sig_ecdsa384.sig < signdata.bin >/dev/null 2>&1; done")

      CMDS+=(--command-name "ssh-ecdsa-p521-sign-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y sign -f ssh_ecdsa521 -n benchmark signdata.bin >/dev/null 2>&1; done")
      CMDS+=(--command-name "ssh-ecdsa-p521-verify-${N}x"
        "for _i in \$(seq $N); do ssh-keygen -Y verify -f ssh_allowed_signers -I bench-ecdsa521 -n benchmark -s ssh_sig_ecdsa521.sig < signdata.bin >/dev/null 2>&1; done")

      {{ run_benchmarks_hyperfine_bin }} \
        --runs {{ run_benchmarks_runs }} \
        --warmup {{ run_benchmarks_warmup }} \
        --ignore-failure \
        --export-json {{ run_benchmarks_work_dir }}/crypto_ssh_sign.json \
        "${CMDS[@]}"
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  when: run_benchmarks_ssh_sign_check.rc == 0
  register: run_benchmarks_crypto_ssh_sign_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_ssh_sign benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_ssh_sign benchmark exited
      rc={{ run_benchmarks_crypto_ssh_sign_result.rc }}.
      {{ run_benchmarks_crypto_ssh_sign_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_ssh_sign_result is not skipped
    - run_benchmarks_crypto_ssh_sign_result.rc | default(0) != 0

# ── 11. Botan speed benchmarks ───────────────────────────────────────────────
#
# Botan (https://botan.randombit.net) is a C++ crypto library with a different
# implementation from OpenSSL.  Its built-in `botan speed` command reports
# ops/sec for each algorithm; this task converts that to the hyperfine JSON
# format (time for N=1000 operations) so values are directly comparable to
# crypto_asymmetric.json.
#
# Algorithms tested:
#   Classical:   RSA-2048/3072/4096, ECDSA-256/384/521, Ed25519, Ed448
#   Post-quantum (Botan 3.4+): ML-DSA-4x4/6x5/8x7 (FIPS 204)
#
# Botan uses its own PKCS1v15(SHA-256) / EMSA1(SHA-256) padding automatically;
# the mode suffix is stripped when building the command names.
- name: Find botan CLI binary (botan, botan3, or botan2)
  ansible.builtin.shell:
    cmd: |
      for candidate in botan botan3 botan2; do
        path=$(command -v "$candidate" 2>/dev/null) && echo "$path" && exit 0
      done
      exit 1
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  register: run_benchmarks_botan_check
  changed_when: false
  failed_when: false

- name: Set botan binary path fact
  ansible.builtin.set_fact:
    _run_benchmarks_botan_bin: "{{ run_benchmarks_botan_check.stdout | trim }}"
  when: run_benchmarks_botan_check.rc == 0

- name: Run Botan speed benchmarks
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      cd {{ run_benchmarks_work_dir }}

      # Run botan speed (1 second per algorithm per operation).
      # Unknown algorithms (e.g. ML-DSA on older Botan) are silently skipped.
      {{ _run_benchmarks_botan_bin }} speed --msec=1000 \
        RSA-2048 RSA-3072 RSA-4096 \
        ECDSA-256 ECDSA-384 ECDSA-521 \
        Ed25519 Ed448 \
        Dilithium-4x4 Dilithium-6x5 Dilithium-8x7 \
        ML-DSA-4x4 ML-DSA-6x5 ML-DSA-8x7 \
        2>/dev/null > botan_raw.txt || true

      # Convert ops/sec output to hyperfine-compatible JSON (time for N=1000 ops).
      # Lines parsed: "Algorithm[/Mode] Sign: 375 ops/sec (376 operations in ...)"
      # Keygen lines are intentionally excluded (Sign/Verify only).
      cat > botan_parse.py << 'PYEOF'
      import json, re
      N = 1000
      name_map = {
          'ecdsa-256': 'ecdsa-p256',
          'ecdsa-384': 'ecdsa-p384',
          'ecdsa-521': 'ecdsa-p521',
          'dilithium-4x4': 'ml-dsa-44',
          'dilithium-6x5': 'ml-dsa-65',
          'dilithium-8x7': 'ml-dsa-87',
          'ml-dsa-4x4': 'ml-dsa-44',
          'ml-dsa-6x5': 'ml-dsa-65',
          'ml-dsa-8x7': 'ml-dsa-87',
      }
      results = []
      seen = set()
      for line in open('botan_raw.txt'):
          m = re.match(r'^(.+?)\s+(Sign|Verify):\s+([\d.]+)\s+ops/sec', line.strip())
          if not m:
              continue
          ops = float(m.group(3))
          if ops <= 0:
              continue
          raw_algo = re.sub(r'/.*', '', m.group(1)).strip()
          name = name_map.get(raw_algo.lower(), raw_algo.lower())
          op = m.group(2).lower()
          key = (name, op)
          if key in seen:
              continue
          seen.add(key)
          mean_s = N / ops
          results.append({
              'command': f'{name}-{op}-{N}x',
              'mean': mean_s,
              'stddev': 0.0,
              'median': mean_s,
              'user': 0.0,
              'system': 0.0,
              'min': 0.0,
              'max': 0.0,
              'times': [],
              'exit_codes': [0],
          })
      print(json.dumps({'results': results}, indent=2))
      PYEOF

      python3 botan_parse.py > {{ run_benchmarks_work_dir }}/crypto_botan.json
    executable: "{{ _run_benchmarks_bash | default('/bin/bash') }}"
  when: run_benchmarks_botan_check.rc == 0
  register: run_benchmarks_crypto_botan_result
  changed_when: false
  failed_when: false

- name: Warn on crypto_botan benchmark failure
  ansible.builtin.debug:
    msg: >-
      [WARN] {{ inventory_hostname }}: crypto_botan benchmark exited
      rc={{ run_benchmarks_crypto_botan_result.rc }}.
      {{ run_benchmarks_crypto_botan_result.stderr | default('') | truncate(300) | trim }}
  when:
    - run_benchmarks_crypto_botan_result is not skipped
    - run_benchmarks_crypto_botan_result.rc | default(0) != 0

- name: Remove private key material from benchmark work directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ run_benchmarks_work_dir }}/rsa2048.pem"
    - "{{ run_benchmarks_work_dir }}/rsa3072.pem"
    - "{{ run_benchmarks_work_dir }}/rsa4096.pem"
    - "{{ run_benchmarks_work_dir }}/ec256.pem"
    - "{{ run_benchmarks_work_dir }}/ec384.pem"
    - "{{ run_benchmarks_work_dir }}/ec521.pem"
    - "{{ run_benchmarks_work_dir }}/ed25519.pem"
    - "{{ run_benchmarks_work_dir }}/ed448.pem"
    - "{{ run_benchmarks_work_dir }}/mldsa44.pem"
    - "{{ run_benchmarks_work_dir }}/mldsa65.pem"
    - "{{ run_benchmarks_work_dir }}/mldsa87.pem"
    - "{{ run_benchmarks_work_dir }}/slhdsa128f.pem"
    - "{{ run_benchmarks_work_dir }}/ssh_ed25519"
    - "{{ run_benchmarks_work_dir }}/ssh_rsa2048"
    - "{{ run_benchmarks_work_dir }}/ssh_rsa3072"
    - "{{ run_benchmarks_work_dir }}/ssh_rsa4096"
    - "{{ run_benchmarks_work_dir }}/ssh_ecdsa256"
    - "{{ run_benchmarks_work_dir }}/ssh_ecdsa384"
    - "{{ run_benchmarks_work_dir }}/ssh_ecdsa521"
    - "{{ run_benchmarks_work_dir }}/gnupg"
  failed_when: false
