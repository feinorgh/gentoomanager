---
# Dispatch to the per-OS task file.  The multi-play playbook calls the role
# with tasks_from: os/<family>.yml directly; this dispatcher handles the case
# where the role is included without tasks_from (e.g. site.yml or ad-hoc use).

- name: Include OS-specific provisioning tasks
  ansible.builtin.include_tasks:
    file: "os/{{ _provision_os_key }}.yml"
  vars:
    _os_family_map:
      Gentoo: gentoo
      RedHat: redhat
      Debian: debian
      Archlinux: archlinux
      Suse: suse
      FreeBSD: freebsd
      Void: void
      NixOS: nixos
      Solus: solus
    _provision_os_key: >-
      {{ _os_family_map[ansible_os_family] | default(ansible_distribution | lower) }}
  when: ansible_os_family is defined
