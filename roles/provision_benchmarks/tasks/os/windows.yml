---
# Windows – install benchmark dependencies via Chocolatey over SSH/PowerShell.
# Requires OpenSSH server installed and ansible_shell_type: powershell set
# (configured in group_vars/mswindows/).

- name: Install Chocolatey (Windows)
  ansible.windows.win_shell: |
    if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
      Set-ExecutionPolicy Bypass -Scope Process -Force
      [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
      Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
    }
  changed_when: false

- name: Install benchmark dependencies via Chocolatey (Windows)
  chocolatey.chocolatey.win_chocolatey:
    name:
      - hyperfine
      - mingw
      - golang
      - rust
      - python
      - openssl
      - 7zip
      - git
      - nodejs
      - ffmpeg
      - imagemagick
      - octave
    state: present
  register: provision_benchmarks_choco_result
  failed_when: >-
    provision_benchmarks_choco_result.rc is defined and
    provision_benchmarks_choco_result.rc not in [0, 1641, 3010]

- name: Install numpy for Python numeric benchmarks (Windows)
  ansible.windows.win_shell: python -m pip install --quiet numpy
  changed_when: false
  failed_when: false

- name: Verify essential tools are available (Windows)
  ansible.windows.win_shell: |
    $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
    $tools = @('hyperfine', 'gcc', 'python', 'openssl', 'git', 'clang', 'rustc', 'go', 'ffmpeg', 'magick')
    foreach ($tool in $tools) {
      $found = Get-Command $tool -ErrorAction SilentlyContinue
      if ($found) {
        Write-Output ("  {0,-15} OK" -f $tool)
      } else {
        Write-Output ("  {0,-15} MISSING" -f $tool)
      }
    }
  changed_when: false
  register: provision_benchmarks_win_verify

- name: Show tool verification results (Windows)
  ansible.builtin.debug:
    msg: "{{ provision_benchmarks_win_verify.stdout_lines | default(provision_benchmarks_win_verify.stdout | default('') | split('\n')) }}"
