---
# FreeBSD – install everything from the ports tree using BSD make.
# Mixing pkg (binary) and ports (source) is bad practice; all packages are
# built from source via /usr/bin/make install BATCH=yes.

- name: Ensure ports tree is available and up to date
  ansible.builtin.git: # noqa: latest[git]
    repo: https://git.FreeBSD.org/ports.git
    dest: /usr/ports
    depth: 1
    update: true
    force: true
  become: true
  failed_when: false

- name: Check which ports are already installed (FreeBSD)
  ansible.builtin.command:
    cmd: pkg info -qO {{ item }}
  loop: >-
    {{ provision_benchmarks_packages['FreeBSD'] +
       [provision_benchmarks_freebsd_hyperfine_port] +
       ([provision_benchmarks_freebsd_ffmpeg_port] if provision_benchmarks_install_ffmpeg | bool else []) +
       (provision_benchmarks_numpy_packages['FreeBSD'] if provision_benchmarks_install_numpy | bool else []) +
       (['graphics/gimp'] if provision_benchmarks_install_gimp | bool else []) +
       (['graphics/inkscape'] if provision_benchmarks_install_inkscape | bool else []) +
       (provision_benchmarks_opencv_packages['FreeBSD'] if provision_benchmarks_install_opencv | bool else []) +
       (provision_benchmarks_botan_packages['FreeBSD'] if provision_benchmarks_install_botan | bool else []) +
       (provision_benchmarks_mold_packages['FreeBSD'] if provision_benchmarks_install_mold | bool else []) +
       (provision_benchmarks_octave_packages['FreeBSD'] if provision_benchmarks_install_octave | bool else []) }}
  register: provision_benchmarks_freebsd_pkg_check
  failed_when: false
  changed_when: false
  become: true

- name: Install benchmark dependencies from ports (FreeBSD)
  ansible.builtin.command:
    cmd: /usr/bin/make install BATCH=yes
    chdir: "/usr/ports/{{ item.item }}"
  loop: "{{ provision_benchmarks_freebsd_pkg_check.results }}"
  when: item.rc != 0
  become: true
  failed_when: false
  changed_when: true
  async: 7200
  poll: 30

- name: Create gcc symlink (FreeBSD)
  ansible.builtin.file:
    src: /usr/local/bin/gcc13
    dest: /usr/local/bin/gcc
    state: link
    force: true
  become: true
  failed_when: false

- name: Create python3 symlink (FreeBSD)
  ansible.builtin.file:
    src: /usr/local/bin/python3.11
    dest: /usr/local/bin/python3
    state: link
    force: true
  become: true
  failed_when: false

- name: Verify installed tools
  ansible.builtin.include_tasks: verify.yml
