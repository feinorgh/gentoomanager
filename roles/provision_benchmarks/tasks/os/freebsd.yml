---
# FreeBSD – install from ports tree using BSD make.
# community.general.make uses GNU make which is incompatible with BSD Makefiles;
# use ansible.builtin.command with /usr/bin/make (BSD make) instead.

- name: Ensure ports tree is available and up to date
  ansible.builtin.git: # noqa: latest[git]
    repo: https://git.FreeBSD.org/ports.git
    dest: /usr/ports
    depth: 1
    update: true
    force: true
  become: true
  failed_when: false

- name: Install benchmark dependencies from ports (FreeBSD)
  ansible.builtin.command:
    cmd: /usr/bin/make install BATCH=yes
    chdir: "/usr/ports/{{ item }}"
  loop: "{{ provision_benchmarks_packages['FreeBSD'] }}"
  become: true
  failed_when: false
  changed_when: true
  async: 7200
  poll: 30

- name: Install hyperfine from ports (FreeBSD)
  ansible.builtin.command:
    cmd: /usr/bin/make install BATCH=yes
    chdir: "/usr/ports/{{ provision_benchmarks_freebsd_hyperfine_port }}"
  become: true
  failed_when: false
  changed_when: true
  async: 3600
  poll: 30

- name: Install ffmpeg from ports (FreeBSD)
  ansible.builtin.command:
    cmd: /usr/bin/make install BATCH=yes
    chdir: "/usr/ports/{{ provision_benchmarks_freebsd_ffmpeg_port }}"
  become: true
  when: provision_benchmarks_install_ffmpeg | bool
  failed_when: false
  changed_when: true
  async: 7200
  poll: 30

- name: Install numpy from ports (FreeBSD)
  ansible.builtin.command:
    cmd: /usr/bin/make install BATCH=yes
    chdir: "/usr/ports/{{ provision_benchmarks_numpy_packages['FreeBSD'] | first }}"
  become: true
  when: provision_benchmarks_install_numpy | bool
  failed_when: false
  changed_when: true
  async: 3600
  poll: 30

- name: Verify installed tools
  ansible.builtin.include_tasks: verify.yml
