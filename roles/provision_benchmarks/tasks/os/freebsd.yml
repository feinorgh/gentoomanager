---
# FreeBSD – install from binary packages (pkg).

- name: Update pkg repository catalogue (FreeBSD)
  community.general.pkgng:
    name: "*"
    state: latest
    autoremove: false
  become: true
  failed_when: false

- name: Install benchmark dependencies (FreeBSD)
  community.general.pkgng:
    name: "{{ provision_benchmarks_packages['FreeBSD'] }}"
    state: present
  become: true
  failed_when: false

- name: Install hyperfine (FreeBSD)
  community.general.pkgng:
    name: hyperfine
    state: present
  become: true
  failed_when: false

- name: Install ffmpeg (FreeBSD)
  community.general.pkgng:
    name: ffmpeg
    state: present
  become: true
  when: provision_benchmarks_install_ffmpeg | bool
  failed_when: false

- name: Install numpy (FreeBSD)
  community.general.pkgng:
    name: "{{ provision_benchmarks_numpy_packages['FreeBSD'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_numpy | bool
  failed_when: false

- name: Create standard-name symlinks for versioned FreeBSD binaries
  ansible.builtin.shell:
    cmd: |
      set -e
      # gcc: link the highest-versioned gccNN to /usr/local/bin/gcc
      if ! command -v gcc >/dev/null 2>&1; then
        for f in /usr/local/bin/gcc[0-9][0-9]; do
          [ -x "$f" ] && gcc_bin="$f"
        done
        [ -n "${gcc_bin:-}" ] && ln -sf "$gcc_bin" /usr/local/bin/gcc
      fi
      # python3: link python3.NN to /usr/local/bin/python3
      if ! command -v python3 >/dev/null 2>&1; then
        for f in /usr/local/bin/python3.[0-9][0-9] /usr/local/bin/python3.[0-9]; do
          [ -x "$f" ] && py_bin="$f"
        done
        [ -n "${py_bin:-}" ] && ln -sf "$py_bin" /usr/local/bin/python3
      fi
      # clang: link clangNN to /usr/local/bin/clang
      if ! command -v clang >/dev/null 2>&1; then
        for f in /usr/local/bin/clang[0-9][0-9]; do
          [ -x "$f" ] && clang_bin="$f"
        done
        [ -n "${clang_bin:-}" ] && ln -sf "$clang_bin" /usr/local/bin/clang
      fi
    executable: /bin/sh
  become: true
  changed_when: false

- name: Verify installed tools
  ansible.builtin.include_tasks: verify.yml
