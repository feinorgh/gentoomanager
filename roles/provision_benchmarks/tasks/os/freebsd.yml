---
# FreeBSD – install from ports tree using BSD make.
# community.general.make uses GNU make which is incompatible with BSD Makefiles;
# use ansible.builtin.command with /usr/bin/make (BSD make) instead.

- name: Ensure ports tree is available and up to date
  ansible.builtin.git: # noqa: latest[git]
    repo: https://git.FreeBSD.org/ports.git
    dest: /usr/ports
    depth: 1
    update: true
    force: true
  become: true
  failed_when: false

- name: Check which ports are already installed (FreeBSD)
  ansible.builtin.command:
    cmd: pkg info -qO {{ item }}
  loop: >-
    {{ provision_benchmarks_packages['FreeBSD'] +
       [provision_benchmarks_freebsd_hyperfine_port] +
       ([provision_benchmarks_freebsd_ffmpeg_port] if provision_benchmarks_install_ffmpeg | bool else []) +
       (provision_benchmarks_numpy_packages['FreeBSD'] if provision_benchmarks_install_numpy | bool else []) }}
  register: provision_benchmarks_freebsd_pkg_check
  failed_when: false
  changed_when: false
  become: true

- name: Install benchmark dependencies from ports (FreeBSD)
  ansible.builtin.command:
    cmd: /usr/bin/make install BATCH=yes
    chdir: "/usr/ports/{{ item.item }}"
  loop: "{{ provision_benchmarks_freebsd_pkg_check.results }}"
  when: item.rc != 0
  become: true
  failed_when: false
  changed_when: true
  async: 7200
  poll: 30

- name: Create gcc symlink (FreeBSD)
  ansible.builtin.file:
    src: /usr/local/bin/gcc13
    dest: /usr/local/bin/gcc
    state: link
    force: true
  become: true
  failed_when: false

- name: Create python3 symlink (FreeBSD)
  ansible.builtin.file:
    src: /usr/local/bin/python3.11
    dest: /usr/local/bin/python3
    state: link
    force: true
  become: true
  failed_when: false


- name: Install GIMP (FreeBSD)
  ansible.builtin.package:
    name: graphics/gimp
    state: present
  become: true
  when: provision_benchmarks_install_gimp | bool
  failed_when: false

- name: Install Inkscape (FreeBSD)
  ansible.builtin.package:
    name: graphics/inkscape
    state: present
  become: true
  when: provision_benchmarks_install_inkscape | bool
  failed_when: false

- name: Install OpenCV Python bindings (FreeBSD)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_opencv_packages['FreeBSD'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_opencv | bool
  failed_when: false

- name: Verify installed tools
  ansible.builtin.include_tasks: verify.yml
