---
# SUSE family – openSUSE Tumbleweed, Leap.

- name: Install benchmark dependencies (SUSE)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_packages['Suse'] }}"
    state: present
  become: true
  failed_when: false

- name: Install hyperfine (SUSE)
  ansible.builtin.package:
    name: hyperfine
    state: present
  become: true
  failed_when: false

- name: Install ffmpeg (SUSE)
  ansible.builtin.package:
    name: ffmpeg
    state: present
  become: true
  when: provision_benchmarks_install_ffmpeg | bool
  failed_when: false

- name: Install numpy (SUSE)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_numpy_packages['Suse'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_numpy | bool
  failed_when: false

- name: Install hyperfine binary (fallback)
  ansible.builtin.include_tasks: hyperfine_fallback.yml


- name: Install GIMP (SUSE)
  ansible.builtin.package:
    name: gimp
    state: present
  become: true
  when: provision_benchmarks_install_gimp | bool
  failed_when: false

- name: Install Inkscape (SUSE)
  ansible.builtin.package:
    name: inkscape
    state: present
  become: true
  when: provision_benchmarks_install_inkscape | bool
  failed_when: false

- name: Install OpenCV Python bindings (SUSE)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_opencv_packages['Suse'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_opencv | bool
  failed_when: false

- name: Install Botan CLI (SUSE)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_botan_packages['Suse'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_botan | bool
  failed_when: false

- name: Install mold linker (SUSE)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_mold_packages['Suse'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_mold | bool
  failed_when: false

- name: Install Octave (SUSE)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_octave_packages['Suse'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_octave | bool
  failed_when: false

- name: Verify installed tools
  ansible.builtin.include_tasks: verify.yml
