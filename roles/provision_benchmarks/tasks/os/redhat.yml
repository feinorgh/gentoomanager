---
# Red Hat family – Fedora, RHEL, CentOS, Oracle Linux.
#
# Uses the detected package manager binary directly so older hosts
# (RHEL 7/8 with SCL Python) don't require Python dnf/yum bindings.

- name: Detect package manager (dnf preferred over yum)
  ansible.builtin.shell:
    cmd: command -v dnf 2>/dev/null || command -v yum 2>/dev/null
  register: provision_benchmarks_rhel_pkgmgr
  changed_when: false
  failed_when: provision_benchmarks_rhel_pkgmgr.rc != 0

- name: Install EPEL release package (RHEL/CentOS/OL)
  ansible.builtin.command:
    cmd: "{{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y epel-release"
  become: true
  when: ansible_distribution | default('') != 'Fedora'
  failed_when: false
  changed_when: true
  register: provision_benchmarks_epel_pkg

- name: Install EPEL release via direct RPM URL (fallback when simple name fails)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{
      ansible_distribution_major_version }}.noarch.rpm
  become: true
  when: >-
    ansible_distribution | default('') != 'Fedora' and
    ('No package epel-release' in (provision_benchmarks_epel_pkg.stdout | default('')) or
     'Error' in (provision_benchmarks_epel_pkg.stdout | default('')))
  failed_when: false
  changed_when: true

- name: Enable CRB/PowerTools for RHEL 8+ dependencies
  ansible.builtin.shell:
    cmd: |
      set -eo pipefail
      dnf config-manager --set-enabled crb 2>/dev/null || \
      dnf config-manager --set-enabled powertools 2>/dev/null || \
      dnf config-manager --set-enabled PowerTools 2>/dev/null || true
  become: true
  changed_when: false
  when: >-
    ansible_distribution | default('') != 'Fedora' and
    (ansible_distribution_major_version | default('0') | int) >= 8

- name: Install benchmark dependencies (Red Hat)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      {{ provision_benchmarks_packages['RedHat'] | join(' ') }}
  become: true
  changed_when: true
  failed_when: false

- name: Install EPEL packages – hyperfine (RHEL/CentOS/OL)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      {{ provision_benchmarks_epel_packages | join(' ') }}
  become: true
  when: ansible_distribution | default('') != 'Fedora'
  changed_when: true
  failed_when: false

- name: Install hyperfine via dnf (Fedora)
  ansible.builtin.command:
    cmd: dnf install -y hyperfine
  become: true
  when: ansible_distribution | default('') == 'Fedora'
  changed_when: true
  failed_when: false

- name: Install ffmpeg from default repositories (Red Hat / Fedora)
  # On Fedora 36+ the default repos ship 'ffmpeg-free' (no patent-encumbered
  # codecs) which is sufficient for benchmark purposes.  On RHEL/CentOS/OL the
  # full ffmpeg is in EPEL on some versions; if absent the install silently
  # fails and the video-encoding benchmark is skipped (noted in the report).
  # RPM Fusion is intentionally NOT used — benchmarks reflect what is
  # available from the distribution's default package sources.
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y ffmpeg
  become: true
  when: provision_benchmarks_install_ffmpeg | bool
  changed_when: true
  failed_when: false

- name: Install numpy (Red Hat)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      {{ provision_benchmarks_numpy_packages['RedHat'] | join(' ') }}
  become: true
  when: provision_benchmarks_install_numpy | bool
  changed_when: true
  failed_when: false

- name: Install OpenCV Python bindings (Red Hat)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      {{ provision_benchmarks_opencv_packages['RedHat'] | join(' ') }}
  become: true
  when: provision_benchmarks_install_opencv | bool
  changed_when: true
  failed_when: false

- name: Install hyperfine binary (fallback)
  ansible.builtin.include_tasks: hyperfine_fallback.yml


- name: Install GIMP (RedHat)
  ansible.builtin.package:
    name: gimp
    state: present
  become: true
  when: provision_benchmarks_install_gimp | bool
  failed_when: false

- name: Install Inkscape (RedHat)
  ansible.builtin.package:
    name: inkscape
    state: present
  become: true
  when: provision_benchmarks_install_inkscape | bool
  failed_when: false

- name: Install Botan CLI (Red Hat)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      {{ provision_benchmarks_botan_packages['RedHat'] | join(' ') }}
  become: true
  when: provision_benchmarks_install_botan | bool
  changed_when: true
  failed_when: false

- name: Install mold linker (Red Hat)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      {{ provision_benchmarks_mold_packages['RedHat'] | join(' ') }}
  become: true
  when: provision_benchmarks_install_mold | bool
  changed_when: true
  failed_when: false

- name: Install Octave (Red Hat)
  ansible.builtin.command:
    cmd: >-
      {{ provision_benchmarks_rhel_pkgmgr.stdout }} install -y
      {{ provision_benchmarks_octave_packages['RedHat'] | join(' ') }}
  become: true
  when: provision_benchmarks_install_octave | bool
  changed_when: true
  failed_when: false

- name: Verify installed tools
  ansible.builtin.include_tasks: verify.yml
