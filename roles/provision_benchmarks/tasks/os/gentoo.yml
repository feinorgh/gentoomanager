---
# Gentoo – emerge benchmark dependencies via portage.

- name: Install benchmark dependencies (Gentoo)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_packages['Gentoo'] }}"
    state: present
  become: true
  failed_when: false

- name: Install Rust from source (Gentoo, preferred)
  ansible.builtin.package:
    name: dev-lang/rust
    state: present
  become: true
  register: provision_benchmarks_rust_source
  failed_when: false

- name: Install Rust binary fallback (Gentoo, if source build unavailable)
  ansible.builtin.package:
    name: dev-lang/rust-bin
    state: present
  become: true
  when: provision_benchmarks_rust_source is failed or
        provision_benchmarks_rust_source.rc | default(0) != 0
  failed_when: false

- name: Select latest Rust version (Gentoo)
  ansible.builtin.command: eselect rust update
  become: true
  changed_when: false
  failed_when: false

- name: Install numpy (Gentoo)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_numpy_packages['Gentoo'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_numpy | bool
  failed_when: false


- name: Install GIMP (Gentoo)
  ansible.builtin.package:
    name: media-gfx/gimp
    state: present
  become: true
  when: provision_benchmarks_install_gimp | bool
  failed_when: false

- name: Install Inkscape (Gentoo)
  ansible.builtin.package:
    name: media-gfx/inkscape
    state: present
  become: true
  when: provision_benchmarks_install_inkscape | bool
  failed_when: false

- name: Install OpenCV Python bindings (Gentoo)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_opencv_packages['Gentoo'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_opencv | bool
  failed_when: false

- name: Install Botan CLI (Gentoo)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_botan_packages['Gentoo'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_botan | bool
  failed_when: false

- name: Install mold linker (Gentoo)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_mold_packages['Gentoo'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_mold | bool
  failed_when: false

- name: Verify installed tools
