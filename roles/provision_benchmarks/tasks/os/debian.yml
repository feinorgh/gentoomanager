---
# Debian family – Ubuntu, Debian, Linux Mint, elementary OS.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install benchmark dependencies (Debian)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_packages['Debian'] }}"
    state: present
  become: true
  failed_when: false
  register: provision_benchmarks_pkg_result

- name: Install packages individually on partial failure (Debian)
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  become: true
  loop: "{{ provision_benchmarks_packages['Debian'] }}"
  when: provision_benchmarks_pkg_result is failed
  failed_when: false

- name: Install ffmpeg (Debian)
  ansible.builtin.package:
    name: ffmpeg
    state: present
  become: true
  when: provision_benchmarks_install_ffmpeg | bool
  failed_when: false

- name: Install numpy (Debian)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_numpy_packages['Debian'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_numpy | bool
  failed_when: false

- name: Install hyperfine binary (fallback)
  ansible.builtin.include_tasks: hyperfine_fallback.yml


- name: Install GIMP (Debian)
  ansible.builtin.package:
    name: gimp
    state: present
  become: true
  when: provision_benchmarks_install_gimp | bool
  failed_when: false

- name: Install Inkscape (Debian)
  ansible.builtin.package:
    name: inkscape
    state: present
  become: true
  when: provision_benchmarks_install_inkscape | bool
  failed_when: false

- name: Install OpenCV Python bindings (Debian)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_opencv_packages['Debian'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_opencv | bool
  failed_when: false

- name: Install Botan CLI (Debian)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_botan_packages['Debian'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_botan | bool
  failed_when: false

- name: Install mold linker (Debian)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_mold_packages['Debian'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_mold | bool
  failed_when: false

- name: Install Octave (Debian)
  ansible.builtin.package:
    name: "{{ provision_benchmarks_octave_packages['Debian'] }}"
    state: present
  become: true
  when: provision_benchmarks_install_octave | bool
  failed_when: false

# lz4 on Ubuntu 22.04 (jammy) is 1.9.3 compiled without AVX2 optimisations.
# Enabling jammy-backports gives access to 1.9.4+ which includes better SIMD
# paths. Only applies to Ubuntu 22.04-derived distros (elementary OS 7,
# Linux Mint 21.x). If the VM CPU model doesn't expose AVX2, SIMD still won't
# activate — in that case the VM CPU model must be changed in the hypervisor.
- name: Enable Ubuntu backports (for SIMD-capable lz4 on jammy)
  ansible.builtin.apt_repository:
    repo: "deb http://archive.ubuntu.com/ubuntu jammy-backports main universe"
    state: present
  become: true
  when: ansible_distribution_release | default('') == 'jammy'
  failed_when: false

- name: Upgrade lz4 from backports on jammy-based hosts
  ansible.builtin.apt:
    name: lz4
    state: latest
    default_release: "jammy-backports"
  become: true
  when: ansible_distribution_release | default('') == 'jammy'
  failed_when: false

- name: Verify installed tools
  ansible.builtin.include_tasks: verify.yml
