---
# Package lists per OS family for benchmark provisioning.
# Each list contains all packages needed to run the full benchmark suite.

provision_benchmarks_packages:
  Gentoo:
    - app-benchmarks/hyperfine
    - sys-devel/gcc
    - llvm-core/clang
    - dev-libs/openssl
    - dev-lang/python
    - dev-lang/go
    - media-video/ffmpeg
    - media-gfx/imagemagick
    - dev-vcs/git
    - app-arch/gzip
    - app-arch/bzip2
    - app-arch/xz-utils
    - app-arch/zstd
    - app-arch/lz4
    - app-crypt/gnupg
    - sys-apps/diffutils
    - app-arch/p7zip
    - dev-db/sqlite
  RedHat:
    - gcc
    - clang
    - openssl
    - python3
    - rust
    - cargo
    - golang
    - git
    - gzip
    - bzip2
    - xz
    - zstd
    - lz4
    - gnupg2
    - diffutils
    - p7zip
    - p7zip-plugins
    - ImageMagick
    - sqlite
  Debian:
    - gcc
    - clang
    - openssl
    - python3
    - rustc
    - golang-go
    - git
    - gzip
    - bzip2
    - xz-utils
    - zstd
    - lz4
    - gnupg
    - diffutils
    - dpkg-dev
    - build-essential
    - 7zip
    - imagemagick
    - sqlite3
  Archlinux:
    - gcc
    - clang
    - openssl
    - python
    - rust
    - go
    - git
    - gzip
    - bzip2
    - xz
    - zstd
    - lz4
    - gnupg
    - diffutils
    - p7zip
    - imagemagick
    - sqlite
  Suse:
    - gcc
    - clang
    - openssl
    - python3
    - rust
    - cargo
    - go
    - git
    - gzip
    - bzip2
    - xz
    - zstd
    - lz4
    - gpg2
    - diffutils
    - 7zip
    - ImageMagick
    - sqlite3
  FreeBSD:
    - lang/gcc13
    - devel/llvm
    - security/openssl
    - lang/python311
    - lang/rust
    - lang/go
    - devel/git
    - archivers/zstd
    - archivers/liblz4
    - security/gnupg
    - textproc/diffutils
    - archivers/7-zip
    - graphics/ImageMagick7
    - databases/sqlite3

# Packages available only via EPEL on RHEL/CentOS
provision_benchmarks_epel_packages:
  - hyperfine

# Hyperfine GitHub release URL template for binary fallback
provision_benchmarks_hyperfine_version: "1.20.0"
provision_benchmarks_hyperfine_sha256: "63ad53934062118f5b0be11785e0bb1603d4b91667d1921f2fd8df9a8712040a"
provision_benchmarks_hyperfine_url: >-
  https://github.com/sharkdp/hyperfine/releases/download/v{{ provision_benchmarks_hyperfine_version }}/hyperfine-v{{ provision_benchmarks_hyperfine_version }}-x86_64-unknown-linux-gnu.tar.gz

# Optional: also install ffmpeg (may need extra repos on some distros)
provision_benchmarks_install_ffmpeg: true

# FreeBSD ports for hyperfine and ffmpeg
provision_benchmarks_freebsd_hyperfine_port: benchmarks/hyperfine
provision_benchmarks_freebsd_ffmpeg_port: multimedia/ffmpeg

# Optional: install OpenCV Python bindings
provision_benchmarks_install_opencv: true

# Optional: install GIMP for batch-mode image processing benchmarks
provision_benchmarks_install_gimp: false

# Optional: install Inkscape for SVG rendering benchmarks (requires 1.x)
provision_benchmarks_install_inkscape: false

# Optional: install numpy for numeric benchmarks
provision_benchmarks_install_numpy: true

# numpy package name per OS family (used when provision_benchmarks_install_numpy is true)
provision_benchmarks_numpy_packages:
  Gentoo:
    - dev-python/numpy
  RedHat:
    - python3-numpy
  Debian:
    - python3-numpy
  Archlinux:
    - python-numpy
  Suse:
    - python3-numpy
  FreeBSD:
    - math/py-numpy

# opencv package name per OS family (used when provision_benchmarks_install_opencv is true)
provision_benchmarks_opencv_packages:
  Gentoo:
    - media-libs/opencv
  RedHat:
    - python3-opencv
  Debian:
    - python3-opencv
  Archlinux:
    - python-opencv
  Suse:
    - python3-opencv
  FreeBSD:
    - graphics/py-opencv
provision_benchmarks_install_botan: true

# botan package name per OS family (provides the botan CLI used by the benchmark)
provision_benchmarks_botan_packages:
  Gentoo:
    - dev-libs/botan:3
  RedHat:
    - botan
  Debian:
    - botan
  Archlinux:
    - botan
  Suse:
    - botan3
  FreeBSD:
    - security/botan3

provision_benchmarks_install_mold: true

# mold package name per OS family (modern fast linker, used by compiler benchmarks)
provision_benchmarks_mold_packages:
  Gentoo:
    - sys-devel/mold
  RedHat:
    - mold
  Debian:
    - mold
  Archlinux:
    - mold
  Suse:
    - mold
  FreeBSD:
    - devel/mold

provision_benchmarks_install_octave: true

# octave package name per OS family (GNU Octave numerical computing)
provision_benchmarks_octave_packages:
  Gentoo:
    - sci-mathematics/octave
  RedHat:
    - octave
  Debian:
    - octave
  Archlinux:
    - octave
  Suse:
    - octave
  FreeBSD:
    - math/octave
