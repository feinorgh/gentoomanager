---
# defaults file for local.gentoomanager.collect_use_flags

# Path to make.conf on the remote host
collect_use_flags_make_conf: /etc/portage/make.conf

# Directory containing per-package USE flag files
collect_use_flags_package_use_dir: /etc/portage/package.use

# Root of the main Gentoo repository (used to read USE flag descriptions)
collect_use_flags_portage_repo_dir: /var/db/repos/gentoo

# Controller-local staging directory (written by delegate_to: localhost tasks)
collect_use_flags_facts_dir: /tmp/ansible_use_flags_facts

# Project root on the controller: group_vars/ and host_vars/ will be written here
collect_use_flags_output_dir: "{{ playbook_dir }}/.."
