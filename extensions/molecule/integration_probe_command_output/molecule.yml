---
platforms:
  - name: na

provisioner:
  name: ansible
  playbooks:
    cleanup: ../utils/playbooks/noop.yml
    converge: ../utils/playbooks/converge.yml
    destroy: ../utils/playbooks/noop.yml
    prepare: ../utils/playbooks/noop.yml
  env:
    # MOLECULE_PROJECT_DIRECTORY is the repo root; point ansible at the
    # repo's ansible.cfg so collections_path resolves local.gentoomanager.
    ANSIBLE_CONFIG: "${MOLECULE_PROJECT_DIRECTORY}/ansible.cfg"
scenario:
  test_sequence:
    - prepare
    - converge
  destroy_sequence:
    - destroy
