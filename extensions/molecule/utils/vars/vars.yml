---
# MOLECULE_SCENARIO_DIRECTORY is always set and points to the scenario dir
# (e.g. <collection_root>/extensions/molecule/<scenario>/), which is 3 levels
# above the collection root. This works both locally and in CI (where
# MOLECULE_PROJECT_DIRECTORY may point to extensions/ instead of the root).
collection_root: "{{ (lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') + '/../../..') | realpath }}"
integration_tests_path: "{{ collection_root }}/tests/integration/targets/"
molecule_scenario_name: "{{ molecule_scenario_directory | basename }}"
